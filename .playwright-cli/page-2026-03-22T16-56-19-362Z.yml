                  - row "TX RX" [ref=e502]:
                    - cell "TX" [ref=e503]
                    - cell "RX" [ref=e504]
                - paragraph [ref=e505]:
                  - strong [ref=e506]: Step 2.
                  - text: Select the corresponding serial port number in the host computer tool, set the baud rate to
                  - strong [ref=e507]: "256000"
                  - text: ", select the"
                  - strong [ref=e508]: Engineering Mode
                  - text: ", and click to"
                  - strong [ref=e509]: Connect
                  - text: the device.
                - generic [ref=e510]:
                  - generic [ref=e511]:
                    - img [ref=e513]
                    - text: tip
                  - paragraph [ref=e516]: If you opened the software before connecting the sensor to your computer, you may need to click Refresh to refresh the port number.
                - img [ref=e518]
                - paragraph [ref=e519]:
                  - strong [ref=e520]: Step 3.
                  - text: After the connection is successful, click the Start button, and the graphical interface on the right will display the test results and data. After the connection is successful, click the Start button, and the graphical interface on the right will display the test results and data.
                - generic [ref=e521]:
                  - generic [ref=e522]:
                    - img [ref=e524]
                    - text: note
                  - paragraph [ref=e527]: The parameters cannot be read and configured after clicking start, and configuration can only be performed after stopping.
                - paragraph [ref=e528]: "The ball is the target status output indication: red means there is a movingtarget; purple means there is astationary target; green means no one."
                - img [ref=e530]
                - heading "Sensor Abnormal RecoveryDirect link to Sensor Abnormal Recovery" [level=2] [ref=e531]:
                  - text: Sensor Abnormal Recovery
                  - link "Direct link to Sensor Abnormal Recovery" [ref=e532] [cursor=pointer]:
                    - /url: "#sensor-abnormal-recovery"
                    - text: "#"
                - paragraph [ref=e533]: If you have encountered radar anomalies in the process of using the sensor, such as data not reporting, downtime and so on. You can try to restore the sensor firmware according to here.
                - paragraph [ref=e534]:
                  - text: The method to recover the firmware is to use the mobile phone APP with Bluetooth function, in the upper right corner of the main interface of the software, select
                  - strong [ref=e535]: More
                  - text: ", and then select"
                  - strong [ref=e536]: Initialize
                  - text: .
                - img [ref=e538]
                - heading "OTA UpgradeDirect link to OTA Upgrade" [level=2] [ref=e539]:
                  - text: OTA Upgrade
                  - link "Direct link to OTA Upgrade" [ref=e540] [cursor=pointer]:
                    - /url: "#ota-upgrade"
                    - text: "#"
                - paragraph [ref=e541]:
                  - text: When the firmware of the device has been updated, the word
                  - strong [ref=e542]: upgradeable
                  - text: will appear on the firmware version, long press the version number to enter the upgrade interface; only
                  - strong [ref=e543]: V1.07.22091516
                  - text: or newer versions support the upgrade.
                - img [ref=e545]
                - paragraph [ref=e546]: The overall upgrade time takes 1~3 minutes. The upgrade must be performed from the module, otherwise the upgrade will fail if the Bluetooth signal is poor.
                - paragraph [ref=e547]: "Do not power off or restart the module before the upgrade is completed, and do not forcibly exit the APP, otherwise the upgrade will fail. If the upgrade fails, the sensor program will be disabled and sensor detection will not be possible. If the device upgrade fails, please restart the device and reconnect the APP, and a \"waiting for upgrade\" prompt will appear on the device list:"
                - img [ref=e549]
                - paragraph [ref=e550]: Click the device to be upgraded to re-upgrade, and the radar function can be restored only after the upgrade is successful.

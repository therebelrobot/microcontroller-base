                - heading "Hardware OverviewDirect link to Hardware Overview" [level=2] [ref=e406]:
                  - text: Hardware Overview
                  - link "Direct link to Hardware Overview" [ref=e407] [cursor=pointer]:
                    - /url: "#hardware-overview"
                    - text: "#"
                - paragraph [ref=e408]: This mmwave sensor is compatible with the full range of XIAO, so the pin definitions follow the XIAO pin definitions. However, considering the widespread use of serial ports, we have designed a soft serial connection for the mmwave sensor.
                - img [ref=e410]
                - paragraph [ref=e411]: The sensor relies heavily on the soft serial ports (D2 - TX, D3 - RX) and a 3.3V power supply. Other than that, none of the other pins will be used.
                - heading "Getting StartedDirect link to Getting Started" [level=2] [ref=e412]:
                  - text: Getting Started
                  - link "Direct link to Getting Started" [ref=e413] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e414]:
                  - text: This sensor module supports both direct software viewing (via Bluetooth) and secondary development (using XIAO and UART). If you want to observe the sensor values as soon as possible, you can refer to the
                  - strong [ref=e415]: Getting Started
                  - text: steps to use the software we provide.
                - heading "Hardware ConnectionsDirect link to Hardware Connections" [level=2] [ref=e416]:
                  - text: Hardware Connections
                  - link "Direct link to Hardware Connections" [ref=e417] [cursor=pointer]:
                    - /url: "#hardware-connections"
                    - text: "#"
                - paragraph [ref=e418]: The sensor is designed for XIAO compatibility, so in general, if you want to use this sensor, you need to prepare an XIAO and install the female header row pin for the sensor. When connecting to the XIAO, please pay special attention to the installation direction of the sensor, please do not plug it in backwards, otherwise it is likely to burn the sensor or the XIAO.
                - generic [ref=e419]:
                  - generic [ref=e420]:
                    - img [ref=e422]
                    - text: caution
                  - paragraph [ref=e425]: The correct direction to follow is that the antenna of the sensor should face outwards.
                - img [ref=e427]
                - paragraph [ref=e428]: After confirming that the connection direction is correct, you can connect the USB-C type cable to the computer or power supply, and the sensor will start to work.
                - heading "mmwave Sensor SoftwareDirect link to mmwave Sensor Software" [level=3] [ref=e429]:
                  - text: mmwave Sensor Software
                  - link "Direct link to mmwave Sensor Software" [ref=e430] [cursor=pointer]:
                    - /url: "#mmwave-sensor-software"
                    - text: "#"
                - paragraph [ref=e431]: The software HLKRadarTool can be used to observe the sensor values of the radar directly. The software currently supports IOS, Android and Windows systems.
                - list [ref=e432]:
                  - listitem [ref=e433]:
                    - paragraph [ref=e434]:
                      - link "Download HLKRadarTool from the Google Play" [ref=e435] [cursor=pointer]:
                        - /url: https://play.google.com/store/apps/details?id=com.hlk.hlkradartool
                      - text: .
                  - listitem [ref=e436]:
                    - paragraph [ref=e437]:
                      - link "Download HLKRadarTool from the App Store" [ref=e438] [cursor=pointer]:
                        - /url: https://apps.apple.com/us/app/hlkradartool/id1638651152
                      - text: .
                - img [ref=e440]
                - list [ref=e441]:
                  - listitem [ref=e442]:
                    - link "Download HLKRadarTool for Windows" [ref=e443] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/mmwave-for-xiao/HLKRadarTool.zip
                - img [ref=e445]
                - paragraph [ref=e446]: Below, we describe how to use these software in conjunction with the sensor.
                - heading "Mobile Software Operation GuideDirect link to Mobile Software Operation Guide" [level=3] [ref=e447]:
                  - text: Mobile Software Operation Guide
                  - link "Direct link to Mobile Software Operation Guide" [ref=e448] [cursor=pointer]:
                    - /url: "#mobile-software-operation-guide"
                    - text: "#"
                - paragraph [ref=e449]: If you wish to observe the sensor's values on your mobile phone, then you will need to communicate with your mobile phone using the sensor's Bluetooth, meaning you will also need a Bluetooth-enabled mobile phone. And download the above software in advance.
                - paragraph [ref=e450]:
                  - strong [ref=e451]: Step 1.
                  - text: Open the app, and the app searches for nearby radar devices. The broadcast name of the device is
                  - strong [ref=e452]: HLK-LD2410_xxxx
                  - text: (xxxx is the last four digits of the mac address).
                - img [ref=e454]
                - generic [ref=e455]:
                  - generic [ref=e456]:
                    - img [ref=e458]
                    - text: tip
                  - paragraph [ref=e461]: The use distance of the APP should not exceed the Bluetooth signal range (within 4 meters).
                - paragraph [ref=e462]:
                  - strong [ref=e463]: Step 2.
                  - text: After the module is successfully connected, you can view the radar information, or debug and save the parameters.
                - img [ref=e465]
                - paragraph [ref=e466]:
                  - strong [ref=e467]: Step 3.
                  - text: In the More option in the top right corner of the software, you can access the settings menu to set custom parameters and features for the sensor.
                - img [ref=e469]
                - generic [ref=e470]:
                  - generic [ref=e471]:
                    - img [ref=e473]
                    - text: tip
                  - paragraph [ref=e476]:
                    - text: Before modifying these parameters and settings, we recommend that you read the
                    - link "User Protocol Manual" [ref=e477] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/mmwave-for-xiao/24GHz_mmWave_for_XIAO-Usermanual-V1.00.pdf
                    - text: carefully and refer to the manual's instructions for modifying these. For more details on the meaning of the values displayed by the software and the setting parameters please read the
                    - link "User Protocol Manual" [ref=e478] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/mmwave-for-xiao/24GHz_mmWave_for_XIAO-Usermanual-V1.00.pdf
                    - text: .
                - heading "Windows Software Operation GuideDirect link to Windows Software Operation Guide" [level=3] [ref=e479]:
                  - text: Windows Software Operation Guide
                  - link "Direct link to Windows Software Operation Guide" [ref=e480] [cursor=pointer]:
                    - /url: "#windows-software-operation-guide"
                    - text: "#"
                - paragraph [ref=e481]: In order to facilitate the user to test and configure the module quickly and efficiently, a PC configuration tool is provided. The user can use this tool software to connect the serial port of the module, read and configure the parameters of the module, and receive the detection results reported by the module. Data, and real-time visual display, which greatly facilitates the use of users.
                - paragraph [ref=e482]:
                  - strong [ref=e483]: Step 1.
                  - text: Use the USB to serial port tool to connect the module serial port correctly.
                - table [ref=e485]:
                  - row "USB to serial port tool mmWave Sensor" [ref=e486]:
                    - columnheader [ref=e487]
                    - columnheader "USB to serial port tool" [ref=e488]
                    - columnheader "mmWave Sensor" [ref=e489]
                  - row "3V3 3V3" [ref=e490]:

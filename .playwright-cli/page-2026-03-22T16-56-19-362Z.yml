              - generic [ref=e328]:
                - heading "Seeed Studio 24GHz mmWave for XIAO" [level=1] [ref=e330]
                - img [ref=e332]
                - link "Get One Now 🖱️" [ref=e334] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/Seeed-Studio-24GHz-mmWave-for-XIAO-p-5830.html
                  - strong [ref=e335]:
                    - generic [ref=e336]: Get One Now 🖱️
                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e337]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e338] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - paragraph [ref=e339]: 24GHz mmWave Sensor for XIAO - Human Static Presence is a expansion board for Seeed Studio XIAO series. It is an antenna-integrated, high-sensitivity mmwave radar sensor that is based on the FMCW principle. Combined with radar signal processing and accurate human body sensing algorithms, it can identify human bodies in motion and stationary states.
                - heading "FeatureDirect link to Feature" [level=3] [ref=e340]:
                  - text: Feature
                  - link "Direct link to Feature" [ref=e341] [cursor=pointer]:
                    - /url: "#feature"
                    - text: "#"
                - list [ref=e342]:
                  - listitem [ref=e343]:
                    - strong [ref=e344]: Based on the FMCW principle
                    - text: ": highly sensitive and immune to environmental interferences"
                  - listitem [ref=e345]:
                    - strong [ref=e346]: Comprehensive Human Body Detection
                    - text: ": The sensor not only detects moving human bodies with high sensitivity but also exhibits sensitivity to static individuals, micro-movements, as well as individuals in sitting or lying positions."
                  - listitem [ref=e347]:
                    - strong [ref=e348]: Multi-Level Intelligent Parameter Adjustment
                    - text: ": Adjusted using Bluetooth or a serial port, providing flexibility to meet varying environmental conditions and scene changes. Additionally, it supports direct parameter configuration through an app, eliminating the need for a serial port connection."
                  - listitem [ref=e349]:
                    - strong [ref=e350]: Wide Detection Angle and Long Sensing Distance
                    - text: ": With a field of vision of up to 60 degrees, the sensor can detect movement from a wide angle. Furthermore, it can detect things up to 5 meters away."
                  - listitem [ref=e351]:
                    - strong [ref=e352]: Excellent Shell Penetration and Aesthetics Enhancement
                    - text: ": Has good shell penetration, allowing it to work discreetly inside the product's casing without the need for surface perforations."
                - heading "ApplicationDirect link to Application" [level=3] [ref=e353]:
                  - text: Application
                  - link "Direct link to Application" [ref=e354] [cursor=pointer]:

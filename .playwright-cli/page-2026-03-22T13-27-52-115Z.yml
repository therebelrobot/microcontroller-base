                  - strong [ref=e385]:
                    - generic [ref=e386]: Get One Now 🖱️
                - paragraph [ref=e387]: The XIAO RP2350 packs the power of the Raspberry Pi RP2350 (dual Cortex-M33 cores running at 150MHz with FPU, enhanced security and encryption) into the classic XIAO form factor. Measuring just 21x17.8mm, it features 19 multifunction GPIOs, an RGB LED, and a Battery Management System with ultra-low power consumption of 50μA, battery power supply, and direct battery voltage measurement. Thanks to the XIAO ecosystem, the XIAO RP2350 is compatible with a wide range of add-ons, including displays, LED matrix, Grove modules, CAN Bus, Vision AI sensors, and mmWave sensors. With native support for MicroPython, C, and C++, the XIAO RP2350 is perfect for developers of all levels looking to create compact, battery-powered applications for smart control, wearables, DIY keyboards, and more.
                - heading "Platform SupportedDirect link to Platform Supported" [level=2] [ref=e388]:
                  - text: Platform Supported
                  - link "Direct link to Platform Supported" [ref=e389] [cursor=pointer]:
                    - /url: "#platform-supported"
                    - text: "#"
                - paragraph [ref=e390]: The XIAO RP2350, powered by the RP2350, supports MicroPython and the C/C++ SDK provided by Raspberry Pi. This flexibility allows developers to choose their preferred programming language and environment for prototyping and development.

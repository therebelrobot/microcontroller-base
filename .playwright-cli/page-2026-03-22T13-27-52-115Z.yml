                - paragraph [ref=e861]:
                  - text: Is it possible to read the battery voltage without extra components? Yes, with the XIAO RP2350, it’s easier than ever. In previous XIAO family members, such as the
                  - link "XIAO ESP32C3" [ref=e862] [cursor=pointer]:
                    - /url: /XIAO_ESP32C3_Getting_Started/#check-the-battery-voltage
                  - text: ", reading the battery voltage required manually connecting to"
                  - emphasis [ref=e863]: A0
                  - text: with a resistor.
                - paragraph [ref=e864]:
                  - text: But with the XIAO RP2350, this process is simplified. You can now directly use the
                  - code [ref=e865]: A3/GPIO29
                  - text: pin to read the battery voltage level, streamlining your design and development. Just remember to set the
                  - code [ref=e866]: GPIO19
                  - text: pin to high, as it’s necessary to enable battery level reading.
                - paragraph [ref=e867]: "Follow along with this code snippet to read the battery voltage using the Pico SDK:"
                - generic [ref=e868]:
                  - tablist [ref=e869]:
                    - tab "MicroPython" [selected] [ref=e870] [cursor=pointer]
                    - tab "C/C++ SDK" [ref=e871] [cursor=pointer]
                  - tabpanel [ref=e873]:
                    - generic [ref=e875]:
                      - code [ref=e877]:
                        - generic [ref=e878]: from machine import Pin, ADC
                        - generic [ref=e879]: import time
                        - generic [ref=e880]: "# Function to initialize the GPIO pin for enabling battery voltage reading"
                        - generic [ref=e881]: "def init_gpio():"
                        - generic [ref=e882]: enable_pin = Pin(19, Pin.OUT)
                        - generic [ref=e883]: "enable_pin.value(1) # Set the pin to high to enable battery voltage reading"
                        - generic [ref=e884]: "def main():"
                        - generic [ref=e885]: print("ADC Battery Example - GPIO29 (A3)")
                        - generic [ref=e887]: "init_gpio() # Initialize the enable pin"
                        - generic [ref=e888]: "adc = ADC(Pin(29)) # Initialize the ADC on GPIO29"
                        - generic [ref=e889]: "conversion_factor = 3.3 / (65535) # Conversion factor for 12-bit ADC and 3.3V reference"
                        - generic [ref=e891]: "while True:"
                        - generic [ref=e892]: "result = adc.read_u16() # Read the ADC value"
                        - generic [ref=e893]: "voltage = result * conversion_factor * 2 # Calculate the voltage, considering the voltage divider (factor of 2)"
                        - generic [ref=e894]: "print(\"Raw value: 0x{:03x}, voltage: {:.2f} V\".format(result, voltage))"
                        - generic [ref=e895]: "time.sleep(0.5) # Delay for 500 milliseconds"
                        - generic [ref=e896]: "if __name__ == '__main__':"
                        - generic [ref=e897]: main()

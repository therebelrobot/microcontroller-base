                    - generic [ref=e588]: static const uint32_t GPSBaud = 9600;
                    - generic [ref=e589]: // The TinyGPSPlus object
                    - generic [ref=e590]: TinyGPSPlus gps;
                    - generic [ref=e591]: // The serial connection to the GNSS module
                    - generic [ref=e592]: SoftwareSerial ss(RXPin, TXPin);
                    - generic [ref=e593]: "void setup() {"
                    - generic [ref=e594]: Serial.begin(115200);
                    - generic [ref=e595]: "#ifdef ARDUINO_SEEED_XIAO_RP2040"
                    - generic [ref=e596]: pinMode(D2,OUTPUT);
                    - generic [ref=e597]: digitalWrite(D2,1);
                    - generic [ref=e598]: pinMode(D0,OUTPUT);
                    - generic [ref=e599]: digitalWrite(D0,1);
                    - generic [ref=e600]: "#endif"
                    - generic [ref=e601]: ss.begin(GPSBaud);
                    - generic [ref=e602]: Serial.println(F("DeviceExample.ino"));
                    - generic [ref=e603]: Serial.println(F("A simple demonstration of TinyGPSPlus with L76K GNSS Module"));
                    - generic [ref=e604]: Serial.print(F("Testing TinyGPSPlus library v. "));
                    - generic [ref=e605]: Serial.println(TinyGPSPlus::libraryVersion());
                    - generic [ref=e606]: Serial.println(F("by Mikal Hart"));
                    - generic [ref=e607]: Serial.println();
                    - generic [ref=e608]: "}"
                    - generic [ref=e609]: "void loop() {"
                    - generic [ref=e610]: // This sketch displays information every time a new sentence is correctly encoded.
                    - generic [ref=e611]: while (ss.available() > 0)
                    - generic [ref=e612]: if (gps.encode(ss.read()))
                    - generic [ref=e613]: displayInfo();
                    - generic [ref=e614]: "if (millis() > 5000 && gps.charsProcessed() < 10) {"

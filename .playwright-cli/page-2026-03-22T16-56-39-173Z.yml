                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e397]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e398] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - paragraph [ref=e399]: L76K GNSS Module for SeeedStudio XIAO is a Multi-GNSS (Global Navigation Satellite System) module compatible with all XIAO development boards, supports GPS, BeiDou (BDS), GLONASS and QZSS systems, allows multi-system combined or single-system independent positioning. It also supports AGNSS function, built-in low-noise amplifier and sound surface filter, and provides a good positioning experience of fast, accurate, high-performance.
                - paragraph [ref=e400]: The module comes with a high-performance active GNSS antenna intended to cover GPS L1 C/A, BeiDou B1 and GLONASS L1 bands. The design also has a tiny bright green LED for indicating the 1PPS output on fix.
                - heading "FeaturesDirect link to Features" [level=3] [ref=e401]:

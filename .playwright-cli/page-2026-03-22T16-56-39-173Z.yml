                    - generic [ref=e625]: "} else {"
                    - generic [ref=e626]: Serial.print(F("INVALID"));
                    - generic [ref=e627]: "}"
                    - generic [ref=e628]: "Serial.print(F(\" Date/Time: \"));"
                    - generic [ref=e629]: "if (gps.date.isValid()) {"
                    - generic [ref=e630]: Serial.print(gps.date.month());
                    - generic [ref=e631]: Serial.print(F("/"));

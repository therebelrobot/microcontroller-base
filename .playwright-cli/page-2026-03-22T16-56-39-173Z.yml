                - paragraph [ref=e575]:
                  - text: Once the hardware and software are ready, we start uploading our first example program. The L76K GNSS Module prints the GNSS information via the serial port every 1 second after powering up. In this example, we will use
                  - strong [ref=e576]: TinyGPSPlus
                  - text: library to parse the NMEA sentences received from the module and print the results including atitude, longitude and time to the Arduino IDE's Serial Monitor.
                - paragraph [ref=e577]: "Here is the source code:"
                - generic [ref=e579]:
                  - code [ref=e581]:

                  - listitem [ref=e404]:
                    - strong [ref=e405]: "Enhanced Reception:"
                    - text: Built-in Low Noise Amplifier and Surface Acoustic Wave Filter for improved sensitivity and noise reduction
                  - listitem [ref=e406]:
                    - strong [ref=e407]: "High Precision:"
                    - text: 32/72 channels, -162dBm tracking, -160dBm re-acquisition sensitivity
                  - listitem [ref=e408]:
                    - strong [ref=e409]: Energy Efficiency
                    - text: ": 41mA tracking/acquisition, 360µA standby"
                  - listitem [ref=e410]:
                    - strong [ref=e411]: Multi-GNSS Systems
                    - text: ": Powered by Quectel L76K, supporting GPS, BeiDou, GLONASS and QZSS"
                  - listitem [ref=e412]:
                    - strong [ref=e413]: "Ceramic Antenna:"
                    - text: Enhanced signal reception, superior to traditional antennas.

                  - text: Navigate to
                  - strong [ref=e714]: Tools > Port
                  - text: and select the serial port name of the connected XIAO ESP32C3. This is likely to be COM3 or higher (
                  - strong [ref=e715]: COM1
                  - text: and
                  - strong [ref=e716]: COM2
                  - text: are usually reserved for hardware serial ports).
                - heading "Run your first Blink programDirect link to Run your first Blink program" [level=3] [ref=e717]:
                  - text: Run your first Blink program
                  - link "Direct link to Run your first Blink program" [ref=e718] [cursor=pointer]:

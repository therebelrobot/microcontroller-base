                - list [ref=e719]:
                  - listitem [ref=e720]:
                    - strong [ref=e721]: Step 1.
                    - text: Copy the below code to Arduino IDE
                - paragraph [ref=e722]:
                  - text: Make sure your
                  - code [ref=e723]: D10
                  - text: is connected to an LED as shown in the diagram above.
                - generic [ref=e725]:
                  - code [ref=e727]:
                    - generic [ref=e728]: // define led according to pin diagram in article
                    - generic [ref=e729]: const int led = D10; // there is no LED_BUILTIN available for the XIAO ESP32C3.
                    - generic [ref=e730]: "void setup() {"
                    - generic [ref=e731]: // initialize digital pin led as an output
                    - generic [ref=e732]: pinMode(led, OUTPUT);

                - list [ref=e630]:
                  - listitem [ref=e631]: 5V - This is 5v out from the USB port. You can also use this as a voltage input but you must have some sort of diode (schottky, signal, power) between your external power source and this pin with anode to battery, cathode to 5V pin.
                  - listitem [ref=e632]: 3V3 - This is the regulated output from the onboard regulator. You can draw 700mA
                  - listitem [ref=e633]: GND - Power/data/signal ground
                - heading "Strapping PinsDirect link to Strapping Pins" [level=3] [ref=e634]:
                  - text: Strapping Pins
                  - link "Direct link to Strapping Pins" [ref=e635] [cursor=pointer]:
                    - /url: "#strapping-pins"
                    - text: "#"
                - paragraph [ref=e636]:
                  - text: According to the chip manual of ESP32C3,
                  - strong [ref=e637]: GPIO2
                  - text: ","
                  - strong [ref=e638]: GPIO8
                  - text: and
                  - strong [ref=e639]: GPIO9
                  - text: in the chip are Strapping Pins, the high and low level configurations of these pins may allow the chip to enter into different Boot modes, please pay attention to this point when you use these pins, otherwise it may prevent your XIAO from uploading or executing the program all the time.
                - img [ref=e641]
                - heading "Getting startedDirect link to Getting started" [level=2] [ref=e642]:
                  - text: Getting started
                  - link "Direct link to Getting started" [ref=e643] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e644]: First, we are going to connect XIAO ESP32C3 to the computer, connect an LED to the board and upload a simple code from Arduino IDE to check whether the board is functioning well by blinking the connected LED.
                - heading "Hardware PreparationDirect link to Hardware Preparation" [level=3] [ref=e645]:
                  - text: Hardware Preparation
                  - link "Direct link to Hardware Preparation" [ref=e646] [cursor=pointer]:
                    - /url: "#hardware-preparation"
                    - text: "#"
                - paragraph [ref=e647]: "You need to prepare the following:"
                - list [ref=e648]:
                  - listitem [ref=e649]:
                    - text: 1 x
                    - link "Seeed Studio XIAO ESP32C3" [ref=e650] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/seeed-xiao-esp32c3-p-5431.html
                  - listitem [ref=e651]: 1 x Computer
                  - listitem [ref=e652]: 1 x USB Type-C cable
                - generic [ref=e653]:
                  - generic [ref=e654]:
                    - img [ref=e656]
                    - text: tip
                  - paragraph [ref=e659]:
                    - text: Some USB cables can only supply power and cannot transfer data. If you don't have a USB cable or don't know if your USB cable can transmit data, you can check
                    - link "Seeed USB Type-C support USB 3.1" [ref=e660] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/USB-3-1-Type-C-to-A-Cable-1-Meter-3-1A-p-4085.html
                    - text: .
                - list [ref=e661]:
                  - listitem [ref=e662]:
                    - strong [ref=e663]: Step 1.
                    - text: Connect XIAO ESP32C3 to your computer via a USB Type-C cable.
                - img [ref=e665]
                - list [ref=e666]:
                  - listitem [ref=e667]:
                    - strong [ref=e668]: Step 2.
                    - text: Connect an LED to D10 pin as follows
                - img [ref=e670]
                - paragraph [ref=e671]:
                  - strong [ref=e672]: "Note:"
                  - text: Make sure to connect a resistor (about 150Ω) in series to limit the current through the LED and to prevent excess current that can burn out the LED
                - heading "Software PreparationDirect link to Software Preparation" [level=3] [ref=e673]:
                  - text: Software Preparation
                  - link "Direct link to Software Preparation" [ref=e674] [cursor=pointer]:
                    - /url: "#software-preparation"
                    - text: "#"
                - list [ref=e675]:
                  - listitem [ref=e676]:
                    - strong [ref=e677]: Step 1.
                    - text: Download and Install the latest version of Arduino IDE according to your operating system
                - paragraph [ref=e678]:
                  - link [ref=e679] [cursor=pointer]:
                    - /url: https://www.arduino.cc/en/software
                    - img [ref=e680]
                - list [ref=e681]:
                  - listitem [ref=e682]:
                    - paragraph [ref=e683]:
                      - strong [ref=e684]: Step 2.
                      - text: Launch the Arduino application
                  - listitem [ref=e685]:
                    - paragraph [ref=e686]:
                      - strong [ref=e687]: Step 3.
                      - text: Add ESP32 board package to your Arduino IDE
                - paragraph [ref=e688]:
                  - text: Navigate to
                  - strong [ref=e689]: File > Preferences
                  - text: ", and fill"
                  - strong [ref=e690]: "\"Additional Boards Manager URLs\""
                  - text: "with the url below:"
                  - emphasis [ref=e691]:
                    - link "https://jihulab.com/esp-mirror/espressif/arduino-esp32.git" [ref=e692] [cursor=pointer]:
                      - /url: https://jihulab.com/esp-mirror/espressif/arduino-esp32.git
                - img [ref=e694]
                - paragraph [ref=e695]:
                  - text: Navigate to
                  - strong [ref=e696]: Tools > Board > Boards Manager...
                  - text: ", type the keyword \""
                  - strong [ref=e697]: esp32
                  - text: "\" in the search box, select the latest version of"
                  - strong [ref=e698]: esp32
                  - text: ", and install it."
                - img [ref=e700]
                - list [ref=e701]:
                  - listitem [ref=e702]:
                    - strong [ref=e703]: Step 4.
                    - text: Select your board and port
                - paragraph [ref=e704]:
                  - strong [ref=e705]: Board
                - paragraph [ref=e706]:
                  - text: Navigate to
                  - strong [ref=e707]: Tools > Board > ESP32 Arduino
                  - text: and select "
                  - strong [ref=e708]: XIAO_ESP32C3
                  - text: "\". The list of board is a little long and you need to roll to the buttom to reach it."
                - img [ref=e710]
                - paragraph [ref=e711]:
                  - strong [ref=e712]: Port

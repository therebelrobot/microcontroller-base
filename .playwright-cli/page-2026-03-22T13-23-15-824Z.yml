                - heading "FeaturesDirect link to Features" [level=3] [ref=e437]:
                  - text: Features
                  - link "Direct link to Features" [ref=e438] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e439]:
                  - listitem [ref=e440]:
                    - strong [ref=e441]: "Powerful CPU:"
                    - text: ESP32-C3, 32bit RISC-V singlecore processor that operates at up to 160 MHz
                  - listitem [ref=e442]:
                    - strong [ref=e443]: "Complete WiFi subsystem:"
                    - text: Complies with IEEE 802.11b/g/n protocol and supports Station mode, SoftAP mode, SoftAP + Station mode, and promiscuous mode
                  - listitem [ref=e444]:
                    - strong [ref=e445]: "Bluetooth LE subsystem:"
                    - text: Supports features of Bluetooth 5 and Bluetooth mesh
                  - listitem [ref=e446]:
                    - strong [ref=e447]: "Ultra-Low Power:"
                    - text: Deep sleep power consumption is about 43μA
                  - listitem [ref=e448]:
                    - strong [ref=e449]: "Better RF performance:"
                    - text: External RF antenna included
                  - listitem [ref=e450]:
                    - strong [ref=e451]: "Battery charging chip:"
                    - text: Supports lithium battery charge and discharge management
                  - listitem [ref=e452]:
                    - strong [ref=e453]: "Rich on-chip resources:"
                    - text: 400KB of SRAM, and 4MB of on-board flash memory
                  - listitem [ref=e454]:
                    - strong [ref=e455]: "Ultra small size:"
                    - text: As small as a thumb(21x17.8mm) XIAO series classic form-factor for wearable devices and small projects
                  - listitem [ref=e456]:
                    - strong [ref=e457]: "Reliable security features:"
                    - text: Cryptographic hardware accelerators that support AES-128/256, Hash, RSA, HMAC, digital signature and secure boot
                  - listitem [ref=e458]:
                    - strong [ref=e459]: "Rich interfaces:"
                    - text: 1xI2C, 1xSPI, 2xUART, 11xGPIO(PWM), 4xADC, 1xJTAG bonding pad interface
                  - listitem [ref=e460]: Single-sided components, surface mounting design

                - img [ref=e755]
                - paragraph [ref=e756]: Once uploaded, you will see the connected LED blinking with a 1-second delay between each blink. This means the connection is successful and now you can explore more projects with XIAO ESP32C3!
                - heading "Battery UsageDirect link to Battery Usage" [level=2] [ref=e757]:
                  - text: Battery Usage
                  - link "Direct link to Battery Usage" [ref=e758] [cursor=pointer]:
                    - /url: "#battery-usage"
                    - text: "#"
                - paragraph [ref=e759]: The XIAO ESP32C3 is capable of using a 3.7V lithium battery as the power supply input. You can refer to the following diagram for the wiring method.
                - img "pir" [ref=e761]
                - generic [ref=e762]:
                  - generic [ref=e763]:
                    - img [ref=e765]
                    - text: caution
                  - paragraph [ref=e768]: Please be careful not to short-circuit the positive and negative terminals and burn the battery and equipment when soldering.
                - paragraph [ref=e769]:
                  - strong [ref=e770]: "Instructions on the use of batteries:"
                - list [ref=e771]:
                  - listitem [ref=e772]: Please use qualified batteries that meet the specifications.
                  - listitem [ref=e773]: XIAO can be connected to your computer device via data cable while using the battery, rest assured that XIAO has a built-in circuit protection chip, which is safe.
                  - listitem [ref=e774]: The XIAO ESP32C3 will not have any LED on when it is battery powered (unless you have written a specific program), please do not judge whether the XIAO ESP32C3 is working or not by the condition of the LED, please judge it reasonably by your program.
                  - listitem [ref=e775]: Sorry, we currently have no way to help you check the remaining battery level through software (because there are no more chip pins available), you need to charge the battery regularly or use a multimeter to check the battery level.
                - heading "Check the battery voltageDirect link to Check the battery voltage" [level=3] [ref=e776]:
                  - text: Check the battery voltage
                  - link "Direct link to Check the battery voltage" [ref=e777] [cursor=pointer]:
                    - /url: "#check-the-battery-voltage"
                    - text: "#"
                - paragraph [ref=e778]: Due to the limitation of the number of pins in the ESP32C3, engineers had no extra pins to allocate to the battery for voltage measurement in order to ensure that the XIAO ESP32C3 has the same number of GPIOs as the other XIAO series available.
                - paragraph [ref=e779]:
                  - text: But if you prefer to use a separate pin for battery voltage measurement, you can refer to the genius operation of
                  - link "msfujino" [ref=e780] [cursor=pointer]:
                    - /url: https://forum.seeedstudio.com/u/msfujino
                  - text: . We would also like to give a special thanks to
                  - link "msfujino" [ref=e781] [cursor=pointer]:
                    - /url: https://forum.seeedstudio.com/u/msfujino
                  - text: for all the experience and efforts shared for the XIAO ESP32C3.
                - paragraph [ref=e782]: "The basic operating idea is: The battery voltage was divided by 1/2 with 200k and connected to the A0 port so that the voltage could be monitored."
                - img "pir" [ref=e784]
                - paragraph [ref=e785]: The datasheet says nominally 2500mV full scale AD conversion, but there is a large variation from chip to chip, actually ±10%. My chip was 2700mV full scale.
                - paragraph [ref=e786]:
                  - text: Fortunately, the calibrated correction value for each chip is written in the fuse area, and by using the function
                  - code [ref=e787]: analogReadMilliVolts()
                  - text: ", I can read the corrected voltage value without doing anything special."
                - paragraph [ref=e788]: The result of AD conversion and the voltage measured by the multimeter agree well with each other with an error of about 5 mV, which is not a problem in practical use.
                - paragraph [ref=e789]: In addition, during communication in particular, spike-like errors occurred, which had to be averaged out 16 times to remove them.
                - paragraph [ref=e790]: The following is the procedure to test the battery voltage.
                - generic [ref=e792]:
                  - code [ref=e794]:
                    - generic [ref=e795]: "void setup() {"
                    - generic [ref=e796]: Serial.begin(115200);
                    - generic [ref=e797]: pinMode(A0, INPUT); // ADC
                    - generic [ref=e798]: "}"
                    - generic [ref=e799]: "void loop() {"
                    - generic [ref=e800]: uint32_t Vbatt = 0;
                    - generic [ref=e801]: "for(int i = 0; i < 16; i++) {"

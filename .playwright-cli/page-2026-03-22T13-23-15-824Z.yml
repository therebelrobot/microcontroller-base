                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e374]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e375] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - paragraph [ref=e376]:
                  - strong [ref=e377]: Seeed Studio XIAO ESP32C3
                  - text: is an IoT mini development board based on the Espressif
                  - strong [ref=e378]: ESP32-C3
                  - text: WiFi/Bluetooth dual-mode chip, featuring a
                  - strong [ref=e379]: 32-bit RISC-V CPU
                  - text: that delivers powerful computing performance with its efficient architecture. It has excellent radio frequency performance, supporting
                  - strong [ref=e380]: IEEE 802.11 b/g/n WiFi
                  - text: ", and"
                  - strong [ref=e381]: Bluetooth 5 (BLE)
                  - text: protocols. This board comes included with an external antenna to increase the signal strength for your wireless applications. It also has a
                  - strong [ref=e382]: small and exquisite form-factor
                  - text: combined with a
                  - strong [ref=e383]: single-sided surface-mountable design
                  - text: . It is equipped with rich interfaces and has
                  - strong [ref=e384]: 11 digital I/O
                  - text: that can be used as
                  - strong [ref=e385]: PWM pins
                  - text: and
                  - strong [ref=e386]: 4 analog I/O
                  - text: that can be used as
                  - strong [ref=e387]: ADC pins
                  - text: . It supports four serial interfaces such as
                  - strong [ref=e388]: UART, I2C and SPI
                  - text: . There is also a small
                  - strong [ref=e389]: reset button
                  - text: and a
                  - strong [ref=e390]: bootloader mode button
                  - text: on the board. XIAO ESP32C3 is fully compatible with the
                  - link "Grove Shield for Seeeduino XIAO" [ref=e391] [cursor=pointer]:
                    - /url: https://www.seeedstudio.com/Grove-Shield-for-Seeeduino-XIAO-p-4621.html
                  - text: and
                  - link "Seeeduino XIAO Expansion board" [ref=e392] [cursor=pointer]:
                    - /url: https://wiki.seeedstudio.com/Seeeduino-XIAO-Expansion-Board
                  - text: except for the Seeeduino XIAO Expansion board, the SWD spring contacts on the board will not be compatible.
                - paragraph [ref=e393]:
                  - text: With regard to the features highlighted above, XIAO ESP32C3 is positioned as a
                  - strong [ref=e394]: high-performance, low-power, cost-effective IoT mini development board
                  - text: ", suitable for"
                  - strong [ref=e395]: low-power IoT applications and wireless wearable applications
                  - text: .

              - generic [ref=e365]:
                - heading "Getting Started with Seeed Studio XIAO RP2040" [level=1] [ref=e367]
                - paragraph [ref=e368]:
                  - img "pir" [ref=e369]
                - paragraph [ref=e370]:
                  - text: The Seeed Studio XIAO RP2040 is as small as the Seeed Studio XIAO SAMD21 but it's more powerful. On one hand, it carries the powerful Dual-core RP2040 processor that can flexible clock running up to 133 MHz which is a low-power microcontrollers. On the Seeed Studio XIAO RP2040 there is also 264KB of SRAM, and 2MB of on-board Flash memory which can provide more program to save and run. On the other hand, this little board has good performance in processing but needs less power.
                  - text: All in all, it is designed in a tiny size as small as a thumb(21x17.8mm) and can be used for wearable devices and small projects.
                - paragraph [ref=e371]: There are 14 GPIO PINs on Seeed Studio XIAO RP2040, on which there are 11 digital pins, 4 analog pins, 11 PWM Pins,1 I2C interface, 1 UART interface, 1 SPI interface, 1 SWD Bonding pad interface.
                - paragraph [ref=e372]: Seeed Studio XIAO RP2040 is compatible to the Seeed Studio XIAO expansion board.
                - link "Get One Now 🖱️" [ref=e374] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/XIAO-RP2040-v1-0-p-5026.html
                  - strong [ref=e375]:
                    - generic [ref=e376]: Get One Now 🖱️

                  - listitem [ref=e598]:
                    - text: Press the "R" pins
                    - strong [ref=e599]: once
                    - text: .
                - paragraph [ref=e600]: "Please note: The behavior of the built-in programmable Single-colour LEDs (They are red, blue and green) are reversed to the one on an Arduino. On the Seeed Studio XIAO RP2040, the pin has to be pulled low to enable."

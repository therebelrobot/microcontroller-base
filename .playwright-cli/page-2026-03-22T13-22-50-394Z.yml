                  - listitem [ref=e381]: "Powerful MCU: Dual-core ARM Cortex M0+ processor, flexible clock running up to 133 MHz"
                  - listitem [ref=e382]: "Rich on-chip resources: 264KB of SRAM, and 2MB of on-board Flash memory"
                  - listitem [ref=e383]: "Flexible compatibility: Support Micropython/Arduino/CircuitPython"
                  - listitem [ref=e384]: "Easy project operation: Breadboard-friendly & SMD design, no components on the back"
                  - listitem [ref=e385]: "Small size: As small as a thumb(21x17.8mm) for wearable devices and small projects."
                  - listitem [ref=e386]: "Multiple interfaces: 11 digital pins, 4 analog pins, 11 PWM Pins,1 I2C interface, 1 UART interface, 1 SPI interface, 1 SWD Bonding pad interface."

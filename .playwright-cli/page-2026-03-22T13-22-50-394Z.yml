                - heading "Enter Bootloader ModeDirect link to enter-bootloader-mode" [level=3] [ref=e583]:
                  - strong [ref=e584]: Enter Bootloader Mode
                  - link "Direct link to enter-bootloader-mode" [ref=e585] [cursor=pointer]:
                    - /url: "#enter-bootloader-mode"
                    - text: "#"
                - paragraph [ref=e586]: "Sometimes the Seeed Studio XIAO RP2040 port may disappear when user programming process fails. We can solve this problem by the following operation:"
                - list [ref=e587]:
                  - listitem [ref=e588]: Long press the "B" button.
                  - listitem [ref=e589]: Connect the Seeed Studio XIAO PR2040 to your computer.
                  - listitem [ref=e590]: The computer will appear a disk driver.
                - paragraph [ref=e591]: At this point, the chip enters Bootloader mode and the burn port appears again. Because the RP2040 chip has two partitions, one is the Bootloader and the other is the user program. The product will burn a bootloader code in the system memory when it leaves the factory. We can switch modes by performing the above steps.
                - heading "ResetDirect link to reset" [level=3] [ref=e592]:
                  - strong [ref=e593]: Reset

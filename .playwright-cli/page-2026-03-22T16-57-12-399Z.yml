                    - strong [ref=e526]: num
                    - text: represents which register to use. You can fill 0 or 1 for mask and 0 to 5 for filter.
                  - listitem [ref=e527]:
                    - strong [ref=e528]: ext
                    - text: represents the status of the frame. 0 means it's a mask or filter for a standard frame. 1 means it's for a extended frame.
                  - listitem [ref=e529]:
                    - strong [ref=e530]: ulData
                    - text: represents the content of the mask of filter.
                - heading "3. Check ReceiveDirect link to 3. Check Receive" [level=3] [ref=e531]:

                - 'heading "Q1: What is the maximum baud rate supported by the XIAO CAN Bus Expansion Board?Direct link to Q1: What is the maximum baud rate supported by the XIAO CAN Bus Expansion Board?" [level=3] [ref=e715]':
                  - text: "Q1: What is the maximum baud rate supported by the XIAO CAN Bus Expansion Board?"
                  - 'link "Direct link to Q1: What is the maximum baud rate supported by the XIAO CAN Bus Expansion Board?" [ref=e716] [cursor=pointer]':
                    - /url: "#q1-what-is-the-maximum-baud-rate-supported-by-the-xiao-can-bus-expansion-board"
                    - text: "#"
                - paragraph [ref=e717]: The maximum baud rate supported by the MCP2515 controller on the expansion board is 1 Mbps. Please ensure that the baud rate settings of your CAN bus network are compatible with this limitation.
                - 'heading "Q2: Can I use multiple XIAO CAN Bus Expansion Boards in the same CAN bus network?Direct link to Q2: Can I use multiple XIAO CAN Bus Expansion Boards in the same CAN bus network?" [level=3] [ref=e718]':
                  - text: "Q2: Can I use multiple XIAO CAN Bus Expansion Boards in the same CAN bus network?"
                  - 'link "Direct link to Q2: Can I use multiple XIAO CAN Bus Expansion Boards in the same CAN bus network?" [ref=e719] [cursor=pointer]':
                    - /url: "#q2-can-i-use-multiple-xiao-can-bus-expansion-boards-in-the-same-can-bus-network"
                    - text: "#"
                - paragraph [ref=e720]: Yes, you can use multiple expansion boards in the same CAN bus network. Each expansion board should have a unique node ID assigned to it to ensure proper communication and avoid conflicts on the bus.
                - 'heading "Q3: Can I use the XIAO CAN Bus Expansion Board with other microcontrollers or development boards?Direct link to Q3: Can I use the XIAO CAN Bus Expansion Board with other microcontrollers or development boards?" [level=3] [ref=e721]':
                  - text: "Q3: Can I use the XIAO CAN Bus Expansion Board with other microcontrollers or development boards?"
                  - 'link "Direct link to Q3: Can I use the XIAO CAN Bus Expansion Board with other microcontrollers or development boards?" [ref=e722] [cursor=pointer]':
                    - /url: "#q3-can-i-use-the-xiao-can-bus-expansion-board-with-other-microcontrollers-or-development-boards"
                    - text: "#"
                - paragraph [ref=e723]: The XIAO CAN Bus Expansion Board is specifically designed to work with the Seeed Studio XIAO development board. However, with proper pin mapping and configuration, it may be possible to use it with other microcontrollers or development boards that support the necessary CAN bus communication protocols.
                - 'heading "Q4: Are there any limitations on the maximum cable length for the CAN bus connection?Direct link to Q4: Are there any limitations on the maximum cable length for the CAN bus connection?" [level=3] [ref=e724]':
                  - text: "Q4: Are there any limitations on the maximum cable length for the CAN bus connection?"
                  - 'link "Direct link to Q4: Are there any limitations on the maximum cable length for the CAN bus connection?" [ref=e725] [cursor=pointer]':
                    - /url: "#q4-are-there-any-limitations-on-the-maximum-cable-length-for-the-can-bus-connection"
                    - text: "#"
                - paragraph [ref=e726]: The maximum cable length for the CAN bus connection depends on factors such as the baud rate, cable quality, and electromagnetic interference. In general, for lower baud rates, longer cable lengths (up to several hundred meters) can be supported. However, for higher baud rates, it is recommended to keep the cable length shorter (within a few meters) to maintain reliable communication.
                - 'heading "Q5: How can I troubleshoot CAN bus communication issues?Direct link to Q5: How can I troubleshoot CAN bus communication issues?" [level=3] [ref=e727]':
                  - text: "Q5: How can I troubleshoot CAN bus communication issues?"
                  - 'link "Direct link to Q5: How can I troubleshoot CAN bus communication issues?" [ref=e728] [cursor=pointer]':
                    - /url: "#q5-how-can-i-troubleshoot-can-bus-communication-issues"
                    - text: "#"
                - paragraph [ref=e729]: "If you encounter any issues with CAN bus communication, you can follow these steps for troubleshooting:"
                - list [ref=e730]:
                  - listitem [ref=e731]: Verify the physical connections of the CAN bus network, ensuring correct wiring and termination.
                  - listitem [ref=e732]: Check the baud rate settings and ensure they match on all devices connected to the CAN bus.
                  - listitem [ref=e733]: Monitor the CAN bus traffic using a CAN bus analyzer or terminal software to identify any errors or issues in the transmitted messages.
                  - listitem [ref=e734]: Double-check the program code for proper initialization and configuration of the MCP2515 controller.
                  - listitem [ref=e735]: Ensure that the power supply to the XIAO development board and the CAN bus network is stable and within the specified voltage range.
                  - listitem [ref=e736]: If you have any other questions or issues not covered in this FAQ section, please feel free to contact our technical support team for further assistance.

                      - /url: /SeeedStudio_XIAO_Series_Introduction/
                  - listitem [ref=e377]:
                    - generic [ref=e378]: Expansion Boards for XIAO
                  - listitem [ref=e379]:
                    - generic [ref=e380]: XIAO CAN Bus Expansion Board
              - generic [ref=e381]:
                - heading "XIAO CAN Bus Expansion Board" [level=1] [ref=e383]
                - paragraph [ref=e384]:
                  - img "pir" [ref=e385]
                - link "Get One Now 🖱️" [ref=e387] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/Seeed-Studio-CAN-Bus-Breakout-Board-for-XIAO-and-QT-Py-p-5702.html
                  - strong [ref=e388]:
                    - generic [ref=e389]: Get One Now 🖱️
                - paragraph [ref=e390]: The XIAO CAN Bus Expansion Board is specifically designed to work with the Seeed Studio XIAO development board, providing an easy and convenient way to add CAN bus communication functionality to your projects. CAN bus (Controller Area Network) is a widely used communication protocol in automotive, industrial, and other embedded systems, allowing for reliable and robust data exchange between different nodes.
                - paragraph [ref=e391]: The integration of the MCP2515 controller and SN65HVD230 transceiver chips on the expansion board ensures seamless and efficient communication over the CAN bus. The MCP2515 controller handles the protocol management, message filtering, and error handling, while the SN65HVD230 transceiver converts the digital signals from the controller into the differential signals required for CAN bus communication.
                - paragraph [ref=e392]: With the XIAO CAN Bus Expansion Board, you can leverage the power of the Seeed Studio XIAO development board and its extensive ecosystem to create projects that require CAN bus communication. Whether you're working on automotive applications, industrial control systems, robotics projects, or IoT devices, this expansion board provides a reliable and compact solution for integrating CAN bus capabilities into your designs.
                - paragraph [ref=e393]: The expansion board features a user-friendly terminal connection, allowing you to easily connect the CANH and CANL lines to the CAN bus network. The compact design of the board ensures compatibility with various project enclosures and facilitates seamless integration into your existing setups.
                - paragraph [ref=e394]: By utilizing the XIAO CAN Bus Expansion Board, you can take advantage of the robustness, reliability, and scalability of the CAN bus protocol, enabling efficient data exchange, system control, and interconnectivity in your projects.
                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e395]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e396] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - heading "FeaturesDirect link to Features" [level=3] [ref=e397]:
                  - text: Features
                  - link "Direct link to Features" [ref=e398] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e399]:
                  - listitem [ref=e400]: "Compatibility: Designed to work seamlessly with the Seeed Studio XIAO development board."
                  - listitem [ref=e401]: "MCP2515 Controller: The onboard MCP2515 chip provides reliable control and handling of the CAN bus communication."
                  - listitem [ref=e402]: "SN65HVD230 Transceiver: The integrated SN65HVD230 chip ensures accurate signal conversion and robust communication over the CAN bus."
                  - listitem [ref=e403]: "Terminal Connection: The CANH and CANL lines are conveniently accessible through a 3-pin terminal, allowing easy connection to the CAN bus."
                  - listitem [ref=e404]: "Compact Design: The expansion board has been designed with a compact form factor, making it suitable for various applications."
                - heading "SpecificationDirect link to Specification" [level=3] [ref=e405]:
                  - text: Specification
                  - link "Direct link to Specification" [ref=e406] [cursor=pointer]:
                    - /url: "#specification"
                    - text: "#"
                - list [ref=e407]:
                  - listitem [ref=e408]: "Compatibility: Seeed Studio XIAO development board."
                  - listitem [ref=e409]: "Communication Interface: CAN bus (Controller Area Network)."
                  - listitem [ref=e410]: "CAN Transceiver: SN65HVD230."
                  - listitem [ref=e411]: "CAN Controller: MCP2515."
                  - listitem [ref=e412]: "Terminal Connection: 2-pin terminal for CANH and CANL lines."
                - heading "ApplicationsDirect link to Applications" [level=3] [ref=e413]:
                  - text: Applications
                  - link "Direct link to Applications" [ref=e414] [cursor=pointer]:
                    - /url: "#applications"
                    - text: "#"
                - paragraph [ref=e415]: "The XIAO CAN Bus Expansion Board can be utilized in various projects that require CAN bus communication. Here are a few application ideas to inspire you:"
                - list [ref=e416]:
                  - listitem [ref=e417]: "Automotive Projects: Connect the expansion board to the XIAO and build automotive applications that require CAN bus communication, such as vehicle diagnostics or data logging."
                  - listitem [ref=e418]: "Industrial Control Systems: Utilize the CAN bus capabilities to interface with industrial devices and systems, enabling efficient data exchange and control."
                  - listitem [ref=e419]: "Robotics: Incorporate the expansion board into your robotic projects to enable communication between different robotic modules and components."
                  - listitem [ref=e420]: "IoT Applications: Integrate the expansion board with IoT devices to facilitate communication and data exchange over the CAN bus protocol."
                - paragraph [ref=e421]: Please refer to the XIAO CAN Bus Expansion Board datasheet and examples for detailed usage instructions and code samples.
                - heading "Hardware OverviewDirect link to Hardware Overview" [level=2] [ref=e422]:
                  - text: Hardware Overview

                - heading "Getting StartedDirect link to Getting Started" [level=2] [ref=e684]:
                  - text: Getting Started
                  - link "Direct link to Getting Started" [ref=e685] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - heading "Hardware PreparationDirect link to Hardware Preparation" [level=3] [ref=e686]:
                  - text: Hardware Preparation
                  - link "Direct link to Hardware Preparation" [ref=e687] [cursor=pointer]:
                    - /url: "#hardware-preparation"
                    - text: "#"
                - paragraph [ref=e688]: "You need to prepare the following:"
                - list [ref=e689]:
                  - listitem [ref=e690]:
                    - text: 1 x
                    - link "Seeed Studio XIAO RA4M1" [ref=e691] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-XIAO-RA4M1-p-5943.html?utm_source=seeed&utm_medium=wiki&utm&product=xiao-ra4m1
                  - listitem [ref=e692]: 1 x Computer
                  - listitem [ref=e693]: 1 x USB Type-C cable
                - generic [ref=e694]:
                  - generic [ref=e695]:
                    - img [ref=e697]
                    - text: tip
                  - paragraph [ref=e700]:
                    - text: Some USB cables can only supply power and cannot transfer data. If you don't have a USB cable or don't know if your USB cable can transmit data, you can check
                    - link "Seeed USB Type-C support USB 3.1" [ref=e701] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/USB-3-1-Type-C-to-A-Cable-1-Meter-3-1A-p-4085.html
                    - text: .
                - heading "Software PreparationDirect link to Software Preparation" [level=3] [ref=e702]:
                  - text: Software Preparation
                  - link "Direct link to Software Preparation" [ref=e703] [cursor=pointer]:
                    - /url: "#software-preparation"
                    - text: "#"
                - paragraph [ref=e704]: The recommended programming tool for the XIAO RA4M1 is the Arduino IDE, so as part of the software preparation, you will need to complete the Arduino installation.
                - generic [ref=e705]:
                  - generic [ref=e706]:
                    - img [ref=e708]
                    - text: tip
                  - paragraph [ref=e711]:
                    - text: If this is your first time using Arduino, we highly recommend you to refer to
                    - link "Getting Started with Arduino" [ref=e712] [cursor=pointer]:
                      - /url: https://wiki.seeedstudio.com/Getting_Started_with_Arduino/
                    - text: .
                - list [ref=e713]:
                  - listitem [ref=e714]:
                    - strong [ref=e715]: Step 1.
                    - text: Download and Install the stable version of Arduino IDE according to your operating system.
                - link "Download Arduino IDE" [ref=e717] [cursor=pointer]:
                  - /url: https://www.arduino.cc/en/software
                  - strong [ref=e718]:
                    - generic [ref=e719]: Download Arduino IDE
                - list [ref=e720]:
                  - listitem [ref=e721]:
                    - paragraph [ref=e722]:
                      - strong [ref=e723]: Step 2.
                      - text: Launch the Arduino application.
                  - listitem [ref=e724]:
                    - paragraph [ref=e725]:
                      - strong [ref=e726]: Step 3.
                      - text: Add RA4M1 board package to your Arduino IDE.
                    - paragraph [ref=e727]:
                      - text: Navigate to
                      - strong [ref=e728]: File > Preferences
                      - text: ", and fill"
                      - strong [ref=e729]: "\"Additional Boards Manager URLs\""
                      - text: "with the url below:"
                      - emphasis [ref=e730]:
                        - link "https://files.seeedstudio.com/arduino/package_renesas_1.2.0_index.json" [ref=e731] [cursor=pointer]:
                          - /url: https://files.seeedstudio.com/arduino/package_renesas_1.2.0_index.json
                    - img [ref=e733]
                    - paragraph [ref=e734]:
                      - text: Navigate to
                      - strong [ref=e735]: Tools > Board > Boards Manager...
                      - text: ", type the keyword"
                      - strong [ref=e736]: RA4M1
                      - text: in the search box, select the latest version of
                      - strong [ref=e737]: Seeed Renesas Board
                      - text: ", and install it."
                    - img [ref=e739]
                  - listitem [ref=e740]:
                    - paragraph [ref=e741]:
                      - strong [ref=e742]: Step 4.
                      - text: Select your board and port.
                    - paragraph [ref=e743]:
                      - text: On top of the Arduino IDE, you can search for
                      - strong [ref=e744]: xiao
                      - text: in the development board on the left, select XIAO_RA4M1, and select the port directly.
                    - img [ref=e746]
                - heading "BootLoader ModeDirect link to BootLoader Mode" [level=2] [ref=e747]:
                  - text: BootLoader Mode
                  - link "Direct link to BootLoader Mode" [ref=e748] [cursor=pointer]:
                    - /url: "#bootloader-mode"
                    - text: "#"
                - paragraph [ref=e749]: "Sometimes, using the wrong program can cause the XIAO to lose its port or not function correctly. Common issues include:"
                - list [ref=e750]:
                  - listitem [ref=e751]: The XIAO is connected to the computer, but no port number is found.
                  - listitem [ref=e752]: The XIAO is connected, and a port number appears, but the program upload fails.
                - paragraph [ref=e753]: "When you encounter the above two situations, you can try to put XIAO into BootLoader mode, which can solve most of the problems of unrecognized devices and failed uploads. The specific method is:"
                - list [ref=e754]:
                  - listitem [ref=e755]:
                    - strong [ref=e756]: Method 1.
                    - text: Press and hold the
                    - code [ref=e757]: BOOT
                    - text: button on the XIAO RA4M1 without releasing it.
                  - listitem [ref=e758]:
                    - strong [ref=e759]: Method 2.
                    - text: Keep the
                    - code [ref=e760]: BOOT
                    - text: button pressed and then connect to the computer via the data cable. Release the BOOT button after connecting to the computer.
                - heading "ResetDirect link to Reset" [level=2] [ref=e761]:
                  - text: Reset
                  - link "Direct link to Reset" [ref=e762] [cursor=pointer]:
                    - /url: "#reset"
                    - text: "#"
                - paragraph [ref=e763]:
                  - text: When the program runs abnormally, you can press
                  - code [ref=e764]: Reset
                  - text: once during power-up to let XIAO re-execute the uploaded program. When you press and hold the
                  - code [ref=e765]: BOOT
                  - text: key while powering up and then press the
                  - code [ref=e766]: Reset
                  - text: key once, you can also enter BootLoader mode.
                - heading "Run your first Blink programDirect link to Run your first Blink program" [level=2] [ref=e767]:
                  - text: Run your first Blink program
                  - link "Direct link to Run your first Blink program" [ref=e768] [cursor=pointer]:
                    - /url: "#run-your-first-blink-program"
                    - text: "#"
                - paragraph [ref=e769]: By now, I believe you have a good understanding of the features and hardware of the XIAO RA4M1. Next, let's take the simplest Blink program as an example and perform the first blink for your XIAO RA4M1!
                - list [ref=e770]:
                  - listitem [ref=e771]:
                    - strong [ref=e772]: Step 1.
                    - text: Launch the Arduino application.
                  - listitem [ref=e773]:
                    - strong [ref=e774]: Step 2.
                    - text: Navigate to
                    - strong [ref=e775]: File > Examples > 01.Basics > Blink
                    - text: ", open the program."
                - img [ref=e777]
                - list [ref=e778]:
                  - listitem [ref=e779]:
                    - strong [ref=e780]: Step 3.
                    - text: Select the board model to
                    - strong [ref=e781]: XIAO RA4M1
                    - text: ", and select the correct port number to upload the program."
                - img [ref=e783]
                - paragraph [ref=e784]: Once the program is successfully uploaded, you will see the following output message and you can observe that the orange LED on the right side of the XIAO RA4M1 is blinking.
                - img [ref=e786]
                - paragraph [ref=e787]: Congratulations, you've learned how to write and upload programs for the XIAO RA4M1!
                - generic [ref=e788]:
                  - generic [ref=e789]:
                    - img [ref=e791]
                    - text: note
                  - paragraph [ref=e794]: The LED will only turn off when the user LED pin on the XIAO RA4M1 is set to a high level, and it will only turn on when the pin is set to a low level.
                - heading "Play with RGB LEDsDirect link to Play with RGB LEDs" [level=2] [ref=e795]:
                  - text: Play with RGB LEDs
                  - link "Direct link to Play with RGB LEDs" [ref=e796] [cursor=pointer]:
                    - /url: "#play-with-rgb-leds"
                    - text: "#"
                - paragraph [ref=e797]: The XIAO RA4M1 comes with a build-in RGB LED that you can control, follow is a example of how to smoothly change the LED color between red, green, and blue.
                - list [ref=e798]:
                  - listitem [ref=e799]:
                    - strong [ref=e800]: Step 1.
                    - text: Download the
                    - code [ref=e801]: Adafruit_NeoPixel
                    - text: library
                - paragraph [ref=e802]:
                  - text: Navigate to
                  - strong [ref=e803]: Sketch > Include Liarbry > Manage Libraries...
                  - text: ", and search"
                  - strong [ref=e804]: Adafruit_NeoPixel
                  - text: ", install the lastest version."
                - list [ref=e805]:
                  - listitem [ref=e806]:
                    - strong [ref=e807]: Step 2.
                    - text: "Copy following code to a new sketch:"
                - generic [ref=e809]:
                  - code [ref=e811]:
                    - generic [ref=e812]: "#include <Adafruit_NeoPixel.h>"
                    - generic [ref=e813]: "#define LED_PIN RGB_BUILTIN // Define the pin for the built-in RGB LED"
                    - generic [ref=e814]: "#define NUM_PIXELS 1 // Number of WS2812 LEDs"
                    - generic [ref=e815]: Adafruit_NeoPixel pixels(NUM_PIXELS, LED_PIN, NEO_GRB + NEO_KHZ800);
                    - generic [ref=e816]: "void setup() {"
                    - generic [ref=e817]: pinMode(PIN_RGB_EN, OUTPUT); // Set up the power pin
                    - generic [ref=e818]: digitalWrite(PIN_RGB_EN, HIGH); //Turn on power to the LED
                    - generic [ref=e819]: pixels.begin(); // Initialize the NeoPixel library
                    - generic [ref=e820]: "}"
                    - generic [ref=e821]: "void loop() {"
                    - generic [ref=e822]: // Transition from Red to Green
                    - generic [ref=e823]: "for (int i = 0; i <= 255; i++) {"
                    - generic [ref=e824]: pixels.setPixelColor(0, pixels.Color(255 - i, i, 0)); // Red decreases, Green increases
                    - generic [ref=e825]: pixels.show();
                    - generic [ref=e826]: delay(10); // Adjust delay for smoothness
                    - generic [ref=e827]: "}"
                    - generic [ref=e828]: // Transition from Green to Blue
                    - generic [ref=e829]: "for (int i = 0; i <= 255; i++) {"
                    - generic [ref=e830]: pixels.setPixelColor(0, pixels.Color(0, 255 - i, i)); // Green decreases, Blue increases
                    - generic [ref=e831]: pixels.show();
                    - generic [ref=e832]: delay(10); // Adjust delay for smoothness
                    - generic [ref=e833]: "}"
                    - generic [ref=e834]: // Transition from Blue to Red
                    - generic [ref=e835]: "for (int i = 0; i <= 255; i++) {"
                    - generic [ref=e836]: pixels.setPixelColor(0, pixels.Color(i, 0, 255 - i)); // Blue decreases, Red increases
                    - generic [ref=e837]: pixels.show();
                    - generic [ref=e838]: delay(10); // Adjust delay for smoothness
                    - generic [ref=e839]: "}"
                    - generic [ref=e840]: "}"

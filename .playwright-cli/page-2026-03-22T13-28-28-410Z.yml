                - generic [ref=e903]:
                  - code [ref=e905]:
                    - generic [ref=e906]: "#include <Arduino.h>"
                    - generic [ref=e907]: "#include <U8x8lib.h>"
                    - generic [ref=e908]: "#include <Wire.h>"
                    - generic [ref=e909]: U8X8_SSD1306_128X64_NONAME_HW_I2C u8x8(/* clock=*/ WIRE_SCL_PIN, /* data=*/ WIRE_SDA_PIN, /* reset=*/ U8X8_PIN_NONE); // OLEDs without Reset of the Display
                    - generic [ref=e910]: "#define enablePin BAT_READ_EN // Pin for enabling battery voltage reading"
                    - generic [ref=e911]: "#define adcPin BAT_DET_PIN // Analog input pin (GPIO29 in your case)"
                    - generic [ref=e912]: const float referenceVoltage = 3.3; // Reference voltage for the ADC
                    - generic [ref=e913]: const float voltageDivider = 2.0; // Voltage divider factor
                    - generic [ref=e914]: "void setup() {"
                    - generic [ref=e915]: Serial.begin(9600); // Initialize serial communication at 9600 baud
                    - generic [ref=e916]: pinMode(enablePin, OUTPUT); // Set the enable pin as an output
                    - generic [ref=e917]: digitalWrite(enablePin, HIGH); // Set the pin high to enable battery voltage reading
                    - generic [ref=e918]: u8x8.begin();
                    - generic [ref=e919]: u8x8.setFlipMode(1); // set number from 1 to 3, the screen word will rotary 180
                    - generic [ref=e920]: u8x8.setFont(u8x8_font_chroma48medium8_r);
                    - generic [ref=e921]: "}"
                    - generic [ref=e922]: "void loop() {"
                    - generic [ref=e923]: int rawValue = analogRead(adcPin); // Read the analog input value
                    - generic [ref=e924]: float voltage = rawValue * (referenceVoltage / 1023.0) * voltageDivider; // Calculate the voltage
                    - generic [ref=e925]: // Print the raw value and the calculated voltage
                    - generic [ref=e926]: u8x8.setCursor(0, 0);
                    - generic [ref=e927]: u8x8.print("Raw value:0x");

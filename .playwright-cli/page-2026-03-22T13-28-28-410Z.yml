                - paragraph [ref=e859]:
                  - text: Is it possible to read the battery voltage without extra components? Yes, with the XIAO RA4M1, it’s easier than ever. In previous XIAO family members, such as the
                  - link "XIAO ESP32C3" [ref=e860] [cursor=pointer]:
                    - /url: https://wiki.seeedstudio.com/XIAO_ESP32C3_Getting_Started/#check-the-battery-voltage
                  - text: ", reading the battery voltage required manually connecting to A0 with a resistor."
                - paragraph [ref=e861]:
                  - text: But with the XIAO RA4M1, this process is simplified. You can now directly use the
                  - code [ref=e862]: BAT_DET_PIN/P105
                  - text: pin to read the battery voltage level, streamlining your design and development. Just remember to set the
                  - code [ref=e863]: BAT_READ_EN/P400
                  - text: pin to high, as it’s necessary to enable battery level reading.
                - list [ref=e864]:
                  - listitem [ref=e865]:
                    - strong [ref=e866]: Step 1.
                    - text: Harware Preparation
                - table [ref=e867]:

                - paragraph [ref=e889]: The OLED display on the XIAO expansion board uses the I2C protocol and is connected to the XIAO's I2C interface through the I2C circuit on the board. Therefore, we can directly plug the XIAO into the expansion board and program it to display content on the screen.
                - list [ref=e890]:
                  - listitem [ref=e891]:
                    - strong [ref=e892]: Step 2.
                    - text: Install the u8g2 library.
                - link "Download the Libraries" [ref=e894] [cursor=pointer]:
                  - /url: https://github.com/olikraus/U8g2_Arduino

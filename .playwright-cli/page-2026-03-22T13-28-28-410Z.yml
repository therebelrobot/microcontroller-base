                    - generic [ref=e929]: u8x8.setCursor(0, 2);
                    - generic [ref=e930]: u8x8.print("Voltage:");
                    - generic [ref=e931]: u8x8.print(voltage, 2);
                    - generic [ref=e932]: u8x8.print("V");
                    - generic [ref=e933]: delay(500); // Delay for 500 milliseconds

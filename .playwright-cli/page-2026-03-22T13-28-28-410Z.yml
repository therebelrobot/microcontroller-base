              - generic [ref=e369]:
                - heading "Getting Started with Seeed Studio XIAO RA4M1" [level=1] [ref=e371]
                - img [ref=e373]
                - link "Get One Now 🖱️" [ref=e375] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/Seeed-XIAO-RA4M1-p-5943.html?utm_source=seeed&utm_medium=wiki&utm&product=xiao-ra4m1
                  - strong [ref=e376]:
                    - generic [ref=e377]: Get One Now 🖱️
                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e378]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e379] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - paragraph [ref=e380]: The XIAO RA4M1 integrates Renesas' RA4M1 chip (32-bit ARM® Cortex®-M4 MCU up to 48 MHz) into the classic XIAO form factor. This development board offers 256KB Flash, 32KB SRAM, 8KB EEPROM, a USB 2.0 connector, reset and boot buttons, 3 LEDs, a 14-bit A/D converter, a 12-bit D/A converter, and a CAN BUS interface. With onboard charging circuitry and low-power modes (as low as 45μA), it’s ideal for battery-powered applications. Sharing the same 32-bit R7FA4M1AB3CNE microcontroller as the Arduino Uno R4, it's natively compatible with Arduino IDE and the extensive XIAO accessories, making it the perfect starting point for electronics projects.
                - heading "FeaturesDirect link to Features" [level=3] [ref=e381]:
                  - text: Features
                  - link "Direct link to Features" [ref=e382] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e383]:
                  - listitem [ref=e384]:
                    - strong [ref=e385]: "Popular Microcontroller Onboard:"
                    - text: Powered by Renesas RA4M1, an 32-bit ARM® Cortex®-M4 R7FA4M1AB3CNE MCU operating at up to 48 MHz, 256 KB of Flash memory, and 32 KB of SRAM.
                  - listitem [ref=e386]:
                    - strong [ref=e387]: "Highlighted Onboard Resources:"
                    - text: Equipped with a 14-bit ADC, 12-bit DAC, CAN BUS, USB 2.0, and an onboard RGB LED.
                  - listitem [ref=e388]:
                    - strong [ref=e389]: "Expanded 8 New IOs:"
                    - text: Adds 8 new IO pins on the back compared to previous XIAO boards (19 GPIOs in total), enabling more complex applications.
                  - listitem [ref=e390]:
                    - strong [ref=e391]: "Powerful Security Features:"
                    - text: Built-in hardware encryption, secure boot, key storage, and other functions to ensure application security.
                  - listitem [ref=e392]:
                    - strong [ref=e393]: "Software Compatibility:"
                    - text: Fully compatible with Arduino IDE for seamless project development and prototyping.
                  - listitem [ref=e394]:
                    - strong [ref=e395]: "Efficient Power Design:"
                    - text: Offers 4 operating modes with power consumption as low as 45μA in deep sleep, and supports lithium battery charge management.
                  - listitem [ref=e396]:
                    - strong [ref=e397]: "Compact Thumb-Sized Design:"
                    - text: Measuring 21 x 17.8mm, adopting Seeed Studio's classic XIAO form factor, ideal for space-conscious applications.
                  - listitem [ref=e398]:
                    - strong [ref=e399]: "Production-Friendly:"
                    - text: Surface Mount Device (SMD) design with all components on the front and stamp holes on both sides, facilitating efficient mass production.

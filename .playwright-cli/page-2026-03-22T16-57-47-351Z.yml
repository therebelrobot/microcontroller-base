                  - strong [ref=e395]:
                    - generic [ref=e396]: Get One Now 🖱️
                - paragraph [ref=e397]: Meet the XIAO eInk Expansion Board, your go-to solution for driving eInk displays with XIAO family effortlessly. Designed with a 24-pin FPC connector, this board provides a seamless link to our eInk product series, if you're looking to expand your options, the 8-pin 2.54 Header allows you to easily integrate any microcontroller of your choice. Think of this board as your eInk's "Best Friend Forever," enhancing its capabilities and making your life easier.
                - generic [ref=e398]:
                  - generic [ref=e399]:
                    - img [ref=e401]
                    - text: note
                  - paragraph [ref=e404]: This breakout board does not include an eInk display; the display must be purchased separately.

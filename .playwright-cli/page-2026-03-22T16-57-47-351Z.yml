                  - link "Direct link to Features" [ref=e408] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e409]:
                  - listitem [ref=e410]: "24-pin FPC Connector: Provides a robust and reliable connection to eInk displays."
                  - listitem [ref=e411]: "XIAO Socket: Allows you to use XIAO as the processor, offering a compact yet powerful control solution."
                  - listitem [ref=e412]: "8-pin 2.54 Header: Offers flexibility by letting you connect to any microcontroller, opening up a world of possibilities."
                  - listitem [ref=e413]: "Plug-and-Play: Designed for ease of use, making it perfect for both beginners and experts."
                  - listitem [ref=e414]: "Versatile Applications: Suitable for a wide range of eInk displays, from small to large sizes."
                - heading "ApplicationsDirect link to Applications" [level=3] [ref=e415]:

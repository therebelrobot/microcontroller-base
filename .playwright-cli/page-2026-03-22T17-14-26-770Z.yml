                    - strong [ref=e406]: "Quick Prototyping:"
                    - text: Easy debug and Reset with RESET button and SWD pin led out to male header.
                - list [ref=e407]:
                  - listitem [ref=e408]:
                    - strong [ref=e409]: "Rich peripherals:"
                    - text: OLED display, RTC, expandable memory space, passive buzzer, user button, on board battery management chip.
                  - listitem [ref=e410]:
                    - strong [ref=e411]: "No Soldering Needed:"
                    - text: All pin led out. Convenient plug and play Grove connectors support multiple data protocols, including IIC, UART, Analog/Digital.
                  - listitem [ref=e412]:
                    - strong [ref=e413]: "Circuit Python Supported:"
                    - text: Well supports circuit python. MicroSD card slot enables memory space expand, making it possible to allocate more libraries needed in prototyping and project building.
                  - listitem [ref=e414]:
                    - strong [ref=e415]: "Mini Size:"
                    - text: Compact and elegant with only half Raspberry Pi 4 size, especially suitable for projects require mini size.

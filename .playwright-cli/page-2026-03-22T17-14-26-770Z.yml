                - img [ref=e391]
                - paragraph [ref=e392]:
                  - text: A powerful functional expansion board for Seeed Studio XIAO of only half Raspberry Pi 4 size. It enables build prototype and project in easy and quick way. With its rich peripherals including OLED, RTC, expandable memory, passive buzzer, RESET/User button, 5V servo connector, multiple data interfaces… you could explore infinite possibilities of Seeed Studio XIAO .
                  - link "Circuitpython" [ref=e393] [cursor=pointer]:
                    - /url: https://circuitpython.org/
                  - text: is also well supported by this board.
                - paragraph [ref=e394]:
                  - text: As Seeed Studio XIAO form factor, all Seeed Studio XIAO boards support both
                  - link "Grove Shield for Seeed Studio XIAO" [ref=e395] [cursor=pointer]:
                    - /url: https://www.seeedstudio.com/Grove-Shield-for-Seeeduino-XIAO-p-4621.html
                  - text: and
                  - link "Seeed Studio Expansion Base for XIAO" [ref=e396] [cursor=pointer]:
                    - /url: https://www.seeedstudio.com/Seeeduino-XIAO-Expansion-board-p-4746.html
                  - text: . There is a slight difference between the pins and refer to the Pinout it is easy to manage.
                - paragraph [ref=e397]: Seeed Studio XIAO SAMD21 , Seeed Studio XIAO RP2040, and Seeed Studio XIAO nRF52840 are compatible to the Seeed Studio Expansion Base for XIAO.
                - link "Get One Now 🖱️" [ref=e399] [cursor=pointer]:

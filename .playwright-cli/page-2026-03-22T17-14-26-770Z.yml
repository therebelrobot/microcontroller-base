                - paragraph [ref=e539]: "Rich peripherals on board including:"
                - list [ref=e540]:
                  - listitem [ref=e541]:
                    - paragraph [ref=e542]:
                      - strong [ref=e543]: "OLED display:"
                      - text: Visual data display without connecting to PC, which enables debug in a more efficient way, and builds application such as a sensor hub, data monitor system, etc.
                  - listitem [ref=e544]:
                    - paragraph [ref=e545]:
                      - strong [ref=e546]: "RESET button:"
                      - text: No more jumper wire and short circuit, easy reset with just one click.
                  - listitem [ref=e547]:
                    - paragraph [ref=e548]:
                      - strong [ref=e549]: "SWD debug:"
                      - text: SWD pin led out as male pin header, making debugger connection and firmware download much easier.
                  - listitem [ref=e550]:
                    - paragraph [ref=e551]:
                      - strong [ref=e552]: "High precision RTC:"
                      - text: High precision real-time clock with battery backup, enable maintain accurate time when the main power is turned off.
                  - listitem [ref=e553]:
                    - paragraph [ref=e554]:
                      - strong [ref=e555]: "Expandable memory:"
                      - text: With a MicroSD card slot on the back, no worry on memory limit any more when adding libraries and using circuit python.
                  - listitem [ref=e556]:
                    - paragraph [ref=e557]:
                      - strong [ref=e558]: "User button:"
                      - text: Besides the RESET button, also provide with another user-defined button.
                  - listitem [ref=e559]:
                    - paragraph [ref=e560]:
                      - strong [ref=e561]: "Passive buzzer:"
                      - text: You could change the PMW frequency to award different beep sound to get a "buzzer music".
                  - listitem [ref=e562]:
                    - paragraph [ref=e563]:
                      - strong [ref=e564]: "Grove connectors:"
                      - text: All pin led out, plug and play grove connectors support common data protocols (Grove IIC
                      - emphasis [ref=e565]: 2, Grove UART
                      - text: 1, A0/D0 Grove*1)
                  - listitem [ref=e566]:
                    - paragraph [ref=e567]:
                      - strong [ref=e568]: "Lipo Battery Charging:"
                      - text: JST2.0mm standard lipo battery connector and battery management system, supports both USB and lipo battery power supply, and easy onboard battery recharge.
                  - listitem [ref=e569]:
                    - paragraph [ref=e570]:
                      - strong [ref=e571]: "5V servo connector:"
                      - text: 5V output led out to male header for 5V servo and sensor connection.

                - paragraph [ref=e739]: This example uses a rotary angle sensor to control servo via integration ports on the Seeed Studio Expansion Base for XIAO.
                - img [ref=e741]
                - paragraph [ref=e742]:
                  - strong [ref=e743]: Step 1
                  - text: . Install the Seeed Studio XIAO SAMD21 on the Expansion board then conect the Type-C cable.
                - paragraph [ref=e744]:
                  - strong [ref=e745]: Step 2
                  - text: . Connect the Servo cable to
                  - strong [ref=e746]: I2C
                  - text: port, rotary angle sensor to
                  - strong [ref=e747]: D0
                  - text: .
                - paragraph [ref=e748]:
                  - strong [ref=e749]: Step 3
                  - text: . Open Arduino IDE, Copy the code and stick on the Ardiono IDE then upload it.
                - generic [ref=e750]:
                  - generic [ref=e751]:
                    - img [ref=e753]
                    - text: tip
                  - paragraph [ref=e756]:
                    - text: If your Development Board is
                    - strong [ref=e757]: XIAO ESP32 Series
                    - text: . Before you run the following code, you need to install ESP32Servo library first in
                    - strong [ref=e758]: Arduino Library Manager
                    - text: and change the following code from
                    - code [ref=e759]: "#include <Servo.h>"
                    - text: to
                    - code [ref=e760]: "#include <ESP32Servo.h>"
                    - text: .
                - generic [ref=e762]:
                  - code [ref=e764]:
                    - generic [ref=e765]: "#include <Servo.h>"
                    - generic [ref=e766]: "#include <Arduino.h>"
                    - generic [ref=e767]: "#include <Wire.h>"
                    - generic [ref=e768]: "#define ROTARY_ANGLE_SENSOR A0"
                    - generic [ref=e769]: "#define ADC_REF 3 //reference voltage of ADC is 3v.If the Vcc switch on the seeeduino"
                    - generic [ref=e770]: "#define GROVE_VCC 3 //VCC of the grove interface is normally 3v"
                    - generic [ref=e771]: "#define FULL_ANGLE 300 //full value of the rotary angle is 300 degrees"
                    - generic [ref=e772]: Servo myservo; // create servo object to control a servo
                    - generic [ref=e773]: // twelve servo objects can be created on most boards
                    - generic [ref=e774]: int pos = 0; // variable to store the servo position
                    - generic [ref=e775]: "void setup() {"
                    - generic [ref=e776]: Serial.begin(9600);
                    - generic [ref=e777]: pinMode(ROTARY_ANGLE_SENSOR, INPUT);
                    - generic [ref=e778]: myservo.attach(5); // attaches the servo on pin 9 to the servo object
                    - generic [ref=e779]: "}"
                    - generic [ref=e780]: "void loop() {"
                    - generic [ref=e781]: float voltage;
                    - generic [ref=e782]: int sensor_value = analogRead(ROTARY_ANGLE_SENSOR);
                    - generic [ref=e783]: voltage = (float)sensor_value * ADC_REF / 1023;
                    - generic [ref=e784]: float degrees = (voltage * FULL_ANGLE) / GROVE_VCC;
                    - generic [ref=e785]: Serial.println("The angle between the mark and the starting position:");
                    - generic [ref=e786]: Serial.println(degrees);
                    - generic [ref=e787]: delay(50);
                    - generic [ref=e788]: myservo.write(degrees);
                    - generic [ref=e789]: "}"

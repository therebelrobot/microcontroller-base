                - paragraph [ref=e530]: The Seeed Studio Expansion Base for XIAO can be powered by a battery, so if you do some demo that needs to be moved, that battery will help you to solve the power supply issue. when you plug the battery please watch out for the positive and negative anodes, follow the picture to connect the battery in case of damage the board.
                - img [ref=e532]
                - paragraph [ref=e533]: In addition, the board charged the battery when you plug the battery cable and the type-C cable and switch the button to on.
                - paragraph [ref=e534]: As the below picture, if the LED flashing which means the battery does not charge or the board does not connect battery if the LED keeps light on which is mean the battery is charging.
                - img [ref=e536]

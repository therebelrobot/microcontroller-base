                  - strong [ref=e333]:
                    - generic [ref=e334]: Get One Now 🖱️
                - paragraph [ref=e335]: Powered by XMOS XU316 AI Sound and Audio chipset, this dev board excels in audio processing with its integrated dual microphone array, ideal for speech recognition and voice control. Featuring advanced onboard audio front-end algorithms, the XU316 chip provides interference cancellation, echo cancellation, and noise suppression. It supports I2S and USB connections and is compatible with Seeed Studio XIAO ESP32S3 (Sense), Adafruit QT Py, Raspberry Pi, and PC.
                - heading "FeaturesDirect link to Features" [level=2] [ref=e336]:
                  - text: Features
                  - link "Direct link to Features" [ref=e337] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e338]:
                  - listitem [ref=e339]:
                    - strong [ref=e340]: Dual Microphone Array for Far-Field Voice Capture
                    - text: ": The 2 high performance digital microphones capture and extract far-field speech and voice (up to 3 meters) even in noisy environments as it cancels point noise using two microphone input."
                  - listitem [ref=e341]:
                    - strong [ref=e342]: Onboard AI ASR Algorithms
                    - text: ": Powered by XMOS XU-316 AI sound and audio chip, the kit includes Natural Language Understanding algorithms for Interference Cancellation (IC) , Acoustic Echo Cancellation, Noise Suppression, Voice-to-Noise Ratio (VNR), and Automatic Gain Control (AGC), enabling high quality voice capture."
                  - listitem [ref=e343]:
                    - strong [ref=e344]: Embracing Open Source
                    - text: ：This board is compatible with popular hardware platforms (XIAO ESP32S3 (Sense), Adafruit QT Py) via I2S, and compatible with Raspberry Pi, PC via USB (Audio Class 2.0 (UAC2)).
                  - listitem [ref=e345]:
                    - strong [ref=e346]: Onboard RGB LED
                    - text: ": the board features a programmable WS2812 RGB LED, supporting custom effects and offering a visual interface for your applications."
                  - listitem [ref=e347]:
                    - strong [ref=e348]: External Power Supply Support
                    - text: ": this board supports external 5V power supply, which can be flexibly applied in different scenarios."
                  - listitem [ref=e349]:
                    - strong [ref=e350]: DFU for Custom Development
                    - text: ": the board supports custom firmware update via DFU-Util."

                - img [ref=e1189]
                - paragraph [ref=e1190]:
                  - text: Select the XIAO ESP32 serial port in the popup window, click
                  - strong [ref=e1191]: INSTALL
                  - text: and then select the .bin file downloaded from above steps.
                - img [ref=e1193]
                - img [ref=e1195]
                - paragraph [ref=e1196]:
                  - strong [ref=e1197]: Step 12.
                  - text: "Once install successfully, you can see like this:"
                - img [ref=e1199]
                - paragraph [ref=e1200]: When the light is strong, the night light turns off,When the light is weak, the night light is on.
                - paragraph [ref=e1201]:
                  - strong [ref=e1202]: Step 13.
                  - text: Once install successfully, Open the log and you will see the feedback messages.
                - img [ref=e1204]
                - img [ref=e1206]
                - paragraph [ref=e1207]: If you like it, you can also follow the above steps to make a night light that is unique to you!

                - generic [ref=e841]:
                  - code [ref=e843]:
                    - generic [ref=e844]: "#include <Arduino.h>"
                    - generic [ref=e845]: // ================= Define Pins =================
                    - generic [ref=e846]: const int PIN_STRIP_1 = D2;
                    - generic [ref=e847]: const int PIN_STRIP_2 = D3;
                    - generic [ref=e848]: // ================= Parameter Configuration =================
                    - generic [ref=e849]: "// Breathing speed: larger number = slower, smaller number = faster"
                    - generic [ref=e850]: const int BREATH_SPEED = 2000;
                    - generic [ref=e851]: "// Breathing phase offset: determines if the two light strips \"light up together\" or \"alternate lighting\""
                    - generic [ref=e852]: // float PHASE_OFFSET = 0; // Set to 0 -> fully synchronized
                    - generic [ref=e853]: float PHASE_OFFSET = PI; // Set to PI (3.14) -> fully alternating (complementary)
                    - generic [ref=e854]: // float PHASE_OFFSET = PI/2; // Set to PI/2 -> slightly staggered rhythm
                    - generic [ref=e855]: "// ================= Helper Function: Handle Active LOW Lighting Logic ================="
                    - generic [ref=e856]: // This step is crucial, do not modify
                    - generic [ref=e857]: "// Input: brightness (0=off, 255=maximum brightness)"
                    - generic [ref=e858]: "void setLedBrightness(int pin, int brightness) {"
                    - generic [ref=e859]: // 1. Safety limit range
                    - generic [ref=e860]: brightness = constrain(brightness, 0, 255);
                    - generic [ref=e862]: // 2. Logic inversion (Active LOW)
                    - generic [ref=e863]: // Brightness 255 -> Output 0 (GND) -> Light at maximum brightness
                    - generic [ref=e864]: // Brightness 0 -> Output 255 (VCC) -> Light off
                    - generic [ref=e865]: int pwmValue = 255 - brightness;
                    - generic [ref=e867]: analogWrite(pin, pwmValue);
                    - generic [ref=e868]: "}"
                    - generic [ref=e869]: // ================= Math Function for Calculating Breathing Brightness =================
                    - generic [ref=e870]: // Using the algorithm (e^sin(x) - 1/e), which mimics human breathing curve better than ordinary triangular wave
                    - generic [ref=e871]: "int calculateBreathBrightness(unsigned long time, float phaseOffset) {"
                    - generic [ref=e872]: "// Calculate angle: time / speed factor"
                    - generic [ref=e873]: float angle = (time / (float)BREATH_SPEED) * PI;
                    - generic [ref=e875]: // Add phase offset
                    - generic [ref=e876]: angle += phaseOffset;
                    - generic [ref=e878]: // Core formula
                    - generic [ref=e879]: float val = (exp(sin(angle)) - 0.36787944) * 108.0;
                    - generic [ref=e881]: return (int)val;
                    - generic [ref=e882]: "}"
                    - generic [ref=e883]: "void setup() {"
                    - generic [ref=e884]: pinMode(PIN_STRIP_1, OUTPUT);
                    - generic [ref=e885]: pinMode(PIN_STRIP_2, OUTPUT);
                    - generic [ref=e886]: "// Initialization: turn off all lights first"
                    - generic [ref=e887]: setLedBrightness(PIN_STRIP_1, 0);
                    - generic [ref=e888]: setLedBrightness(PIN_STRIP_2, 0);
                    - generic [ref=e889]: "}"
                    - generic [ref=e890]: "void loop() {"
                    - generic [ref=e891]: unsigned long currentMillis = millis();
                    - generic [ref=e892]: // 1. Calculate brightness for D2 (no offset)
                    - generic [ref=e893]: int bright1 = calculateBreathBrightness(currentMillis, 0);
                    - generic [ref=e894]: setLedBrightness(PIN_STRIP_1, bright1);
                    - generic [ref=e895]: // 2. Calculate brightness for D3 (with offset)
                    - generic [ref=e896]: int bright2 = calculateBreathBrightness(currentMillis, PHASE_OFFSET);
                    - generic [ref=e897]: setLedBrightness(PIN_STRIP_2, bright2);
                    - generic [ref=e898]: // The delay here doesn't need to be too long, just give the CPU a short break
                    - generic [ref=e899]: delay(5);
                    - generic [ref=e900]: "}"

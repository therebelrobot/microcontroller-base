              - generic [ref=e385]:
                - heading "Getting Started with COB LED Driver Board for Seeed Studio XIAO" [level=1] [ref=e387]
                - img [ref=e389]
                - link "Get One Now 🖱️" [ref=e391] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/COB-LED-Driver-Board-for-Seeed-Studio-XIAO-p-6602.html
                  - strong [ref=e392]:
                    - generic [ref=e393]: Get One Now 🖱️
                - paragraph [ref=e394]: This is a 7-channel COB LED driver dock designed for Seeed Studio XIAO. This expansion board breaks GPIO power limits, offering 7 output channels, specifically tailored for ultra-narrow 1mm 3V COB LED strips. With integrated PMIC battery management, it is the ideal plug-and-play solution for building compact, high-brightness wireless lighting setups.
                - heading "Safety NotesDirect link to Safety Notes" [level=2] [ref=e395]:
                  - text: Safety Notes
                  - link "Direct link to Safety Notes" [ref=e396] [cursor=pointer]:
                    - /url: "#safety-notes"
                    - text: "#"
                - paragraph [ref=e397]:
                  - strong [ref=e398]: Operation Prohibitions & Safety Rules
                - list [ref=e399]:
                  - listitem [ref=e400]: Do not connect any peripherals during charging. Disconnect the light bar first before plugging in the USB-C cable.
                  - listitem [ref=e401]: When debugging the USB-C port, the battery holder must be empty (no battery installed).
                  - listitem [ref=e402]: For full load currents >1A, ensure heat dissipation holes are drilled in the housing; otherwise, the PMIC will overheat and shut down.
                  - listitem [ref=e403]:
                    - text: "Never touch the PMIC area on the back of the board with bare hands: electrostatic discharge (ESD) can damage the chip, and the surface may reach scalding temperatures under full load."
                    - strong [ref=e404]: Core Safety Reminders
                  - listitem [ref=e405]: "Adhere to these four rules for safe operation:"
                  - listitem [ref=e406]: Single power supply when peripherals are connected
                  - listitem [ref=e407]: Power off before wiring/disconnecting
                  - listitem [ref=e408]: Provide adequate heat dissipation holes
                  - listitem [ref=e409]: Do not touch the backside of the board
                - img [ref=e411]
                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e412]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e413] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - heading "FeatureDirect link to Feature" [level=3] [ref=e414]:
                  - text: Feature
                  - link "Direct link to Feature" [ref=e415] [cursor=pointer]:
                    - /url: "#feature"
                    - text: "#"
                - list [ref=e416]:
                  - listitem [ref=e417]:
                    - paragraph [ref=e418]:
                      - strong [ref=e419]: Adapted for 1mm 3V COB LED Strips
                    - paragraph [ref=e420]: The onboard hardware current limiting is specifically tuned to match the electrical characteristics of 3V 1mm flexible COB strips.The tiered 300mA and 100mA current limits effectively drive strips of various lengths,providing Makers with a safe,stable and plug-and-play experience.
                  - listitem [ref=e421]:
                    - paragraph [ref=e422]:
                      - strong [ref=e423]: Strategic 7-Channel Hybrid Output
                    - paragraph [ref=e424]: Efficiently manages your entire lighting setup with a single board. It features 3 High-Power Channels (300mA) for bright main lighting and 4 Dimmable Channels (80mA) for delicate breathing or fading effects. One board handles it all—keeping your main lights bright and your effects dynamic.
                  - listitem [ref=e425]:
                    - paragraph [ref=e426]:
                      - strong [ref=e427]: Battery Management for Wireless Projects
                    - paragraph [ref=e428]: Integrated power circuit supports 3.7V Li-Po batteries or high-power 5V USB adapters.Perfect for building both wireless installations and high-brightness desktop ambient lighting.
                  - listitem [ref=e429]:
                    - paragraph [ref=e430]:
                      - strong [ref=e431]: Easy Sensor Expansion
                    - paragraph [ref=e432]: Includes a standard Grove I2C connector for hassle-free connection to sensors,allowing your lighting projects to react intelligently to the environment.
                    - heading "SpecificationDirect link to Specification" [level=3] [ref=e433]:
                      - text: Specification
                      - link "Direct link to Specification" [ref=e434] [cursor=pointer]:
                        - /url: "#specification"
                        - text: "#"
                - table [ref=e435]:
                  - rowgroup [ref=e436]:
                    - row "LED Power Support DC 3V" [ref=e437]:
                      - rowheader "LED Power Support" [ref=e438]

                - heading "Hardware OverviewDirect link to Hardware Overview" [level=3] [ref=e460]:
                  - text: Hardware Overview
                  - link "Direct link to Hardware Overview" [ref=e461] [cursor=pointer]:
                    - /url: "#hardware-overview"
                    - text: "#"
                - img [ref=e463]
                - list [ref=e464]:
                  - listitem [ref=e465]:
                    - strong [ref=e466]: "(1) D1-High-Power Port:"
                    - text: A high-power port that supports a maximum current of 300mA, only allows ON/OFF switch control (PWM dimming is not supported), and is used to connect high-power loads.
                  - listitem [ref=e467]:
                    - strong [ref=e468]: "(2) D0-High-Power Port:"
                    - text: A high-power port that supports a maximum current of 300mA, only allows ON/OFF switch control (PWM dimming is not supported), and is used to connect high-power loads.
                  - listitem [ref=e469]:
                    - strong [ref=e470]: "(3) VCC-Always-On Port:"
                    - text: An always-powered VCC port that supports a maximum current of 300mA, is not controlled by the power switch, always outputs the supply voltage, and can power devices that require continuous power.
                  - listitem [ref=e471]:
                    - strong [ref=e472]: "(4) GND:"
                    - text: The common ground port of the circuit, used to connect the ground wires of all modules.
                  - listitem [ref=e473]:
                    - strong [ref=e474]: "(5) I²C Grove Port:"
                    - text: A Grove-standard I²C interface (including VCC, GND, SDA, SCL pins), used to connect Grove modules that support the I²C protocol (such as sensors, displays).
                  - listitem [ref=e475]:
                    - strong [ref=e476]: "(6) Power Switch:"
                    - text: A power control switch; when toggled to "ON", it supplies power to high/low-power ports; when toggled to "OFF", it cuts off power (the VCC always-on port is not controlled by this switch).
                  - listitem [ref=e477]:
                    - strong [ref=e478]: "(7) Power LED:"
                    - text: A power status indicator light that turns on when the power switch is toggled to "ON", indicating the module is powered.
                  - listitem [ref=e479]:
                    - strong [ref=e480]: "(8) Battery Connector:"
                    - text: A battery interface that supports connection of 3.7V lithium batteries to power the module.
                  - listitem [ref=e481]:
                    - strong [ref=e482]: "(9) D2-Low-Power Port:"
                    - text: A low-power port that supports a maximum current of 80mA, supports PWM dimming, and uses active LOW logic (the load operates when the level is low).
                  - listitem [ref=e483]:
                    - strong [ref=e484]: "(10) GND:"
                    - text: A ground port in the low-power area, used to connect the ground wires of low-power loads.
                  - listitem [ref=e485]:
                    - strong [ref=e486]: "(11) D3-Low-Power Port:"
                    - text: A low-power port that supports a maximum current of 80mA, supports PWM dimming, and uses active LOW logic (the load operates when the level is low).
                  - listitem [ref=e487]:
                    - strong [ref=e488]: "(12) D9-Low-Power Port:"
                    - text: A low-power port that supports a maximum current of 80mA, supports PWM dimming, and uses active LOW logic (the load operates when the level is low).
                  - listitem [ref=e489]:
                    - strong [ref=e490]: "(13) D8-Low-Power Port:"
                    - text: A low-power port that supports a maximum current of 80mA, supports PWM dimming, and uses active LOW logic (the load operates when the level is low).

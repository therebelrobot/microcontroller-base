                    - text: tip
                  - paragraph [ref=e920]: LED strips with a rated current limit of 300mA or 100mA can both be safely connected to a port with a maximum output of 80mA (the port's output current is ≤ the LED strip's current limit, ensuring safety redundancy). However, an LED strip with a rated current limit of 100mA cannot be connected to a port with a maximum output of 300mA—since the port’s maximum output current far exceeds the LED strip’s current limit, this may damage the strip due to overcurrent.

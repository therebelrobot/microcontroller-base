                - heading "Getting startedDirect link to Getting started" [level=2] [ref=e689]:
                  - text: Getting started
                  - link "Direct link to Getting started" [ref=e690] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e691]: To enable you to get started with the XIAO ESP32C6 faster, please read the hardware and software preparation below to prepare the XIAO.
                - heading "Hardware PreparationDirect link to Hardware Preparation" [level=3] [ref=e692]:
                  - text: Hardware Preparation
                  - link "Direct link to Hardware Preparation" [ref=e693] [cursor=pointer]:
                    - /url: "#hardware-preparation"
                    - text: "#"
                - paragraph [ref=e694]: "You need to prepare the following:"
                - list [ref=e695]:
                  - listitem [ref=e696]:
                    - text: 1 x
                    - link "Seeed Studio XIAO ESP32C6" [ref=e697] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-Studio-XIAO-ESP32C6-p-5884.html
                  - listitem [ref=e698]: 1 x Computer
                  - listitem [ref=e699]: 1 x USB Type-C cable
                - generic [ref=e700]:
                  - generic [ref=e701]:
                    - img [ref=e703]
                    - text: tip
                  - paragraph [ref=e706]:
                    - text: Some USB cables can only supply power and cannot transfer data. If you don't have a USB cable or don't know if your USB cable can transmit data, you can check
                    - link "Seeed USB Type-C support USB 3.1" [ref=e707] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/USB-3-1-Type-C-to-A-Cable-1-Meter-3-1A-p-4085.html
                    - text: .
                - heading "Solder headerDirect link to Solder header" [level=4] [ref=e708]:
                  - text: Solder header
                  - link "Direct link to Solder header" [ref=e709] [cursor=pointer]:
                    - /url: "#solder-header"
                    - text: "#"
                - paragraph [ref=e710]: XIAO ESP32C6 is shipped without pin headers by default, you need to prepare your own pin headers and solder it to the corresponding pins of XIAO so that you can connect to the expansion board or sensor.
                - paragraph [ref=e711]: Due to the miniature size of XIAO ESP32C6, please be careful when soldering headers, do not stick different pins together, and do not stick solder to the shield or other components. Otherwise, it may cause XIAO to short circuit or not work properly, and the consequences caused by this will be borne by the user.
                - heading "BootLoader ModeDirect link to BootLoader Mode" [level=4] [ref=e712]:
                  - text: BootLoader Mode
                  - link "Direct link to BootLoader Mode" [ref=e713] [cursor=pointer]:
                    - /url: "#bootloader-mode"
                    - text: "#"
                - paragraph [ref=e714]: "There are times when we use the wrong program to make XIAO appear to lose ports or not work properly. The specific performance is:"
                - list [ref=e715]:
                  - listitem [ref=e716]: Connected to computer, but no port number found for XIAO.
                  - listitem [ref=e717]: The computer is connected and the port number appears, but the upload program fails.
                - paragraph [ref=e718]: "When you encounter the above two situations, you can try to put XIAO into BootLoader mode, which can solve most of the problems of unrecognized devices and failed uploads. The specific method is:"
                - list [ref=e719]:
                  - listitem [ref=e720]:
                    - strong [ref=e721]: Step 1
                    - text: . Press and hold the BOOT button on the XIAO ESP32C6 without releasing it.
                  - listitem [ref=e722]:
                    - strong [ref=e723]: Step 2
                    - text: . Keep the BOOT button pressed and then connect to the computer via the data cable. Release the BOOT button after connecting to the computer.
                  - listitem [ref=e724]:
                    - strong [ref=e725]: Step 3
                    - text: . Upload the
                    - strong [ref=e726]: Blink
                    - text: program to check the operation of the XIAO ESP32C6.
                - heading "ResetDirect link to Reset" [level=4] [ref=e727]:
                  - text: Reset
                  - link "Direct link to Reset" [ref=e728] [cursor=pointer]:
                    - /url: "#reset"
                    - text: "#"
                - paragraph [ref=e729]: When the program runs abnormally, you can press Reset once during power-up to let XIAO re-execute the uploaded program.
                - paragraph [ref=e730]: When you press and hold the BOOT key while powering up and then press the Reset key once, you can also enter BootLoader mode.
                - heading "Software PreparationDirect link to Software Preparation" [level=3] [ref=e731]:
                  - text: Software Preparation
                  - link "Direct link to Software Preparation" [ref=e732] [cursor=pointer]:
                    - /url: "#software-preparation"
                    - text: "#"
                - paragraph [ref=e733]: The recommended programming tool for the XIAO ESP32C6 is the Arduino IDE, so you need to complete the Arduino installation as part of the software preparation.
                - generic [ref=e734]:
                  - generic [ref=e735]:
                    - img [ref=e737]
                    - text: tip
                  - generic [ref=e739]:
                    - paragraph [ref=e740]:
                      - text: If this is your first time using Arduino, we highly recommend you to refer to
                      - link "Getting Started with Arduino" [ref=e741] [cursor=pointer]:
                        - /url: https://wiki.seeedstudio.com/Getting_Started_with_Arduino/
                      - text: .
                    - paragraph [ref=e742]:
                      - text: And the on-board package for XIAO ESP32C6 requires at least version
                      - strong [ref=e743]: 2.0.8
                      - text: to be available.
                - list [ref=e744]:
                  - listitem [ref=e745]:
                    - paragraph [ref=e746]:
                      - strong [ref=e747]: Step 1.
                      - text: Download and Install the stable version of Arduino IDE according to your operating system.
                    - link "Download Arduino IDE" [ref=e749] [cursor=pointer]:
                      - /url: https://www.arduino.cc/en/software
                      - strong [ref=e750]:
                        - generic [ref=e751]: Download Arduino IDE
                  - listitem [ref=e752]:
                    - paragraph [ref=e753]:
                      - strong [ref=e754]: Step 2.
                      - text: Launch the Arduino application.
                  - listitem [ref=e755]:
                    - paragraph [ref=e756]:
                      - strong [ref=e757]:
                        - link "Step 3" [ref=e758] [cursor=pointer]:
                          - /url: "#add-board"
                        - text: .
                      - text: Add the XIAO ESP32C6 on-board package to the Arduino IDE and click
                      - code [ref=e759]: OK
                      - text: .
                  - listitem [ref=e760]:
                    - paragraph [ref=e761]:
                      - strong [ref=e762]: Step 4.
                      - text: Close the Arduino IDE and reopen it.
                - heading "Add the XIAO-C6 BoardDirect link to Add the XIAO-C6 Board" [level=4] [ref=e763]:
                  - text: Add the XIAO-C6 Board
                  - link "Direct link to Add the XIAO-C6 Board" [ref=e764] [cursor=pointer]:
                    - /url: "#add-board"
                    - text: "#"
                - paragraph [ref=e765]: "To install the XIAO ESP32C6 board, follow these steps:"
                - generic [ref=e767]:
                  - code [ref=e769]:
                    - generic [ref=e770]: https://espressif.github.io/arduino-esp32/package_esp32_index.json
                  - button "Copy code to clipboard" [ref=e772] [cursor=pointer]:
                    - generic [ref=e773]:
                      - img [ref=e774]
                      - img [ref=e776]
                - list [ref=e778]:
                  - listitem [ref=e779]:
                    - text: Add the above board manager URL to the preferences of your Arduino IDE, which is taken from the
                    - link "Installing - Arduino ESP32" [ref=e780] [cursor=pointer]:
                      - /url: https://docs.espressif.com/projects/arduino-esp32/en/latest/installing.html#installing-using-arduino-ide
                    - text: .
                - img [ref=e782]
                - list [ref=e783]:
                  - listitem [ref=e784]: Download the XIAO ESP32C6 board package.
                - generic [ref=e785]:
                  - generic [ref=e786]:
                    - img [ref=e788]
                    - text: note
                  - paragraph [ref=e791]:
                    - text: Only available if the version of the esp32 board is greater than
                    - code [ref=e792]: 3.0.0
                    - text: .
                - img [ref=e794]
                - list [ref=e795]:
                  - listitem [ref=e796]:
                    - text: Opt for
                    - code [ref=e797]: XIAO_ESP32C6
                    - text: variant.
                - img [ref=e799]

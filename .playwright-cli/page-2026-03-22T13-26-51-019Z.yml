                  - generic [ref=e502]:
                    - paragraph [ref=e503]:
                      - text: The
                      - strong [ref=e504]: RF Switch
                      - text: feature allows you to toggle between the built-in ceramic antenna and an external antenna by configuring
                      - code [ref=e505]: GPIO14
                      - text: . To enable this function,
                      - emphasis [ref=e506]:
                        - text: you must first set
                        - code [ref=e507]: GPIO3
                        - text: to a low level
                      - text: ", as this activates the RF switch control."
                    - list [ref=e508]:
                      - listitem [ref=e509]:
                        - strong [ref=e510]: GPIO14 Low Level (Default Setting)
                        - text: ": The device uses the built-in ceramic antenna."
                      - listitem [ref=e511]:
                        - strong [ref=e512]: GPIO14 High Level
                        - text: ": The device switches to the external antenna."
                    - paragraph [ref=e513]:
                      - text: By default,
                      - code [ref=e514]: GPIO14
                      - text: is set to a low level, enabling the built-in antenna. To use an external antenna, set
                      - code [ref=e515]: GPIO14
                      - text: to a high level. Refer to the example code below for guidance on configuring
                      - code [ref=e516]: GPIO3
                      - text: and
                      - code [ref=e517]: GPIO14
                      - text: "to activate the external antenna:"
                    - generic [ref=e519]:
                      - code [ref=e521]:
                        - generic [ref=e522]: "void setup() {"
                        - generic [ref=e523]: pinMode(WIFI_ENABLE, OUTPUT); // pinMode(3, OUTPUT);
                        - generic [ref=e524]: digitalWrite(WIFI_ENABLE, LOW); // digitalWrite(3, LOW); // Activate RF switch control
                        - generic [ref=e525]: delay(100);
                        - generic [ref=e526]: pinMode(WIFI_ANT_CONFIG, OUTPUT); // pinMode(14, OUTPUT);
                        - generic [ref=e527]: digitalWrite(WIFI_ANT_CONFIG, HIGH); // digitalWrite(14, HIGH); // Use external antenna
                        - generic [ref=e528]: "}"

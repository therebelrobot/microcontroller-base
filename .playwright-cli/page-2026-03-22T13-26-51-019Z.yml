                    - text: "#"
                - list [ref=e460]:
                  - listitem [ref=e461]:
                    - strong [ref=e462]: Enhanced Connectivity
                    - text: ": Integrates"
                    - emphasis [ref=e463]:
                      - strong [ref=e464]: "2.4"
                    - text: GHz Wi-Fi 6 (802.11ax), Bluetooth 5(LE), and IEEE 802.15.4 radio connectivity, allowing for the application of
                    - strong [ref=e465]: Thread
                    - text: and
                    - strong [ref=e466]: Zigbee
                    - text: protocols.
                  - listitem [ref=e467]:
                    - strong [ref=e468]: Matter Native
                    - text: ": Supports the building of Matter-compliant smart home projects, ensuring interoperability among different smart devices."
                  - listitem [ref=e469]:
                    - strong [ref=e470]: Security Encrypted on Chip
                    - text: ": Utilizes the ESP32-C6 to provide secure boot, encryption, and Trusted Execution Environment (TEE) features, enhancing the security of smart home projects."
                  - listitem [ref=e471]:
                    - strong [ref=e472]: Outstanding RF Performance
                    - text: ": Features an on-board antenna with up to"
                    - emphasis [ref=e473]: 80m
                    - text: BLE/Wi-Fi range and offers an interface for connecting an external UFL antenna, ensuring reliable connectivity.
                  - listitem [ref=e474]:
                    - strong [ref=e475]: Leveraging Power Consumption
                    - text: ": Offers four working modes, including a deep sleep mode with consumption as low as"
                    - emphasis [ref=e476]: "15"
                    - text: μA, along with support for lithium battery charge management.
                  - listitem [ref=e477]:
                    - strong [ref=e478]: Dual RISC-V Processors
                    - text: ": Incorporates two 32-bit RISC-V processors, with the high-performance processor capable of running up to 160 MHz and the low-power processor up to"
                    - emphasis [ref=e479]: 20 MHz
                    - text: .
                  - listitem [ref=e480]:
                    - strong [ref=e481]: Classic XIAO Designs
                    - text: ": Maintains the thumb-size form factor of 21 x 17.8mm and single-sided mount design, ideal for space-limited projects like wearable devices."

                  - strong [ref=e1375]: "Instructions on the use of batteries:"
                - list [ref=e1376]:
                  - listitem [ref=e1377]: Please use qualified batteries that meet the specifications.
                  - listitem [ref=e1378]: XIAO can be connected to your computer device via data cable while using the battery, rest assured that XIAO has a built-in circuit protection chip, which is safe.
                  - listitem [ref=e1379]: The XIAO nRF54L15 will not have any LED on when it is battery powered (unless you have written a specific program), please do not judge whether the XIAO nRF54L15 is working or not by the condition of the LED, please judge it reasonably by your program.
                - paragraph [ref=e1380]: At the same time, we designed a red indicator light for battery charging, through the indicator light display to inform the user of the current state of the battery in the charge.

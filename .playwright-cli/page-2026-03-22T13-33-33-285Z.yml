                - heading "nRFConnect SDK UsageDirect link to nRFConnect SDK Usage" [level=2] [ref=e694]:
                  - text: nRFConnect SDK Usage
                  - link "Direct link to nRFConnect SDK Usage" [ref=e695] [cursor=pointer]:
                    - /url: "#nrfconnect-sdk-usage"
                    - text: "#"
                - paragraph [ref=e696]: The nRF Connect SDK (NCS) is an extensible, unified software development kit from Nordic Semiconductor specifically designed for building low-power wireless applications for Nordic nRF52, nRF53, nRF54, nRF70, and nRF91 series-based wireless devices.
                - paragraph [ref=e697]: NCS provides a rich ecosystem of off-the-shelf sample applications, protocol stacks, libraries and hardware drivers designed to simplify the development process and accelerate time-to-market. Its modular and configurable nature gives developers the flexibility to build size-optimized software for memory-constrained devices, as well as powerful functionality for more advanced and complex applications.NCS is an open-source project hosted on GitHub and offers excellent support for integrated development environments such as Visual Studio Code.
                - heading "Using nRF Connect SDK on VSCodeDirect link to Using nRF Connect SDK on VSCode" [level=3] [ref=e698]:
                  - text: Using nRF Connect SDK on VSCode
                  - link "Direct link to Using nRF Connect SDK on VSCode" [ref=e699] [cursor=pointer]:
                    - /url: "#using-nrf-connect-sdk-on-vscode"
                    - text: "#"
                - group [ref=e700]:
                  - generic "Install nRF Connect SDK Knowledge in advance" [ref=e701] [cursor=pointer]
                - generic [ref=e702]:
                  - button [ref=e704]:
                    - generic [ref=e706]: "1"
                    - generic [ref=e707]:
                      - generic [ref=e708]: VScode configures the board and builds the burn-in file
                      - generic [ref=e709]:
                        - paragraph [ref=e710]: Open VS Code and search for nRF Connect for VS Code Extension Pack in the Plugin Center. This plugin pack will automatically install other VS Code plugins required for nRF Connect.
                        - img [ref=e712]
                        - paragraph [ref=e713]: The nRF Connect for VS Code extension enables developers to utilize the popular Visual Studio Code Integrated Development Environment (VS Code IDE) to develop, build, debug and deploy embedded applications based on Nordic's nRF Connect SDK (Software Development Kit). The extension includes useful development tools such as a compiler interface, linker, complete build system, RTOS-enabled debugger, seamless interfacing with the nRF Connect SDK, device tree visualization editor, and an integrated serial terminal.
                        - paragraph [ref=e714]: "The nRF Connect extension package for VS Code includes the following components:"
                        - list [ref=e715]:
                          - listitem [ref=e716]: "nRF Connect for VS Code: The main extension contains the interface between the build system and the nRF Connect SDK, as well as an interface to manage the nRF Connect SDK version and toolchain."
                          - listitem [ref=e717]: "nRF DeviceTree: Provides device tree language support and a device tree visualization editor."
                          - listitem [ref=e718]: "nRF Kconfig: Provides Kconfig language support."
                          - listitem [ref=e719]: "nRF Terminal: Serial and RTT terminals."
                          - listitem [ref=e720]: "Microsoft C/C++: Adds language support for C/C++, including features of IntelliSense."
                          - listitem [ref=e721]: "CMake: CMake language support."
                          - listitem [ref=e722]:
                            - text: "GNU Linker Mapping Files: Support for linker mapping files. We can download any preferred version of the nRF Connect SDK and its toolchain via the extension. The full nRF Connect for VS Code documentation is available at"
                            - link "https://docs.nordicsemi.com/bundle/nrf-connect-vscode/page/index.html" [ref=e723] [cursor=pointer]:
                              - /url: https://docs.nordicsemi.com/bundle/nrf-connect-vscode/page/index.html
                            - text: .
                  - button [ref=e725] [cursor=pointer]:
                    - generic [ref=e727]: "2"
                    - generic [ref=e728]:
                      - generic [ref=e729]: Installing the toolchain
                      - generic [ref=e730]:
                        - paragraph [ref=e731]: The toolchain is a collection of tools that work together to build nRF Connect SDK applications, including assembler, compiler, linker, and CMake components. The first time you open nRF Connect for VS Code, you will be prompted to install the toolchain. This usually happens if the extension does not detect any installed toolchain on your computer. Click Install Toolchain and a list of toolchain versions will be listed that can be downloaded and installed on your computer. Select the version of the toolchain that matches the version of the nRF Connect SDK you plan to use. We always recommend using the latest tagged version of the nRF Connect SDK.
                        - paragraph [ref=e732]: "By default, nRF Connect for VS Code only displays the Released tab (i.e., the stable version) of the toolchain. If you are evaluating a new feature and would like to use the Preview tab or another type of tab (e.g. Customer Sampling -cs), click on \"Show all toolchain versions\" as shown below:"
                        - img [ref=e734]
                        - generic [ref=e735]:
                          - generic [ref=e736]:
                            - img [ref=e738]
                            - text: note
                          - paragraph [ref=e741]:
                            - strong [ref=e742]: The ToolChain here is 3.0.1 or above
                  - button [ref=e744] [cursor=pointer]:
                    - generic [ref=e746]: "3"
                    - generic [ref=e747]:
                      - generic [ref=e748]: Installing the nRF Connect SDK
                      - generic [ref=e749]:
                        - paragraph [ref=e750]: In the nRF Connect extension for VS Code, click on Manage SDK. from the Manage SDK menu, we can install or uninstall the nRF Connect SDK version. Since this is the first time we are using the extension, the interface will only show two options.
                        - paragraph [ref=e751]: Clicking Install SDK will list all available nRF Connect SDK versions that can be downloaded and installed locally. Select the version of the nRF Connect SDK that is required for the development of your project.
                        - img [ref=e753]
                        - paragraph [ref=e754]: If you have opened the SDK folder in VS Code, instead of the Manage SDK menu option, you will see the Manage west workspace. To resolve this issue, open another window or folder in VS Code.
                        - generic [ref=e755]:
                          - generic [ref=e756]:
                            - img [ref=e758]
                            - text: note
                          - paragraph [ref=e761]:
                            - strong [ref=e762]: The nRF Connect SDK here is 3.0.1 or above
                        - generic [ref=e763]:
                          - generic [ref=e764]:
                            - img [ref=e766]
                            - text: tip
                          - paragraph [ref=e769]:
                            - text: If you do not see either of these options, make sure you have the latest version of the nRF Connect for VS Code extension package installed. It is important to note that the nRF Connect SDK is IDE independent, which means you can choose to use any IDE or none at all. The nRF Connect SDK is available via the
                            - link "https://www.nordicsemi.com/Products/Development-tools/nRF-Util" [ref=e770]:
                              - /url: https://www.nordicsemi.com/Products/Development-tools/nRF-Util
                            - text: (nrfutil) command line The (nrfutil) command line interface (CLI) will download and install nRF Connect. However, we highly recommend using our nRF Connect for VS Code extension with VS Code, as it integrates not only a convenient graphical user interface (GUI) and an efficient command line interface (CLI), but also includes a number of features that will greatly simplify firmware development. Configuring other IDEs to work with the nRF Connect SDK requires additional manual steps beyond the scope of this course.
                  - button [ref=e772] [cursor=pointer]:
                    - generic [ref=e774]: "4"
                    - generic [ref=e775]:
                      - generic [ref=e776]: Creating User Programs
                      - generic [ref=e777]:
                        - paragraph [ref=e778]: In this exercise we will write a simple application based on the blinky example to control blinking LEDs on a development board. The same applies to all supported NordicSemiconductor development boards (nRF54, nRF53, nRF52, nRF70 or nRF91 series). The goal is to make sure that all the tools needed to build and burn the example are set up correctly. The focus is on learning how to create an application, build it and burn it to a Nordic chip development board using the “Copy Example” template!
                        - list [ref=e779]:
                          - listitem [ref=e780]: In VS Code, click the nRF Connect extension icon. In the Welcome view, click Create New Application.
                        - img [ref=e782]
                        - list [ref=e783]:
                          - listitem [ref=e784]: Type blinky in the search bar and select the second Blinky sample (path zephyr/samples/basic/blinky), as shown below.
                        - img [ref=e786]
                        - paragraph [ref=e787]: "The Blinky example will cause the LED1 on the development board to blink continuously. Our first application will be based on the Blinky example. The Blinky example is derived from the Zephyr mold block in the nRF Connect SDK, so you will see the zephyr name in the sample path: zephyr\\samples\\basic\\blinky."
                  - 'button "5 Add XIAO nRF54L15 Board Download the Libraries To get started, clone the repository from the GitHub linkgit clone https://github.com/Seeed-Studio/platform-seeedboards.git into your preferred local folder. Once cloned, navigate to the platform-seeedboards/zephyr/ directory. Remember this zephyr folder Path; To configure your board for nRF Connect in VS Code, you can follow these steps: Open VS Code and go to Settings. Type nRF Connect in the search box. Find the Board Roots settings item and click Edit in settings.json. Add the zephyr path of the downloaded XIAO nRF54L15 board file to the boardRoots array. In the application view, click Add Build Configuration below the application name . We can select the model of XIAO nRF54L15 in the Board target, and select the default prj.config file in the Base configuration files, and finally click Generate and Build to build the file." [ref=e789] [cursor=pointer]':

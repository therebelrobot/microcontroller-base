                - list [ref=e473]:
                  - listitem [ref=e474]:
                    - strong [ref=e475]: Powerful CPU
                    - text: ": 128 MHz Arm® Cortex®-M33 processor with support for DSP instructions and FPU floating-point operations, 32-bit RISC architecture, and integrated 128 MHz RISC-V co-processor."
                  - listitem [ref=e476]:
                    - strong [ref=e477]: Ultra-low Power
                    - text: ": Designed for superior ultra-low power consumption, significantly extends battery life and includes advanced power management."
                  - listitem [ref=e478]:
                    - strong [ref=e479]: Multi-Mode Wireless Transmission
                    - text: ": Integrated 2.4 GHz multi-protocol wireless transceiver supports Bluetooth Low Energy (including Channel Sounding), 802.15.4-2020, Matter, Thread, Zigbee, and 2.4 GHz proprietary modes (up to 4 Mbps)."
                  - listitem [ref=e480]:
                    - strong [ref=e481]: Robust Security
                    - text: ": Advanced security features including TrustZone® isolation, tamper detection, and channel leakage protection on the encryption engine side."
                  - listitem [ref=e482]:
                    - strong [ref=e483]: Rich on-chip resources
                    - text: ": Scalable memory configurations up to 1.5 MB NVM and 256 KB RAM provide ample storage space."
                  - listitem [ref=e484]:
                    - strong [ref=e485]: Rich Interfaces
                    - text: ": Comprehensive peripheral set including the new Global RTC (available in System OFF mode), 14-bit ADC, and high-speed serial interfaces. Built-in lithium battery management."

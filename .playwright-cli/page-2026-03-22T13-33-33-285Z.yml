                - paragraph [ref=e398]:
                  - text: The
                  - strong [ref=e399]: Seeed Studio XIAO nRF54L15
                  - text: is a compact, high-performance development board featuring the cutting-edge Nordic nRF54L15 chip. This next-generation SoC integrates an ultra-low-power multi-protocol 2.4 GHz radio with an MCU containing a
                  - strong [ref=e400]: 128 MHz Arm® Cortex®-M33 processor
                  - text: and a
                  - strong [ref=e401]: 128 MHz RISC-V coprocessor
                  - text: . It offers scalable memory up to
                  - strong [ref=e402]: 1.5 MB NVM and 256 KB RAM
                  - text: ", and an internal ultra-low-power design that significantly extends battery life. Its powerful radio supports"
                  - strong [ref=e403]: Bluetooth® 6.0 (including Channel Sounding), Matter, Thread, Zigbee
                  - text: ", and high throughput 2.4 GHz proprietary modes up to"
                  - strong [ref=e404]: 4 Mbps
                  - text: . The board includes a comprehensive peripheral set, an integrated
                  - strong [ref=e405]: 128 MHz RISC-V coprocessor
                  - text: ", and advanced security features such as"
                  - strong [ref=e406]: TrustZone®
                  - text: isolation and cryptographic engine protection. With
                  - strong [ref=e407]: built-in Li-ion battery management
                  - text: ", the XIAO nRF54L15 is ideal for compact, secure and energy-efficient IoT solutions such as smart wearables, industrial sensors and advanced HMIs."

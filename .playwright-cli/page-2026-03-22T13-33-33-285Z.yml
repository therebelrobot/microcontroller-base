                - paragraph [ref=e1522]:
                  - text: The XIAO nRF54L15 integrates a battery voltage detection feature that centers on efficiently managing battery power measurements using the TPS22916CYFPR load switch. This guide will focus on analyzing the software implementation of the battery detection
                  - strong [ref=e1523]: (especially the main.c code)
                  - text: and guide you on how to easily deploy and use this feature in a PlatformIO environment, avoiding the complexity of the Zephyr NCS SDK.
                - generic [ref=e1524]:
                  - img "XIAO nRF54L15 BLE Advertising Power Consumption" [ref=e1525]
                  - paragraph [ref=e1526]:
                    - emphasis [ref=e1527]: Detecting Battery Schematic
                - paragraph [ref=e1528]: "What the TPS22916CYFPR chip does:"
                - list [ref=e1529]:
                  - listitem [ref=e1530]:
                    - paragraph [ref=e1531]: It is an intelligent power switch that controls the on-off of the battery voltage on demand. When the battery voltage needs to be measured, it will turn on, connecting the battery to the voltage divider circuit; when it does not need to be measured, it will turn off, disconnecting the connection.
                  - listitem [ref=e1532]:
                    - paragraph [ref=e1533]: What does this feature help us do? Through this on-demand switching mechanism, the chip greatly reduces unnecessary current consumption and effectively extends battery life. Combined with the subsequent voltage divider circuit and the nRF54L15's ADC (analog-to-digital converter), the XIAO nRF54L15 is able to accurately monitor the battery's remaining charge, providing important range optimization for battery-powered, low-power applications such as IoT devices.
                - generic [ref=e1534]:
                  - generic [ref=e1535]:
                    - img [ref=e1537]
                    - text: note
                  - generic [ref=e1539]:
                    - paragraph [ref=e1540]: The following sample code is designed for PlatformIO, but it is also compatible with the nRF Connect SDK.

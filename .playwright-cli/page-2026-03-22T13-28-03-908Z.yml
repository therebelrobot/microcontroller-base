              - generic [ref=e365]:
                - heading "Seeed Studio XIAO RP2350 with Arduino" [level=1] [ref=e367]
                - paragraph [ref=e368]:
                  - text: The Seeed Studio XIAO RP2350 board now supports programming via Arduino, thanks to the
                  - link "arduino-pico core" [ref=e369] [cursor=pointer]:
                    - /url: https://github.com/earlephilhower/arduino-pico
                  - text: . This guide will help you set up and begin using Arduino on your RP2350 board.
                - heading "FeaturesDirect link to Features" [level=2] [ref=e370]:
                  - text: Features
                  - link "Direct link to Features" [ref=e371] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e372]:
                  - listitem [ref=e373]:
                    - strong [ref=e374]: "Powerful MCU Board:"
                    - text: Equipped with a Raspberry Pi RP2350 chip featuring symmetric dual Arm Cortex-M33 @ 150MHz with FPU.
                  - listitem [ref=e375]:
                    - strong [ref=e376]: "Enhanced Security Features:"
                    - text: Built-in secure boot and encrypted bootloader ensure application security.
                  - listitem [ref=e377]:
                    - strong [ref=e378]: "Software Support:"
                    - text: Compatible with C/C++ and MicroPython, ensuring easy project development and prototyping.
                  - listitem [ref=e379]:
                    - strong [ref=e380]: "Rich Onboard Resources:"
                    - text: Integrates an RGB LED, 2MB Flash, 520kB SRAM, and 19 multifunction GPIOs(Analog, Digital, I²C, UART, SPI, PWM).
                  - listitem [ref=e381]:
                    - strong [ref=e382]: "Expanded 8 New IOs:"
                    - text: Compared to previous XIAO MCUs, the addition of 8 IO pins on the back supports more complex applications.
                  - listitem [ref=e383]:
                    - strong [ref=e384]: "Efficient Power Design:"
                    - text: Ultra-low power consumption of just 50μA in sleep mode, enabling battery power supply. Direct battery voltage measurement via internal IO enhances the battery management system (BMS).
                  - listitem [ref=e385]:
                    - strong [ref=e386]: "Compact Thumb-Sized Design:"
                    - text: Measuring 21 x 17.8mm, adopting Seeed Studio's classic XIAO form factor, ideal for space-conscious applications.
                  - listitem [ref=e387]:
                    - strong [ref=e388]: "Production-friendly:"
                    - text: Surface Mount Device (SMD) design with all components on the front and stamp holes on both sides, facilitating efficient mass production.
                - heading "SpecificationDirect link to Specification" [level=2] [ref=e389]:

                        - strong [ref=e412]:
                          - generic [ref=e413]: Get One Now 🖱
                    - cell "Get One Now 🖱" [ref=e414]:
                      - link "Get One Now 🖱" [ref=e416] [cursor=pointer]:
                        - /url: https://www.seeedstudio.com/Seeed-Studio-XIAO-nRF52840-Sense-Plus-p-6360.html
                        - strong [ref=e417]:
                          - generic [ref=e418]: Get One Now 🖱
                - paragraph [ref=e419]:
                  - text: As the first wireless product in the Seeed Studio XIAO family,
                  - strong [ref=e420]: Seeed Studio XIAO nRF52840
                  - text: is equipped with a powerful
                  - strong [ref=e421]: Nordic nRF52840 MCU
                  - text: which integrates
                  - strong [ref=e422]: Bluetooth 5.0
                  - text: connectivity. Meanwhile, it has a
                  - strong [ref=e423]: small and exquisite form-factor
                  - text: which can be used for wearable devices and Internet of Things projects. The
                  - strong [ref=e424]: single-sided surface-mountable design
                  - text: and the onboard
                  - strong [ref=e425]: Bluetooth antenna
                  - text: can greatly facilitate the rapid deployment of IoT projects.
                - paragraph [ref=e426]:
                  - text: In addition, there is an advanced version of this board,
                  - strong [ref=e427]: Seeed Studio XIAO nRF52840 Sense
                  - text: . It is integrated with two extra onboard sensors. One of them is a
                  - strong [ref=e428]: Pulse Density Modulation (PDM) Digital Microphone
                  - text: . It can receive audio data in real-time which allows it to be used for audio recognition. The other one is a
                  - strong [ref=e429]: 6-axis Inertial Measurement Unit (IMU)
                  - text: ", this IMU can be very useful in TinyML projects like gesture recognition. These onboard sensors provide a great convenience for users while the board is ultra-small."
                - paragraph [ref=e430]:
                  - text: The newly upgraded
                  - strong [ref=e431]: XIAO nRF52840 Plus and XIAO nRF52840 Sense Plus
                  - text: provide considerable increases in functionality and usability. The number of multifunctional pins has been increased to
                  - strong [ref=e432]: "20"
                  - text: ","
                  - strong [ref=e433]: I2S
                  - text: and
                  - strong [ref=e434]: SPI
                  - text: resources have been added to support more complex projects,
                  - strong [ref=e435]: NFC pins
                  - text: have been exposed for easier integration into IoT and smart card applications, and the
                  - strong [ref=e436]: BAT pin
                  - text: has been repositioned for better soldering convenience, resulting in a more user-friendly hardware experience.
                - paragraph [ref=e437]:
                  - text: Compared to Seeed Studio XIAO RP2040, Seeed Studio XIAO nRF52840 contains
                  - strong [ref=e438]: richer interfaces
                  - text: . The first thing to note is that the
                  - strong [ref=e439]: Near Field Communication (NFC) interface
                  - text: is functional on the board. Secondly, there is a tiny
                  - strong [ref=e440]: reset button
                  - text: on the side of the Type-C interface. On the other side, there is a
                  - strong [ref=e441]: 3-in-one LED (User LED)
                  - text: along with a
                  - strong [ref=e442]: Charge LED
                  - text: to indicate the charging status when a battery is connected. There are
                  - strong [ref=e443]: 11 digital I/O
                  - text: that can be used as
                  - strong [ref=e444]: PWM pins
                  - text: and
                  - strong [ref=e445]: 6 analog I/O
                  - text: that can be used as
                  - strong [ref=e446]: ADC pins
                  - text: . It supports all three common serial interfaces such as
                  - strong [ref=e447]: UART, I2C, and SPI
                  - text: . Same as Seeed Studio XIAO RP2040, it has an
                  - strong [ref=e448]: onboard 2 MB flash
                  - text: which means it can also be programmed using
                  - strong [ref=e449]: Arduino, MicroPython, CircuitPython, or other programming languages
                  - text: .
                - paragraph [ref=e450]: Seeed Studio XIAO nRF52840 Sense is compatible to the Seeed Studio XIAO expansion board.
                - link "Get One Now 🖱️" [ref=e452] [cursor=pointer]:

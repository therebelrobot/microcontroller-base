                - heading "Two Arduino LibrariesDirect link to Two Arduino Libraries" [level=2] [ref=e719]:
                  - text: Two Arduino Libraries
                  - link "Direct link to Two Arduino Libraries" [ref=e720] [cursor=pointer]:
                    - /url: "#two-arduino-libraries"
                    - text: "#"
                - paragraph [ref=e721]:
                  - text: Seeed Studio XIAO nRF52840 assembles many functions in one tiny board and sometimes may not perform the best of them. Hence, Seeed has published two Arduino libraries to let it
                  - strong [ref=e722]: maximum the power of each function
                  - text: ". Therefore:"
                - list [ref=e723]:
                  - listitem [ref=e724]:
                    - text: It is recommanded to use the
                    - code [ref=e725]: Seeed nRF52 Boards
                    - text: library if you want to apply
                    - strong [ref=e726]: Bluetooth function
                    - text: and "
                    - strong [ref=e727]: Low Energy Cost Function
                    - text: "\"."
                  - listitem [ref=e728]:
                    - text: It is recommanded to use the
                    - code [ref=e729]: Seeed nRF52 mbed-enabled Boards
                    - text: library if you want to use it in
                    - strong [ref=e730]: embedded Machine Learning Applications
                    - text: or apply "
                    - strong [ref=e731]: IMU & PDM advanced function
                    - text: "\"."
                  - listitem [ref=e732]:
                    - text: Both libraries support very well when it comes to the basic usage, such as
                    - strong [ref=e733]: LED, Digital, Analog, Serial, I2C, SPI
                    - text: .
                - paragraph [ref=e734]: The Pin definition supported by these two libraries might be a little different and Seeed will keep update the wiki until it is clear.
                - generic [ref=e735]:
                  - generic [ref=e736]:
                    - img [ref=e738]
                    - text: tip
                  - list [ref=e741]:
                    - listitem [ref=e742]:
                      - paragraph [ref=e743]:
                        - text: If you use the onboard package of Seeed nRF52 Boards, the Serial function may not compile. The solution is to add the line
                        - code [ref=e744]: "#include <Adafruit_TinyUSB.h>"
                        - text: "in your code. You can download this package from:"
                        - link "https://github.com/adafruit/Adafruit_TinyUSB_Arduino" [ref=e745] [cursor=pointer]:
                          - /url: https://github.com/adafruit/Adafruit_TinyUSB_Arduino
                    - listitem [ref=e746]:
                      - paragraph [ref=e747]: If you prefer a simpler approach, you can choose Seeed nRF52 mbed-enabled Boards from the beginning. It supports the compilation of the Serial function without the need for additional modifications.
                - heading "Getting startedDirect link to Getting started" [level=2] [ref=e748]:
                  - text: Getting started
                  - link "Direct link to Getting started" [ref=e749] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e750]: First, we are going to connect the Seeed Studio XIAO nRF52840 (Sense) to the computer and upload a simple code from Arduino IDE to check whether the board is functioning well.
                - heading "Hardware setupDirect link to Hardware setup" [level=3] [ref=e751]:
                  - text: Hardware setup
                  - link "Direct link to Hardware setup" [ref=e752] [cursor=pointer]:
                    - /url: "#hardware-setup"
                    - text: "#"
                - paragraph [ref=e753]: "You need to prepare the following:"
                - list [ref=e754]:
                  - listitem [ref=e755]:
                    - text: 1 x
                    - link "Seeed Studio XIAO nRF52840" [ref=e756] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-XIAO-BLE-nRF52840-p-5201.html
                    - text: or
                    - link "Studio XIAO nRF52840 Sense" [ref=e757] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-XIAO-BLE-Sense-nRF52840-p-5253.html
                  - listitem [ref=e758]: 1 x Computer
                  - listitem [ref=e759]: 1 x USB Type-C cable
                - generic [ref=e760]:
                  - generic [ref=e761]:
                    - img [ref=e763]
                    - text: tip
                  - paragraph [ref=e766]:
                    - text: Some USB cables can only supply power and cannot transfer data. If you don't have a USB cable or don't know if your USB cable can transmit data, you can check
                    - link "Seeed USB Type-C support USB 3.1" [ref=e767] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/USB-3-1-Type-C-to-A-Cable-1-Meter-3-1A-p-4085.html
                    - text: .
                - paragraph [ref=e768]: Connect the Seeed Studio XIAO nRF52840 (Sense) to your computer via a USB Type-C cable.
                - paragraph [ref=e769]:
                  - img "pir" [ref=e770]
                - heading "Software setupDirect link to Software setup" [level=3] [ref=e771]:
                  - text: Software setup
                  - link "Direct link to Software setup" [ref=e772] [cursor=pointer]:
                    - /url: "#software-setup"
                    - text: "#"
                - list [ref=e773]:
                  - listitem [ref=e774]:
                    - strong [ref=e775]: Step 1.
                    - text: Download and Install the latest version of Arduino IDE according to your operating system
                - paragraph [ref=e776]:
                  - link "pir" [ref=e777] [cursor=pointer]:
                    - /url: https://www.arduino.cc/en/software
                    - img "pir" [ref=e778]
                - list [ref=e779]:
                  - listitem [ref=e780]:
                    - paragraph [ref=e781]:
                      - strong [ref=e782]: Step 2.
                      - text: Launch the Arduino application
                  - listitem [ref=e783]:
                    - paragraph [ref=e784]:
                      - strong [ref=e785]: Step 3.
                      - text: Add Seeed Studio XIAO nRF52840 (Sense) board package to your Arduino IDE
                - paragraph [ref=e786]:
                  - text: Navigate to
                  - strong [ref=e787]: File > Preferences
                  - text: ", and fill"
                  - strong [ref=e788]: "\"Additional Boards Manager URLs\""
                  - text: "with the url below:"
                  - emphasis [ref=e789]:
                    - link "https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json" [ref=e790] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
                - paragraph [ref=e791]:
                  - img "pir" [ref=e792]
                - paragraph [ref=e793]:
                  - text: Navigate to
                  - strong [ref=e794]: Tools > Board > Boards Manager...
                  - text: ", type the keyword \""
                  - strong [ref=e795]: seeed nrf52
                  - text: "\" in the search box, select the latest version of the board you want, and install it. You can install both."
                - paragraph [ref=e796]:
                  - img "pir" [ref=e797]
                - list [ref=e798]:
                  - listitem [ref=e799]:
                    - strong [ref=e800]: Step 4.
                    - text: Select your board and port
                - paragraph [ref=e801]:
                  - strong [ref=e802]: Board
                - paragraph [ref=e803]:
                  - text: After installing the board package, navigate to
                  - strong [ref=e804]: Tools > Board
                  - text: and choose the board you want, continue to select "
                  - strong [ref=e805]: Seeed XIAO nRF52840 Sense
                  - text: "\". Now we have finished setting up the Seeed Studio XIAO nRF52840 (Sense) for Arduino IDE."
                - paragraph [ref=e806]:
                  - img "pir" [ref=e807]
                - paragraph [ref=e808]:
                  - strong [ref=e809]: Port
                - paragraph [ref=e810]:
                  - text: Navigate to
                  - strong [ref=e811]: Tools > Port
                  - text: and select the serial port name of the connected Seeed Studio XIAO nRF52840 (Sense). This is likely to be COM3 or higher (
                  - strong [ref=e812]: COM1
                  - text: and
                  - strong [ref=e813]: COM2
                  - text: are usually reserved for hardware serial ports). The serial port of the connected Seeed Studio XIAO nRF52840 (Sense) usually contains parentheses that are written
                  - strong [ref=e814]: Seeed Studio XIAO nRF52840
                  - text: for
                  - strong [ref=e815]: Seeed Studio XIAO nRF52840
                  - text: or
                  - strong [ref=e816]: Seeed Studio XIAO nRF52840 Sense
                  - text: for
                  - strong [ref=e817]: Seeed Studio XIAO nRF52840 Sense
                  - text: .
                - paragraph [ref=e818]:
                  - img "pir" [ref=e819]
                - list [ref=e820]:
                  - listitem [ref=e821]:
                    - strong [ref=e822]: Step 5.
                    - text: Navigate to
                    - strong [ref=e823]: File > Examples > 01.Basics > Blink
                    - text: to open
                    - strong [ref=e824]: Blink
                    - text: example

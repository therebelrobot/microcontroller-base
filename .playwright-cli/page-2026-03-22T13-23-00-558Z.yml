                - list [ref=e457]:
                  - listitem [ref=e458]: "Powerful wireless capabilities: Bluetooth 5.0 with onboard antenna"
                  - listitem [ref=e459]: "Powerful CPU: Nordic nRF52840, ARM® Cortex®-M4 32-bit processor with FPU, 64 MHz"
                  - listitem [ref=e460]: "Ultra-Low Power: Standby power consumption is less than 5μA"
                  - listitem [ref=e461]: "Battery charging chip: Supports lithium battery charge and discharge management"
                  - listitem [ref=e462]: Onboard 2 MB flash
                  - listitem [ref=e463]: Onboard PDM microphone (only in Seeed Studio XIAO nRF52840 Sense)
                  - listitem [ref=e464]: Onboard 6-axis LSM6DS3TR-C IMU (only in Seeed Studio XIAO nRF52840 Sense)
                  - listitem [ref=e465]: "Ultra Small Size: 21 x 17.8mm, Seeed Studio XIAO series classic form-factor for wearable devices"
                  - listitem [ref=e466]: "Rich interfaces: 1xUART, 1xI2C, 1xSPI, 1xNFC, 1xSWD, 11xGPIO(PWM), 6xADC in XIAO nRF52840 (Sense); and 2xUART, 1xI2C, 2xSPI, 1xI2S, 1xNFC, 1xSWD, 18xGPIO(PWM), 6xADC in XIAO nRF52840 (Sense) Plus"
                  - listitem [ref=e467]: Single-sided components, surface mounting design

                - paragraph [ref=e831]:
                  - img "pir" [ref=e832]
                - paragraph [ref=e833]: Once uploaded, you will see the built-in red LED blinking with a 1-second delay between each blink. This means the connection is successful and now you can explore more projects with the Seeed Studio XIAO nRF52840 (Sense)!
                - heading "Playing with the built-in 3-in-one LEDDirect link to Playing with the built-in 3-in-one LED" [level=2] [ref=e834]:
                  - text: Playing with the built-in 3-in-one LED
                  - link "Direct link to Playing with the built-in 3-in-one LED" [ref=e835] [cursor=pointer]:
                    - /url: "#playing-with-the-built-in-3-in-one-led"
                    - text: "#"
                - paragraph [ref=e836]:
                  - text: Seeed Studio XIAO nRF52840 (Sense) has an
                  - strong [ref=e837]: onboard 3-in-one LED
                  - text: which is user-programmable. Now you will learn how to control the RGB colors one-by-one using Arduino!
                - paragraph [ref=e838]:
                  - text: You first have to understand that the behavior of this LED is not as usual when controlled by the code. The
                  - strong [ref=e839]: LED turns ON
                  - text: when we give a
                  - strong [ref=e840]: LOW signal
                  - text: and it
                  - strong [ref=e841]: turns OFF
                  - text: when we give a
                  - strong [ref=e842]: HIGH signal
                  - text: . This is because this LED is controlled by a common anode and will light up only with a low-level signal.
                - paragraph [ref=e843]: "An example code would be:"
                - generic [ref=e845]:
                  - code [ref=e847]:
                    - generic [ref=e848]: "void setup() {"
                    - generic [ref=e849]: pinMode(LED_BUILTIN, OUTPUT);
                    - generic [ref=e850]: "}"
                    - generic [ref=e851]: "void loop() {"
                    - generic [ref=e852]: digitalWrite(LED_BUILTIN, HIGH);
                    - generic [ref=e853]: "}"
                  - button "Copy code to clipboard" [ref=e855] [cursor=pointer]:
                    - generic [ref=e856]:
                      - img [ref=e857]
                      - img [ref=e859]
                - paragraph [ref=e861]:
                  - text: Here, even though
                  - strong [ref=e862]: HIGH
                  - text: is used, the LED will be
                  - strong [ref=e863]: "OFF"
                  - text: . You need to replace
                  - strong [ref=e864]: HIGH
                  - text: with
                  - strong [ref=e865]: LOW
                  - text: to turn
                  - strong [ref=e866]: "ON"
                  - text: the LED.
                - paragraph [ref=e867]: "Refer to the following pin mappings of the LEDs and use them in your codes:"
                - list [ref=e868]:
                  - listitem [ref=e869]: Red LED = LED_BUILTIN or LED_RED
                  - listitem [ref=e870]: Blue LED = LED_BLUE
                  - listitem [ref=e871]: Green LED = LED_GREEN

                  - /url: https://www.seeedstudio.com/Grove-Vision-AI-Module-V2-p-5851.html
                  - strong [ref=e400]:
                    - generic [ref=e401]: Get One Now 🖱️
                - heading "IntroductionDirect link to Introduction" [level=2] [ref=e402]:
                  - text: Introduction
                  - link "Direct link to Introduction" [ref=e403] [cursor=pointer]:
                    - /url: "#introduction"
                    - text: "#"
                - paragraph [ref=e404]: It is an MCU-based vision AI module powered by Arm Cortex-M55 & Ethos-U55. It supports TensorFlow and PyTorch frameworks and is compatible with Arduino IDE. With the SenseCraft AI algorithm platform, trained ML models can be deployed to the sensor without the need for coding. It features a standard CSI interface, an onboard digital microphone and an SD card slot, making it highly suitable for various embedded AI vision projects.
                - iframe [ref=e406]:
                  
                - generic [ref=e407]:
                  - generic [ref=e408]:
                    - img [ref=e410]
                    - text: tip
                  - paragraph [ref=e413]: Please use Chrome or Edge browser based on the Chrome engine.
                - heading "FeaturesDirect link to Features" [level=3] [ref=e414]:
                  - text: Features
                  - link "Direct link to Features" [ref=e415] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e416]:
                  - listitem [ref=e417]:
                    - strong [ref=e418]: Powerful AI Processing Capabilities
                    - text: ": Utilizes WiseEye2 HX6538 processor with a dual-core Arm Cortex-M55 and integrated Arm Ethos-U55 neural network unit."
                  - listitem [ref=e419]:
                    - strong [ref=e420]: Versatile AI Model Support
                    - text: ": Easily deploy off-the-shelf or your custom AI models from SenseCraft AI, including Mobilenet V1, V2, Efficientnet-lite, Yolo v5 & v8. TensorFlow and PyTorch frameworks are supported."
                  - listitem [ref=e421]:
                    - strong [ref=e422]: Rich Peripheral Devices
                    - text: ": Includes PDM microphone, SD card slot, Type-C, Grove interface, and other peripherals."
                  - listitem [ref=e423]:
                    - strong [ref=e424]: High Compatibility
                    - text: ": Compatible with XIAO series, Arduino, Raspberry Pi, ESP dev board, easy for further development."
                  - listitem [ref=e425]:
                    - strong [ref=e426]: Fully Open Source
                    - text: ": All codes, design files, and schematics available for modification and use."

                - heading "Bootloader Recovery Tool ManualDirect link to Bootloader Recovery Tool Manual" [level=3] [ref=e505]:
                  - text: Bootloader Recovery Tool Manual
                  - link "Direct link to Bootloader Recovery Tool Manual" [ref=e506] [cursor=pointer]:
                    - /url: "#bootloader-recovery-tool-manual"
                    - text: "#"
                - paragraph [ref=e507]: This part describes how to recover the bootloader of the Grove Vision AI (WE2) module. The recovery tool is a software tool that can be used to recover the bootloader of the Grove Vision AI (WE2) module in case the bootloader is corrupted, or flash a new firmware to the Grove Vision AI (WE2) module.
                - heading "PrerequisitesDirect link to Prerequisites" [level=4] [ref=e508]:
                  - text: Prerequisites
                  - link "Direct link to Prerequisites" [ref=e509] [cursor=pointer]:
                    - /url: "#prerequisites"
                    - text: "#"
                - list [ref=e510]:
                  - listitem [ref=e511]: Any board which has I2C interface and supported by Arduino IDE.
                  - listitem [ref=e512]: Grove Vision AI V2
                  - listitem [ref=e513]: 4-Pin Cable
                - heading "Software InstallationDirect link to Software Installation" [level=4] [ref=e514]:
                  - text: Software Installation
                  - link "Direct link to Software Installation" [ref=e515] [cursor=pointer]:
                    - /url: "#software-installation"
                    - text: "#"
                - list [ref=e516]:
                  - listitem [ref=e517]:
                    - text: Install the Arduino IDE from the
                    - link "official website" [ref=e518] [cursor=pointer]:
                      - /url: https://www.arduino.cc/en/software
                    - text: .
                  - listitem [ref=e519]:
                    - text: Download the latest version of the Seeed_Arduino_SSCMA library from the
                    - link "GitHub repository" [ref=e520] [cursor=pointer]:
                      - /url: https://github.com/Seeed-Studio/Seeed_Arduino_SSCMA
                    - text: .
                  - listitem [ref=e521]:
                    - text: Add the library to your Arduino IDE by selecting
                    - strong [ref=e522]: Sketch > Include Library > Add .ZIP Library
                    - text: and choosing the downloaded file.
                  - listitem [ref=e523]:
                    - text: Open the
                    - code [ref=e524]: we2_iic_bootloader_recover
                    - text: "example from the Arduino IDE:"
                    - strong [ref=e525]: File > Examples > Seeed_Arduino_SSCMA > we2_iic_bootloader_recover
                    - text: .
                  - listitem [ref=e526]: Upload the example to your Arduino board.
                - heading "Hardware ConnectionDirect link to Hardware Connection" [level=4] [ref=e527]:
                  - text: Hardware Connection
                  - link "Direct link to Hardware Connection" [ref=e528] [cursor=pointer]:
                    - /url: "#hardware-connection"
                    - text: "#"
                - paragraph [ref=e529]: Connect the Grove Vision AI (WE2) module to the default I2C interface of your Arduino board using the 4-Pin Cable. Make sure each wire is connected to the correct pin.
                - list [ref=e530]:
                  - listitem [ref=e531]: SCL -> SCL (Grove Vision AI WE2)
                  - listitem [ref=e532]: SDA -> SDA (Grove Vision AI WE2)
                  - listitem [ref=e533]: VCC -> VCC (Grove Vision AI WE2, 3.3V)
                  - listitem [ref=e534]: GND -> GND (Grove Vision AI WE2)
                - heading "UsageDirect link to Usage" [level=4] [ref=e535]:
                  - text: Usage
                  - link "Direct link to Usage" [ref=e536] [cursor=pointer]:
                    - /url: "#usage"
                    - text: "#"
                - list [ref=e537]:
                  - listitem [ref=e538]: Make sure your Arduino board is connected to your computer, and the Grove Vision AI (WE2) module is connected to the Arduino board.
                  - listitem [ref=e539]: Open the Serial Monitor in the Arduino IDE. (or any other serial monitor software, e.g., minicom, PuTTY)
                  - listitem [ref=e540]: Wait for the Grove Vision AI (WE2) device to be detected
                  - listitem [ref=e541]: Press 'enter' to start the bootloader recovery process, wait for the process to complete
                - generic [ref=e542]:
                  - generic [ref=e543]:
                    - img [ref=e545]
                    - text: note
                  - paragraph [ref=e548]: Before connecting the Grove Vision AI V2 to your computer, keep the BOOT button pressed while connecting to your computer via the data cable, and then release the BOOT button. In some cases, you may have to try 3-10 times to recover the bootloader successfully.

                - 'heading "Q1: Is it possible for Grove Vision AI to see XIAO result information while outputting a live screen?Direct link to Q1: Is it possible for Grove Vision AI to see XIAO result information while outputting a live screen?" [level=3] [ref=e574]':
                  - text: "Q1: Is it possible for Grove Vision AI to see XIAO result information while outputting a live screen?"
                  - 'link "Direct link to Q1: Is it possible for Grove Vision AI to see XIAO result information while outputting a live screen?" [ref=e575] [cursor=pointer]':
                    - /url: "#q1-is-it-possible-for-grove-vision-ai-to-see-xiao-result-information-while-outputting-a-live-screen"
                    - text: "#"
                - paragraph [ref=e576]: No can do. Considering the frame rate or the speed of image inference, we do not support simultaneous execution of both jobs at this stage. If XIAO is connected, then you can only receive the recognised information reported, but not the real-time frame.
                - 'heading "Q2: Which cameras does Grove Vision AI V2 support? Does it only support the OV5647-62?Direct link to Q2: Which cameras does Grove Vision AI V2 support? Does it only support the OV5647-62?" [level=3] [ref=e577]':
                  - text: "Q2: Which cameras does Grove Vision AI V2 support? Does it only support the OV5647-62?"
                  - 'link "Direct link to Q2: Which cameras does Grove Vision AI V2 support? Does it only support the OV5647-62?" [ref=e578] [cursor=pointer]':
                    - /url: "#q2-which-cameras-does-grove-vision-ai-v2-support-does-it-only-support-the-ov5647-62"
                    - text: "#"
                - paragraph [ref=e579]:
                  - text: You can check
                  - link "here" [ref=e580] [cursor=pointer]:
                    - /url: /Grove-vision-ai-v2-camera-supported/
                  - text: . Currently we have written drivers for the OV5642 series of cameras, so Grove Vision AI V2 supports the full range of Raspberry Pi OV5647 cameras, e.g., the OV5647-62, OV5647-67, and OV5647-160.The other CSI cameras are theoretically supported, but due to the fact that some of the cameras don't have drivers written for them or the do not have a colour processing unit themselves, so there may be a problem that the colour is only green, and the loss of full colour will have a possible impact on the accuracy of the recognition.

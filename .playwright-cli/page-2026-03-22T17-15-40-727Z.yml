                    - /url: "#boot--reset--flashed-driver"
                    - text: "#"
                - heading "BootDirect link to Boot" [level=3] [ref=e449]:
                  - text: Boot
                  - link "Direct link to Boot" [ref=e450] [cursor=pointer]:
                    - /url: "#boot"
                    - text: "#"
                - paragraph [ref=e451]: If you have used some unusual method that has caused the Grove Vision AI to not work properly at all (at the software level), then you may need to put the device into BootLoader mode to revive the device. Here is how to enter BootLoader mode.
                - paragraph [ref=e452]:
                  - strong [ref=e453]: Method 1
                - paragraph [ref=e454]: Please disconnect the connection cable between the Grove Vision AI and your computer, then press and hold the Boot button on the device without releasing it. At this time, please connect Grove Vision AI to your computer with a Type-C type data cable, and then release it again. At this point the device will enter BootLoader mode.
                - img [ref=e456]
                - paragraph [ref=e457]:
                  - strong [ref=e458]: Method 2
                - paragraph [ref=e459]: With the Grove Vision AI connected to your computer, you can enter BootLoader mode by pressing the Boot button and then quickly pressing the Reset button.
                - img [ref=e461]
                - heading "ResetDirect link to Reset" [level=3] [ref=e462]:
                  - text: Reset
                  - link "Direct link to Reset" [ref=e463] [cursor=pointer]:
                    - /url: "#reset"
                    - text: "#"
                - paragraph [ref=e464]: If you're experiencing problems with device data suddenly not uploading or images getting stuck, you can try restarting your device using the Reset button.
                - img [ref=e466]
                - heading "DriverDirect link to Driver" [level=3] [ref=e467]:
                  - text: Driver
                  - link "Direct link to Driver" [ref=e468] [cursor=pointer]:
                    - /url: "#driver"
                    - text: "#"
                - paragraph [ref=e469]: If you find that the Grove Vision AI V2 is not recognised after connecting it to your computer. Then you may need to install the CH343 driver on your computer. Here are some links to download and install the CH343 driver.
                - list [ref=e470]:
                  - listitem [ref=e471]:
                    - text: "Windows Vendor VCP Driver One-Click Installer:"
                    - link "CH343SER.EXE" [ref=e472] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/grove-vision-ai-v2/res/CH343SER.EXE
                  - listitem [ref=e473]:
                    - text: "Windows Vendor VCP Driver:"
                    - link "CH343SER.ZIP" [ref=e474] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/grove-vision-ai-v2/res/CH343SER.ZIP
                  - listitem [ref=e475]:
                    - text: "Windows CDC driver one-click installer:"
                    - link "CH343CDC.EXE" [ref=e476] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/grove-vision-ai-v2/res/CH343CDC.EXE
                  - listitem [ref=e477]:
                    - text: "Windows CDC driver:"
                    - link "CH343CDC.ZIP" [ref=e478] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/grove-vision-ai-v2/res/CH343SER.ZIP
                  - listitem [ref=e479]:
                    - text: "macOS Vendor VCP Driver:"
                    - link "CH34xSER_MAC.ZIP" [ref=e480] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/grove-vision-ai-v2/res/CH341SER_MAC.ZIP
                - generic [ref=e481]:
                  - generic [ref=e482]:
                    - img [ref=e484]
                    - text: tip
                  - generic [ref=e486]:
                    - paragraph [ref=e487]: Usage on Linux, you need to add the following, the following is UBUNTU, other systems are similar, but will not list them
                    - generic [ref=e489]:
                      - code [ref=e491]:

                  - listitem [ref=e433]:
                    - strong [ref=e434]: Network
                    - text: ":"
                    - list [ref=e435]:
                      - listitem [ref=e436]: Stable Wi-Fi for seamless interaction between hardware and Home Assistant.
                - 'heading "Step 1: Setting Up Home AssistantDirect link to Step 1: Setting Up Home Assistant" [level=3] [ref=e437]':
                  - text: "Step 1: Setting Up Home Assistant"
                  - 'link "Direct link to Step 1: Setting Up Home Assistant" [ref=e438] [cursor=pointer]':
                    - /url: "#setting-up-home-assistant"
                    - text: "#"
                - list [ref=e439]:
                  - listitem [ref=e440]:
                    - strong [ref=e441]: Installation
                    - text: ": homeassistant is already pre-installed in"
                    - link "Home Assistant Green" [ref=e442] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Home-Assistant-Green-p-5792.html
                    - text: .
                  - listitem [ref=e443]:
                    - strong [ref=e444]: Enabling ESPHome Add-on
                    - text: ":"
                    - list [ref=e445]:
                      - listitem [ref=e446]: Access the Home Assistant dashboard.
                      - listitem [ref=e447]: Navigate to the "Add-ons" section and search for the ESPHome add-on.
                      - listitem [ref=e448]: Click "Install" and then "Start" to enable it.
                      - listitem [ref=e449]: Once installed, configure the add-on to ensure proper communication with the XIAO ESP32C6.
                - img [ref=e451]
                - paragraph [ref=e452]: By gathering the necessary components and setting up Home Assistant with the ESPHome add-on, you'll be ready to proceed with the integration of the 6-Channel relay module.
                - 'heading "Step 2: Preparing the Relay ModuleDirect link to Step 2: Preparing the Relay Module" [level=3] [ref=e453]':
                  - text: "Step 2: Preparing the Relay Module"
                  - 'link "Direct link to Step 2: Preparing the Relay Module" [ref=e454] [cursor=pointer]':
                    - /url: "#step-2-preparing-the-relay-module"
                    - text: "#"
                - paragraph [ref=e455]: "By default, your device (XIAO ESP32C6) comes pre-flashed with firmware for 6-Channel relay. However, there are two scenarios where you may need to update the firmware:"
                - list [ref=e456]:
                  - listitem [ref=e457]:
                    - strong [ref=e458]: Re-flashing the Firmware
                    - text: ": If the existing firmware is corrupted or you need to start fresh."
                  - listitem [ref=e459]:
                    - strong [ref=e460]: Upgrading the Firmware
                    - text: ": If there is a newer version of the firmware with improved functionality."
                - paragraph [ref=e461]: "There are two simple methods for flashing the firmware:"
                - generic [ref=e462]:
                  - generic [ref=e463]:
                    - img [ref=e465]
                    - text: caution
                  - paragraph [ref=e468]: Firefox does not support flashing firmware on ESP devices. Please use Google Chrome or Microsoft Edge instead.
                - generic [ref=e469]:
                  - tablist [ref=e470]:
                    - tab "Web Tool" [selected] [ref=e471] [cursor=pointer]
                    - tab "ESPHome Web" [ref=e472] [cursor=pointer]
                  - tabpanel [ref=e474]:
                    - paragraph [ref=e475]:
                      - text: You can use this
                      - link "Web Tool" [ref=e476] [cursor=pointer]:
                        - /url: https://seeed-projects.github.io/6-Channel_Relay_based_on_XIAO_ESP32C6/
                      - text: for an easy and direct method to flash your firmware. Simply follow the on-screen instructions.
                    - list [ref=e477]:
                      - listitem [ref=e478]:
                        - text: Click the
                        - code [ref=e479]: CONNECT
                        - text: button to initiate the connection. The tool will automatically update the firmware.
                    - paragraph [ref=e480]:
                      - text: If something goes wrong, follow the on-screen troubleshooting steps or switch to the
                      - code [ref=e481]: ESPHome Web
                      - text: method to complete the process.
                - paragraph [ref=e482]: With either method, you'll have your firmware updated and ready for integration with Home Assistant.
                - 'heading "Step 3: Network ConfigurationDirect link to Step 3: Network Configuration" [level=3] [ref=e483]':
                  - text: "Step 3: Network Configuration"
                  - 'link "Direct link to Step 3: Network Configuration" [ref=e484] [cursor=pointer]':
                    - /url: "#step-3-network-configuration"
                    - text: "#"
                - list [ref=e485]:
                  - listitem [ref=e486]:
                    - strong [ref=e487]: Enable Access Point
                    - text: ":"
                    - list [ref=e488]:
                      - listitem [ref=e489]:
                        - text: "Upon powering up for the first time, the module will create a Wi-Fi network (SSID:"
                        - code [ref=e490]: seeedstudio-6-channel-relay
                        - text: ).
                - img [ref=e492]
                - list [ref=e493]:
                  - listitem [ref=e494]:
                    - strong [ref=e495]: Access Configuration
                    - text: ":"
                    - list [ref=e496]:
                      - listitem [ref=e497]: Connect to the network using a phone or PC.
                      - listitem [ref=e498]:
                        - text: Open a browser and navigate to
                        - link "http://192.168.4.1" [ref=e499] [cursor=pointer]:
                          - /url: http://192.168.4.1
                        - text: .
                      - listitem [ref=e500]: Enter the SSID and password of your home Wi-Fi network.
                - img [ref=e502]
                - list [ref=e503]:
                  - listitem [ref=e504]:
                    - strong [ref=e505]: Home Assistant Integration
                    - text: ":"
                    - list [ref=e506]:
                      - listitem [ref=e507]:
                        - text: Once connected to the home network, the module will be discoverable in Home Assistant under
                        - code [ref=e508]: Settings -> Devices & Services
                        - text: .
                - img [ref=e510]
                - paragraph [ref=e511]: This way, you can connect the module to your Home Assistant network and let Home Assistant discover it.
                - 'heading "Step 4: Add the module deviceDirect link to Step 4: Add the module device" [level=3] [ref=e512]':
                  - text: "Step 4: Add the module device"
                  - 'link "Direct link to Step 4: Add the module device" [ref=e513] [cursor=pointer]':
                    - /url: "#step-4-add-the-module-device"
                    - text: "#"
                - list [ref=e514]:
                  - listitem [ref=e515]:
                    - strong [ref=e516]: Automatic Discovery
                    - text: ":"
                    - list [ref=e517]:
                      - listitem [ref=e518]:
                        - text: Ensure the
                        - strong [ref=e519]: ESPHome
                        - text: is installed in Home Assistant.
                      - listitem [ref=e520]:
                        - text: Navigate to
                        - code [ref=e521]: Settings -> Devices & Services -> Integrations
                        - text: and look for the device.
                  - listitem [ref=e522]:
                    - strong [ref=e523]: Manual Configuration
                    - text: ":"
                    - list [ref=e524]:
                      - listitem [ref=e525]: If not automatically discovered, manually add the device by specifying its IP address.
                - paragraph [ref=e526]: After adding the device, you can see all six switches in the Overview page.
                - img [ref=e528]
                - paragraph [ref=e529]: You can also set the name of each switch individually.
                - img [ref=e531]
                - 'heading "Step 5: Connect the appliances you want to controlDirect link to Step 5: Connect the appliances you want to control" [level=3] [ref=e532]':
                  - text: "Step 5: Connect the appliances you want to control"

                    - text: "#"
                - generic [ref=e534]:
                  - generic [ref=e535]:
                    - img [ref=e537]
                    - text: Safety Warning
                  - generic [ref=e539]:
                    - paragraph [ref=e540]: This relay module is designed for low-voltage DC operation. Do not connect it to AC power to avoid electrical hazards. Always disconnect the power supply before wiring the relay to prevent short circuits and electric shock.
                    - paragraph [ref=e541]: Voltages exceeding 24V may cause electric shock or burns, especially in cases of broken skin or in moist environments. Exercise caution when handling electrical devices to avoid injury.
                - list [ref=e542]:
                  - listitem [ref=e543]:
                    - text: "Wiring:"
                    - list [ref=e544]:
                      - listitem [ref=e545]: Follow the Physical Layout and Connections section to wire the relay module.
                      - listitem [ref=e546]: Ensure all connections are secure, and there are no exposed wires.
                  - listitem [ref=e547]:
                    - text: "Power On:"
                    - list [ref=e548]:
                      - listitem [ref=e549]: Power on the module through USB.
                      - listitem [ref=e550]: Turn on the DC power supply to control other electrical appliances.
                - heading "Safety and MaintenanceDirect link to Safety and Maintenance" [level=2] [ref=e551]:
                  - text: Safety and Maintenance
                  - link "Direct link to Safety and Maintenance" [ref=e552] [cursor=pointer]:
                    - /url: "#safety-and-maintenance"
                    - text: "#"
                - list [ref=e553]:
                  - listitem [ref=e554]: Periodically inspect wiring for wear and tear.
                  - listitem [ref=e555]: Use proper circuit protection devices, such as fuses or breakers.
                  - listitem [ref=e556]: Keep the device away from water and excessive heat.
                - heading "FAQsDirect link to FAQs" [level=2] [ref=e557]:
                  - text: FAQs
                  - link "Direct link to FAQs" [ref=e558] [cursor=pointer]:
                    - /url: "#faqs"
                    - text: "#"
                - list [ref=e559]:
                  - listitem [ref=e560]:
                    - strong [ref=e561]: What happens if the device is disconnected from Wi-Fi?
                    - list [ref=e562]:
                      - listitem [ref=e563]: The module will attempt to reconnect automatically. If it fails, it will enable its fallback access point for reconfiguration.
                  - listitem [ref=e564]:
                    - strong [ref=e565]: Can I use the USB port while connected to AC power?
                    - list [ref=e566]:
                      - listitem [ref=e567]: No, using USB while connected to AC power may damage the device or create a safety hazard.
                  - listitem [ref=e568]:
                    - strong [ref=e569]: Can this module work without Home Assistant?
                    - list [ref=e570]:
                      - listitem [ref=e571]:
                        - text: Yes, the module can be controlled via its
                        - strong [ref=e572]: local IP address
                        - text: or integrated with other platforms that support ESPHome or MQTT.

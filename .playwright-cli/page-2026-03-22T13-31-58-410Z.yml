                - heading "FeaturesDirect link to Features" [level=3] [ref=e460]:
                  - text: Features
                  - link "Direct link to Features" [ref=e461] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e462]:
                  - listitem [ref=e463]:
                    - strong [ref=e464]: Powerful CPU
                    - text: :ARM Cortex-M33 core, with a maximum clock speed of 78MHz, supporting DSP instructions and FPU floating-point operations, 32-bit RISC architecture.
                  - listitem [ref=e465]:
                    - strong [ref=e466]: Ultra-Low Power
                    - text: :RX current 4.6mA/TX current 5mA (0dBm), multiple low-power sleep modes
                  - listitem [ref=e467]:
                    - strong [ref=e468]: Powerful AI
                    - text: :Built in AI/ML hardware accelerator MVP, capable of efficiently processing AI/machine learning algorithms.
                  - listitem [ref=e469]:
                    - strong [ref=e470]: Multi style wireless transmission
                    - text: :Integrated 2.4GHz multi protocol wireless transceiver, supporting multiple IoT protocols such as Matter, OpenThread, Zigbee, Bluetooth LE 5.3, Bluetooth mesh, etc.
                  - listitem [ref=e471]:
                    - strong [ref=e472]: Better RF Performance
                    - text: :Excellent RF performance, with a transmission power of up to+19.5 dBm and a reception sensitivity as low as -105.4 dBm (250kbps DSSS)
                  - listitem [ref=e473]:
                    - strong [ref=e474]: Powerful security
                    - text: :Powerful security features of Secure Vault, including secure boot, encryption, random number generation, tamper proof, secure debugging, etc.
                  - listitem [ref=e475]:
                    - strong [ref=e476]: Ultra-small size
                    - text: :21 x 17.8mm.
                  - listitem [ref=e477]:
                    - strong [ref=e478]: Rich on-chip resources
                    - text: :Maximum 1536KB Flash and 256KB RAM, with ample storage space.
                  - listitem [ref=e479]:
                    - strong [ref=e480]: Rich interfaces
                    - text: :Integrated with 12 bit 1Msps ADC, temperature sensor, analog comparator, DCDC and other rich peripherals, and up to 22 Pin, 2 USART, 2 low-power UART, 1 IIC and other interfaces.

                - paragraph [ref=e1125]:
                  - text: Special thanks to the
                  - strong [ref=e1126]: Seeed Studio community
                  - text: for their valuable contributions and solutions to this issue. The recovery methods and preventive measures discussed in this tutorial were developed based on insights from community members like
                  - strong [ref=e1127]:
                    - link "msfujino" [ref=e1128] [cursor=pointer]:

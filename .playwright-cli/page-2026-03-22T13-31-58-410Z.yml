                - heading "Battery UsageDirect link to Battery Usage" [level=2] [ref=e821]:
                  - text: Battery Usage
                  - link "Direct link to Battery Usage" [ref=e822] [cursor=pointer]:
                    - /url: "#battery-usage"
                    - text: "#"
                - paragraph [ref=e823]: The XIAO MG24 has a built-in power management chip that allows the XIAO MG24 to be powered independently by using a battery or to charge the battery through the XIAO MG24's USB port.
                - paragraph [ref=e824]: If you want to connect the battery for XIAO, we recommend you to purchase qualified rechargeable 3.7V lithium battery. When soldering the battery, please be careful to distinguish between the positive and negative terminals. The negative terminal of the power supply should be the side closest to the USB port, and the positive terminal of the power supply is the side away from the USB port.
                - img "pir" [ref=e826]
                - generic [ref=e827]:
                  - generic [ref=e828]:
                    - img [ref=e830]
                    - text: caution
                  - paragraph [ref=e833]: Please be careful not to short-circuit the positive and negative terminals and burn the battery and equipment when soldering.
                - paragraph [ref=e834]:
                  - strong [ref=e835]: "Instructions on the use of batteries:"
                - list [ref=e836]:
                  - listitem [ref=e837]: Please use qualified batteries that meet the specifications.
                  - listitem [ref=e838]: XIAO can be connected to your computer device via data cable while using the battery, rest assured that XIAO has a built-in circuit protection chip, which is safe.
                  - listitem [ref=e839]: The XIAO MG24 will not have any LED on when it is battery powered (unless you have written a specific program), please do not judge whether the XIAO MG24 is working or not by the condition of the LED, please judge it reasonably by your program.
                  - listitem [ref=e840]: Sorry, we currently have no way to help you check the remaining battery level through software (because there are no more chip pins available), you need to charge the battery regularly or use a multimeter to check the battery level.
                - paragraph [ref=e841]: At the same time, we designed a red indicator light for battery charging, through the indicator light display to inform the user of the current state of the battery in the charge.
                - list [ref=e842]:
                  - listitem [ref=e843]: When XIAO MG24 is not connected to the battery, the red light comes on when the Type-C cable is connected and goes off after 30 seconds.
                  - listitem [ref=e844]: The red light flashes when the battery is connected and the Type-C cable is connected for charging.
                  - listitem [ref=e845]: When connecting Type-C to charge the battery fully, the red light turns off.
                - img [ref=e847]
                - heading "Reading Battery VoltageDirect link to Reading Battery Voltage" [level=2] [ref=e848]:
                  - text: Reading Battery Voltage
                  - link "Direct link to Reading Battery Voltage" [ref=e849] [cursor=pointer]:
                    - /url: "#reading-battery-voltage"
                    - text: "#"
                - paragraph [ref=e850]:
                  - strong [ref=e851]: Software code
                - generic [ref=e853]:
                  - code [ref=e855]:
                    - generic [ref=e856]: /*
                    - generic [ref=e857]: AnalogReadSerial

                - heading "Preventing XIAO MG24 from Bricking During Deep SleepDirect link to Preventing XIAO MG24 from Bricking During Deep Sleep" [level=3] [ref=e1071]:
                  - text: Preventing XIAO MG24 from Bricking During Deep Sleep
                  - link "Direct link to Preventing XIAO MG24 from Bricking During Deep Sleep" [ref=e1072] [cursor=pointer]:
                    - /url: "#preventing-xiao-mg24-from-bricking-during-deep-sleep"
                    - text: "#"
                - paragraph [ref=e1073]:
                  - text: The
                  - strong [ref=e1074]: XIAO MG24
                  - text: is a powerful microcontroller board from Seeed Studio, but users have reported issues where the device becomes unresponsive ("bricked") after entering Deep Sleep mode. This tutorial explains the cause of the problem, provides a detailed recovery method, and offers preventive measures to avoid bricking your XIAO MG24.
                - paragraph [ref=e1075]:
                  - text: The XIAO MG24 enters a
                  - strong [ref=e1076]: Deep Sleep mode
                  - text: (EM4) to conserve power, but in some cases, it fails to wake up properly, preventing new sketches from being uploaded. Unlike other XIAO boards, the MG24 does not have a dedicated
                  - strong [ref=e1077]: BOOT button
                  - text: or a documented method to enter boot mode, making recovery challenging.
                - heading "Preventive MeasuresDirect link to Preventive Measures" [level=4] [ref=e1078]:
                  - text: Preventive Measures
                  - link "Direct link to Preventive Measures" [ref=e1079] [cursor=pointer]:
                    - /url: "#preventive-measures"
                    - text: "#"
                - paragraph [ref=e1080]: "To avoid bricking your XIAO MG24 while using Deep Sleep mode, follow these steps:"
                - list [ref=e1081]:
                  - listitem [ref=e1082]: Use the Escape Pin (PC1)
                - paragraph [ref=e1083]:
                  - text: The XIAO MG24 has a built-in
                  - strong [ref=e1084]: escape mechanism
                  - text: to prevent bricking. If
                  - strong [ref=e1085]: PC1
                  - text: is pulled
                  - strong [ref=e1086]: LOW
                  - text: during reset, the device enters an infinite loop, allowing you to upload a new sketch.
                - list [ref=e1087]:
                  - listitem [ref=e1088]:
                    - text: Connect
                    - strong [ref=e1089]: PC1
                    - text: to
                    - strong [ref=e1090]: GND
                    - text: before resetting the device.
                  - listitem [ref=e1091]: After resetting, upload your sketch while the device is in the loop.
                - list [ref=e1092]:
                  - listitem [ref=e1093]: "Modify Your Sketch Add the following code to your sketch to detect a user switch and enter an infinite loop if pressed. This allows you to upload a new sketch while the device is looping:"
                - generic [ref=e1095]:
                  - code [ref=e1097]:
                    - generic [ref=e1098]: "#define USER_SW PC3 // Example pin for user switch"
                    - generic [ref=e1099]: "void setup() {"
                    - generic [ref=e1100]: // Other setup code...
                    - generic [ref=e1101]: pinMode(USER_SW, INPUT_PULLUP);
                    - generic [ref=e1102]: "if (digitalRead(USER_SW) == LOW) {"
                    - generic [ref=e1103]: Serial.println("Enable to upload new sketch");
                    - generic [ref=e1104]: "while (true) {"
                    - generic [ref=e1105]: digitalWrite(LED_BUILTIN, LOW);
                    - generic [ref=e1106]: delay(50);
                    - generic [ref=e1107]: digitalWrite(LED_BUILTIN, HIGH);
                    - generic [ref=e1108]: delay(50);
                    - generic [ref=e1109]: "}"
                    - generic [ref=e1110]: "}"
                    - generic [ref=e1111]: "}"
                  - button "Copy code to clipboard" [ref=e1113] [cursor=pointer]:
                    - generic [ref=e1114]:
                      - img [ref=e1115]
                      - img [ref=e1117]
                - list [ref=e1119]:
                  - listitem [ref=e1120]: Avoid Unnecessary Flash Sleep
                - paragraph [ref=e1121]:
                  - text: Ensure that your sketch does not put the flash memory into sleep mode (
                  - code [ref=e1122]: Deep Power Down
                  - text: ) unless absolutely necessary. This can prevent issues with uploading new sketches.
                - heading "AcknowledgmentsDirect link to Acknowledgments" [level=4] [ref=e1123]:

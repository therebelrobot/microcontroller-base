                - heading "Getting startedDirect link to Getting started" [level=2] [ref=e693]:
                  - text: Getting started
                  - link "Direct link to Getting started" [ref=e694] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e695]: To enable you to get started with the XIAO MG24 faster, please read the hardware and software preparation below to prepare the XIAO.
                - heading "Factory procedureDirect link to Factory procedure" [level=3] [ref=e696]:
                  - text: Factory procedure
                  - link "Direct link to Factory procedure" [ref=e697] [cursor=pointer]:
                    - /url: "#factory-procedure"
                    - text: "#"
                - paragraph [ref=e698]: We pre-program each new XIAO MG24 and XIAO MG24 Sense with a simple factory program.
                - list [ref=e699]:
                  - listitem [ref=e700]:
                    - strong [ref=e701]: XIAO MG24
                - paragraph [ref=e702]: The factory program preset in the regular version is Blink Light. When you power up the XIAO,the orange user indicator will light up.
                - img [ref=e704]
                - list [ref=e705]:
                  - listitem [ref=e706]:
                    - strong [ref=e707]: XIAO MG24 Sense
                - paragraph [ref=e708]: The factory program preset in the regular version is The louder you shout, the brighter the light will be.
                - img [ref=e710]
                - heading "Hardware PreparationDirect link to Hardware Preparation" [level=3] [ref=e711]:
                  - text: Hardware Preparation
                  - link "Direct link to Hardware Preparation" [ref=e712] [cursor=pointer]:
                    - /url: "#hardware-preparation"
                    - text: "#"
                - paragraph [ref=e713]: "You need to prepare the following:"
                - list [ref=e714]:
                  - listitem [ref=e715]:
                    - text: 1 x
                    - link "Seeed Studio XIAO MG24" [ref=e716] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-Studio-XIAO-MG24-p-6247.html
                  - listitem [ref=e717]: 1 x Computer
                  - listitem [ref=e718]: 1 x USB Type-C cable
                - generic [ref=e719]:
                  - generic [ref=e720]:
                    - img [ref=e722]
                    - text: tip
                  - paragraph [ref=e725]:
                    - text: Some USB cables can only supply power and cannot transfer data. If you don't have a USB cable or don't know if your USB cable can transmit data, you can check
                    - link "Seeed USB Type-C support USB 3.1" [ref=e726] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/USB-3-1-Type-C-to-A-Cable-1-Meter-3-1A-p-4085.html
                    - text: .
                - heading "Software PreparationDirect link to Software Preparation" [level=3] [ref=e727]:
                  - text: Software Preparation
                  - link "Direct link to Software Preparation" [ref=e728] [cursor=pointer]:
                    - /url: "#software-preparation"
                    - text: "#"
                - paragraph [ref=e729]: The recommended programming tool for the XIAO MG24 is the Arduino IDE, so you need to complete the Arduino installation as part of the software preparation.
                - generic [ref=e730]:
                  - generic [ref=e731]:
                    - img [ref=e733]
                    - text: tip
                  - paragraph [ref=e736]:
                    - text: If this is your first time using Arduino, we highly recommend you to refer to
                    - link "Getting Started with Arduino" [ref=e737] [cursor=pointer]:
                      - /url: https://wiki.seeedstudio.com/Getting_Started_with_Arduino/
                    - text: .
                - list [ref=e738]:
                  - listitem [ref=e739]:
                    - strong [ref=e740]: Step 1.
                    - text: Download and Install the stable version of Arduino IDE according to your operating system.
                - link "Download Arduino IDE" [ref=e742] [cursor=pointer]:
                  - /url: https://www.arduino.cc/en/software
                  - strong [ref=e743]:
                    - generic [ref=e744]: Download Arduino IDE
                - list [ref=e745]:
                  - listitem [ref=e746]:
                    - strong [ref=e747]: Step 2.
                    - text: Launch the Arduino application.
                  - listitem [ref=e748]:
                    - strong [ref=e749]:
                      - link "Step 3" [ref=e750] [cursor=pointer]:
                        - /url: "#add-board"
                      - text: .
                    - text: Add the XIAO MG24 on-board package to the Arduino IDE and click
                    - code [ref=e751]: OK
                    - text: .
                  - listitem [ref=e752]:
                    - strong [ref=e753]: Step 4.
                    - text: Close the Arduino IDE and reopen it.
                - heading "Add the XIAO MG24 BoardDirect link to Add the XIAO MG24 Board" [level=4] [ref=e754]:

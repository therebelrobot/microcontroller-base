                - img [ref=e807]
                - paragraph [ref=e808]: Once the program is successfully uploaded, you will see the following output message and you can observe that the orange LED on the right side of the XIAO MG24 is blinking.
                - table [ref=e810]:
                  - row "MG24 BLink Code LED BLink DisPlay" [ref=e811]:
                    - columnheader "MG24 BLink Code" [ref=e812]
                    - columnheader "LED BLink DisPlay" [ref=e813]
                  - row [ref=e814]:
                    - cell [ref=e815]:
                      - img [ref=e817]

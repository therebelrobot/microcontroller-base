                - heading "FeaturesDirect link to Features" [level=3] [ref=e454]:
                  - text: Features
                  - link "Direct link to Features" [ref=e455] [cursor=pointer]:
                    - /url: "#features"
                    - text: "#"
                - list [ref=e456]:
                  - listitem [ref=e457]:
                    - strong [ref=e458]: "Powerful CPU:"
                    - text: ESP32-C5, 32bit RISC-V singlecore processor that operates at up to 240 MHz
                  - listitem [ref=e459]:
                    - strong [ref=e460]: "Complete WiFi subsystem:"
                    - text: Dual-band Wi-Fi 6 subsystem (2.4 GHz and 5 GHz) compliant with IEEE 802.11 a/b/g/n/ac/ax, supporting Station, SoftAP, concurrent SoftAP+Station operation, and promiscuous (monitor) mode.
                  - listitem [ref=e461]:
                    - strong [ref=e462]: "Bluetooth LE subsystem:"
                    - text: Supports features of Bluetooth 5 and Bluetooth mesh
                  - listitem [ref=e463]:
                    - strong [ref=e464]: "Better RF performance:"
                    - text: External RF antenna included.
                  - listitem [ref=e465]:
                    - strong [ref=e466]: "Battery charging chip:"
                    - text: Supports lithium battery charge and discharge management.
                  - listitem [ref=e467]:
                    - strong [ref=e468]: "Rich on-chip resources:"
                    - text: 384 KB on-chip SRAM, 320 KB of ROM
                  - listitem [ref=e469]:
                    - strong [ref=e470]: "Ultra small size:"
                    - text: As small as a thumb(21x17.8mm) XIAO series classic form-factor for wearable devices and small projects
                  - listitem [ref=e471]:
                    - strong [ref=e472]: Reliable security features
                    - text: ": Cryptographic hardware accelerators supporting AES-128/256, SHA family hashing, HMAC, a dedicated digital signature peripheral, and Secure Boot (V2)."
                  - listitem [ref=e473]:
                    - strong [ref=e474]: Rich interfaces
                    - text: ": 1×I2C, 1×SPI, 2×UART, up to 11×GPIO (PWM-capable), 5×ADC channels, and a JTAG(pads on the reverse side) bonding-pad interface."
                  - listitem [ref=e475]: Single-sided components, surface mounting design

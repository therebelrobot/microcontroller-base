                    - list [ref=e898]:
                      - listitem [ref=e899]:
                        - text: This function is used to read the current analog voltage from the
                        - code [ref=e900]: BAT_VOLT_PIN
                        - text: pin and return a calibrated voltage value in millivolts (mV).
                      - listitem [ref=e901]:
                        - text: Unlike the conventional
                        - code [ref=e902]: analogRead()
                        - text: ", which only provides a raw ADC value,"
                        - code [ref=e903]: analogReadMilliVolts()
                        - text: automatically applies the factory calibration parameters embedded in the chip. This results in higher accuracy, improved linearity in voltage measurement, and eliminates the need for manual ADC-to-voltage conversion.
                      - listitem [ref=e904]:
                        - text: During the voltage sampling process, a
                        - strong [ref=e905]: 16-times repeated sampling
                        - text: is performed through a
                        - code [ref=e906]: for
                        - text: loop, and the results are accumulated. The purpose of multiple sampling is to suppress transient noise and discrete errors, thereby improving measurement stability. Finally, the accumulated value is divided by the number of samples (16) to obtain a smoother and more reliable averaged voltage value.

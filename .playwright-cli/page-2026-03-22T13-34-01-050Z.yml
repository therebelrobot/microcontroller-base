                  - text: Software
                  - link "Direct link to Software" [ref=e687] [cursor=pointer]:
                    - /url: "#software"
                    - text: "#"
                - paragraph [ref=e688]: The recommended programming tool for the XIAO ESP32-C5 is the Arduino IDE, so you need to complete the Arduino installation as part of the software preparation.
                - generic [ref=e689]:
                  - generic [ref=e690]:
                    - img [ref=e692]
                    - text: tip
                  - paragraph [ref=e695]:
                    - text: If this is your first time using Arduino, we highly recommend you to refer to
                    - link "Getting Started with Arduino" [ref=e696] [cursor=pointer]:
                      - /url: https://wiki.seeedstudio.com/Getting_Started_with_Arduino/
                    - text: .
                - list [ref=e697]:
                  - listitem [ref=e698]:
                    - paragraph [ref=e699]:
                      - strong [ref=e700]: Step 1.
                      - text: Download and Install the stable version of Arduino IDE according to your operating system.
                    - link "Download Arduino IDE" [ref=e702] [cursor=pointer]:

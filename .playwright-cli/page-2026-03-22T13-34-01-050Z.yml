                - img [ref=e755]
                - paragraph [ref=e756]: "Effect demonstration:"
                - paragraph [ref=e757]: After you upload the program, you will see the L indicator light flashing at intervals of 1 second, and at the same time, the serial monitor will print LED ON and LED OFF.
                - img [ref=e759]
                - img [ref=e761]
                - heading "Deep sleep modeDirect link to Deep sleep mode" [level=2] [ref=e762]:
                  - text: Deep sleep mode
                  - link "Direct link to Deep sleep mode" [ref=e763] [cursor=pointer]:
                    - /url: "#deep-sleep-mode"
                    - text: "#"
                - paragraph [ref=e764]:
                  - text: The XIAO ESP32-C5 features deep sleep and wake-up functions. This example utilizes a high-level trigger on pin
                  - strong [ref=e765]: D0
                  - text: to wake the device from deep sleep.
                  - text: It is important to note that this is a configurable option, as the hardware supports both high-level and low-level triggers to accommodate different circuit designs.
                - generic [ref=e767]:
                  - code [ref=e769]:
                    - generic [ref=e770]: "#define WAKEUP_PIN D0 // LP_GPIO1"
                    - generic [ref=e771]: RTC_DATA_ATTR int bootCount = 0;
                    - generic [ref=e772]: "void print_wakeup_reason(){"
                    - generic [ref=e773]: esp_sleep_wakeup_cause_t wakeup_reason = esp_sleep_get_wakeup_cause();
                    - generic [ref=e774]: switch(wakeup_reason)
                    - generic [ref=e775]: "{"
                    - generic [ref=e776]: "case ESP_SLEEP_WAKEUP_EXT0 : Serial.println(\"Wakeup caused by external signal using RTC_IO\"); break;"
                    - generic [ref=e777]: "case ESP_SLEEP_WAKEUP_EXT1 : Serial.println(\"Wakeup caused by external signal using RTC_CNTL\"); break;"
                    - generic [ref=e778]: "case ESP_SLEEP_WAKEUP_TIMER : Serial.println(\"Wakeup caused by timer\"); break;"
                    - generic [ref=e779]: "case ESP_SLEEP_WAKEUP_TOUCHPAD : Serial.println(\"Wakeup caused by touchpad\"); break;"
                    - generic [ref=e780]: "case ESP_SLEEP_WAKEUP_ULP : Serial.println(\"Wakeup caused by ULP program\"); break;"
                    - generic [ref=e781]: "case ESP_SLEEP_WAKEUP_GPIO : Serial.println(\"Wakeup caused by GPIO\"); break;"
                    - generic [ref=e782]: "default : Serial.printf(\"Wakeup was not caused by deep sleep: %d\\n\",wakeup_reason); break;"
                    - generic [ref=e783]: "}"
                    - generic [ref=e784]: "}"
                    - generic [ref=e785]: "void setup(){"
                    - generic [ref=e786]: Serial.begin(115200);
                    - generic [ref=e787]: delay(1000);
                    - generic [ref=e788]: ++bootCount;
                    - generic [ref=e789]: "Serial.println(\"Boot number: \" + String(bootCount));"
                    - generic [ref=e790]: print_wakeup_reason();
                    - generic [ref=e791]: pinMode(WAKEUP_PIN, INPUT_PULLUP);
                    - generic [ref=e792]: pinMode(LED_BUILTIN, OUTPUT);
                    - generic [ref=e793]: uint64_t mask = 1ULL << WAKEUP_PIN;
                    - generic [ref=e794]: esp_deep_sleep_enable_gpio_wakeup(mask, ESP_GPIO_WAKEUP_GPIO_HIGH);
                    - generic [ref=e795]: digitalWrite(LED_BUILTIN, LOW);
                    - generic [ref=e796]: delay(100);
                    - generic [ref=e797]: digitalWrite(LED_BUILTIN, HIGH);
                    - generic [ref=e798]: delay(2000); //Delay time depends on the serial port / Give the PC time to stabilize
                    - generic [ref=e799]: Serial.println("Going to sleep now");
                    - generic [ref=e800]: esp_deep_sleep_start();
                    - generic [ref=e801]: "}"
                    - generic [ref=e802]: "void loop(){}"
                  - generic [ref=e803]:
                    - button "Toggle word wrap" [ref=e804] [cursor=pointer]:
                      - img [ref=e805]
                    - button "Copy code to clipboard" [ref=e807] [cursor=pointer]:
                      - generic [ref=e808]:
                        - img [ref=e809]
                        - img [ref=e811]
                - paragraph [ref=e813]:
                  - text: If you are quick enough to turn on the serial monitor before the XIAO goes into deep sleep, then you can see the message output as shown below. This means that the XIAO is now
                  - strong [ref=e814]: asleep
                  - text: . Then you can also view and activate it by pressing the button.You can also observe the on-off state of the
                  - strong [ref=e815]: L LED
                  - text: to check if the device has been awakened. Once it is awakened, it will exhibit a flashing effect.
                - img [ref=e817]
                - generic [ref=e818]:
                  - generic [ref=e819]:
                    - img [ref=e821]
                    - text: tip
                  - paragraph [ref=e824]: After entering deep sleep mode, the XIAO's port will disappear and you'll need to wake it up to see its port number again!
                - generic [ref=e825]:
                  - generic [ref=e826]:
                    - img [ref=e828]
                    - text: caution
                  - paragraph [ref=e831]: The XIAO ESP32-C5 supports GPIO wake-up and timer wake-up. To prevent the loss of hardware debugging capabilities and increased difficulty in firmware flashing during low-power development, it is strongly recommended that the JTAG (MTMS, MTDI, MTCK, MTDO) pins be reserved for dedicated use and not employed as wake-up sources for deep sleep mode.
                - heading "Battery UsageDirect link to Battery Usage" [level=2] [ref=e832]:
                  - text: Battery Usage
                  - link "Direct link to Battery Usage" [ref=e833] [cursor=pointer]:
                    - /url: "#battery-usage"
                    - text: "#"
                - paragraph [ref=e834]: The XIAO ESP32-C5 is capable of using a 3.7V lithium battery as the power supply input. You can refer to the following diagram for the wiring method.
                - img "pir" [ref=e836]
                - generic [ref=e837]:
                  - generic [ref=e838]:
                    - img [ref=e840]
                    - text: caution
                  - paragraph [ref=e843]: Please be careful not to short-circuit the positive and negative terminals and burn the battery and equipment when soldering.
                - paragraph [ref=e844]:
                  - strong [ref=e845]: "Instructions on the use of batteries:"
                - list [ref=e846]:
                  - listitem [ref=e847]: Please use qualified batteries that meet the specifications.
                  - listitem [ref=e848]: XIAO can be connected to your computer device via data cable while using the battery, rest assured that XIAO has a built-in circuit protection chip, which is safe.
                  - listitem [ref=e849]:
                    - text: When XIAO ESP32-C5 is powered by a battery, the
                    - strong [ref=e850]: C LED
                    - text: will light up. You can use this as a basis for determining whether charging management has been carried out.
                - heading "Check the battery voltageDirect link to Check the battery voltage" [level=3] [ref=e851]:
                  - text: Check the battery voltage
                  - link "Direct link to Check the battery voltage" [ref=e852] [cursor=pointer]:
                    - /url: "#check-the-battery-voltage"
                    - text: "#"
                - paragraph [ref=e853]:
                  - text: The XIAO ESP32-C5 is equipped with the SGM40567 battery charging chip and the TPS22916CYFPR battery voltage acquisition chip. You can enable the
                  - strong [ref=e854]: BAT_VOLT_PIN_EN
                  - text: to activate the battery voltage acquisition function and read the battery voltage through the
                  - strong [ref=e855]: BAT_VOLT_PIN
                  - text: .
                - generic [ref=e856]:
                  - generic [ref=e857]:
                    - img [ref=e859]
                    - text: tip
                  - paragraph [ref=e862]: On the XIAO ESP32C5, the pin corresponding to BAT_VOLT_PIN is GPIO6, and the pin corresponding to BAT_VOLT_PIN_EN is GPIO26.
                - generic [ref=e864]:
                  - code [ref=e866]:
                    - generic [ref=e867]: "#include <Arduino.h>"
                    - generic [ref=e868]: "void setup() {"
                    - generic [ref=e869]: Serial.begin(115200);

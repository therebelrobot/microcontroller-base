                      - strong [ref=e703]:
                        - generic [ref=e704]: Download Arduino IDE
                  - listitem [ref=e705]:
                    - paragraph [ref=e706]:
                      - strong [ref=e707]: Step 2.
                      - text: Launch the Arduino application.
                  - listitem [ref=e708]:

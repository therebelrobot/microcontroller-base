                - heading "Getting StartedDirect link to Getting Started" [level=2] [ref=e653]:
                  - text: Getting Started
                  - link "Direct link to Getting Started" [ref=e654] [cursor=pointer]:
                    - /url: "#getting-started"
                    - text: "#"
                - paragraph [ref=e655]: To enable you to get started with the XIAO ESP32-C5 faster, please read the hardware and software preparation below to prepare the XIAO.
                - heading "HardwareDirect link to Hardware" [level=3] [ref=e656]:
                  - text: Hardware
                  - link "Direct link to Hardware" [ref=e657] [cursor=pointer]:
                    - /url: "#hardware"
                    - text: "#"
                - paragraph [ref=e658]: "You need to prepare the following:"
                - list [ref=e659]:
                  - listitem [ref=e660]:
                    - text: 1 x
                    - link "Seeed Studio XIAO ESP32-C5" [ref=e661] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeed-Studio-XIAO-ESP32C5-p-5884.html
                  - listitem [ref=e662]: 1 x Computer
                  - listitem [ref=e663]: 1 x USB Type-C cable

                    - text: "#"
                - paragraph [ref=e616]: "Sometimes the Seeed Studio XIAO SAMD21 port may disappear when user programming process fails. we can solve this problem by the following operation:"
                - list [ref=e617]:
                  - listitem [ref=e618]: Connect the Seeed Studio XIAO SAMD21 to your computer.
                  - listitem [ref=e619]: Use tweezers or short lines to short the RST pins in the diagram twice.
                  - listitem [ref=e620]: The orange LED lights flicker on and light up.
                - paragraph [ref=e621]: At this point, the chip enters Bootloader mode and the burn port appears again. Because the samd21 chip has two partitions, one is the Bootloader and the other is the user program. The product will burn a bootloader code in the system memory when it leaves the factory. We can switch modes by performing the above steps.
                - paragraph [ref=e622]:
                  - img "pir" [ref=e623]

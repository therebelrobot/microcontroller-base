                - paragraph [ref=e979]:
                  - text: Select the serial device of the Arduino board from the Tools | Serial Port menu. This is likely to be COM3 or higher (
                  - strong [ref=e980]: COM1
                  - text: and
                  - strong [ref=e981]: COM2
                  - text: are usually reserved for hardware serial ports). To find out, you can disconnect your Arduino board and re-open the menu; the entry that disappears should be the Arduino board. Reconnect the board and select that serial port.

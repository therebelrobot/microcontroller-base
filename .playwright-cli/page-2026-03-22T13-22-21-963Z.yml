                - heading "Analog Input and OutputDirect link to analog-input-and-output" [level=4] [ref=e815]:
                  - strong [ref=e816]: Analog Input and Output
                  - link "Direct link to analog-input-and-output" [ref=e817] [cursor=pointer]:
                    - /url: "#analog-input-and-output"
                    - text: "#"
                - paragraph [ref=e818]: While it still has PWM-based "analog outputs", the SAMD21 also features true analog output in the form of a digital-to-analog converter (DAC). This module can produce an analog voltage between 0 and 3.3V. It can be used to produce audio with more natural sound, or as a kind of "digital potentiometer" to control analog devices.
                - paragraph [ref=e819]:
                  - text: The DAC is only available on the Arduino pin A0, and is controlled using analogWrite(A0,
                  - code [ref=e820]: <value>
                  - text: ). The DAC can be set up to 10-bit resolution (make sure to call
                  - link "analogWriteResolution(10)" [ref=e821] [cursor=pointer]:
                    - /url: https://www.arduino.cc/reference/en/language/functions/zero-due-mkr-family/analogwriteresolution/
                    - strong [ref=e822]: analogWriteResolution(10)
                  - text: in your setup), which means values between 0 and 1023 will set the voltage to somewhere between 0 and 3.3V.
                - paragraph [ref=e823]:
                  - text: "In addition to the DAC, the SAMD21's ADC channels also stand apart from the ATmega328: they're equipped with up to 12-bit resolution. That means the analog input values can range from 0-4095, representing a voltage between 0 and 3.3V. To use the ADC's in 12-bit mode, make sure you call"
                  - link "analogReadResolution(12)" [ref=e824] [cursor=pointer]:
                    - /url: https://www.arduino.cc/reference/en/language/functions/zero-due-mkr-family/analogreadresolution/
                    - strong [ref=e825]: analogReadResolution(12)
                  - text: in your setup.
                - paragraph [ref=e826]:
                  - strong [ref=e827]: Serial Plotting the DAC
                - paragraph [ref=e828]: "Here's an example that demonstrates both the DAC and the ADC. To set the experiment up, connect A0 to A1 -- we'll drive A0 with an analog voltage, then read it with A1. It's the simplest circuit we've ever put in a tutorial:"
                - img [ref=e830]
                - generic [ref=e831]:
                  - generic [ref=e832]:
                    - img [ref=e834]
                    - text: note
                  - paragraph [ref=e837]:
                    - text: The Seeed Studio XIAO SAMD21 using the
                    - link "Seeed Studio XIAO SAMD21 expansion board" [ref=e838] [cursor=pointer]:
                      - /url: https://www.seeedstudio.com/Seeeduino-XIAO-Expansion-board-p-4746.html
                      - strong [ref=e839]: Seeed Studio XIAO SAMD21 expansion board
                - paragraph [ref=e840]: This sketch produces a sine wave output on A0, with values ranging from 0 to 3.3V. Then it uses A1 to read that output into its ADC, and convert it into a voltage between 0 and 3.3V.
                - paragraph [ref=e841]: You can, of course, open the serial monitor to view the voltage values stream by. But if the the sine wave is hard to visualize through text, check out Arduino's new Serial Plotter, by going to Tools > Serial Plotter.
                - img [ref=e843]
                - img [ref=e845]
                - heading "DACDirect link to dac" [level=4] [ref=e846]:
                  - strong [ref=e847]: DAC
                  - link "Direct link to dac" [ref=e848] [cursor=pointer]:
                    - /url: "#dac"
                    - text: "#"
                - paragraph [ref=e849]:
                  - text: Thank you to
                  - link "Aleksei Tertychnyi" [ref=e850] [cursor=pointer]:
                    - /url: https://github.com/WeSpeakEnglish
                  - text: for submitting the code, all related functionalities were developed and contributed by him.
                - generic [ref=e852]:
                  - code [ref=e854]:
                    - generic [ref=e855]: "#define DAC_PIN A0 // Make code a bit more legible"
                    - generic [ref=e856]: float x = 0; // Value to take the sin of
                    - generic [ref=e857]: float increment = 0.02; // Value to increment x by each time
                    - generic [ref=e858]: int frequency = 440; // Frequency of sine wave
                    - generic [ref=e859]: void setup()
                    - generic [ref=e860]: "{"
                    - generic [ref=e861]: analogWriteResolution(10); // Set analog out resolution to max, 10-bits
                    - generic [ref=e862]: analogReadResolution(12); // Set analog input resolution to max, 12-bits
                    - generic [ref=e863]: Serial.begin(9600);
                    - generic [ref=e864]: "}"
                    - generic [ref=e865]: void loop()
                    - generic [ref=e866]: "{"
                    - generic [ref=e867]: // Generate a voltage value between 0 and 1023.
                    - generic [ref=e868]: "// Let's scale a sin wave between those values:"
                    - generic [ref=e869]: // Offset by 511.5, then multiply sin by 511.5.
                    - generic [ref=e870]: int dacVoltage = (int)(511.5 + 511.5 * sin(x));
                    - generic [ref=e871]: x += increment; // Increase value of x
                    - generic [ref=e872]: // Generate a voltage between 0 and 3.3V.
                    - generic [ref=e873]: // 0= 0V, 1023=3.3V, 512=1.65V, etc.
                    - generic [ref=e874]: analogWrite(DAC_PIN, dacVoltage);
                    - generic [ref=e875]: // Now read A1 (connected to A0), and convert that
                    - generic [ref=e876]: // 12-bit ADC value to a voltage between 0 and 3.3.
                    - generic [ref=e877]: float voltage = analogRead(A1) * 3.3 / 4096.0;
                    - generic [ref=e878]: Serial.println(voltage); // Print the voltage.
                    - generic [ref=e879]: delay(1); // Delay 1ms
                    - generic [ref=e880]: "}"

                - heading "Getting Started with Seeed Studio XIAO SAMD21" [level=1] [ref=e369]
                - paragraph [ref=e370]:
                  - img "pir" [ref=e371]
                - paragraph [ref=e372]:
                  - text: The Seeed Studio XIAO SAMD21, which used to be named Seeeduino XIAO, is the first debut of the
                  - link "Seeed Studio XIAO family, a series of powerful thumb-size dev boards compatible with Arduino" [ref=e373] [cursor=pointer]:
                    - /url: https://www.seeedstudio.com/xiao-series-page
                  - text: . It carries the powerful ATSAMD21G18A-MU which is a low-power microcontroller. On the other hand, this little board has good performance in processing but needs less power. It is designed in a tiny size and can be used for wearable devices and small projects.
                - paragraph [ref=e374]: Seeed Studio XIAO SAMD21 has 14 PINs, which can be used for 11 digital interfaces, 11 mock interfaces, 10 PWM interfaces (d1-d10), 1 DAC output pin D0, 1 SWD pad interface, 1 I2C interface, 1 SPI interface, 1 UART interface, Serial communication indicator (T/R), Blink light (L) through pin multiplexing. The colors of LEDs(Power, L,RX,TX) are green, yellow, blue, and blue. Moreover, Seeed Studio XIAO SAMD21 has a Type-C interface that can supply power and download code. There are two reset buttons, you can short-connect them to reset the board.
                - link "Get One Now 🖱️" [ref=e376] [cursor=pointer]:
                  - /url: https://www.seeedstudio.com/Seeeduino-XIAO-Arduino-Microcontroller-SAMD21-Cortex-M0+-p-4426.html

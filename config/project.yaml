# =============================================================================
# Project Manifest — config/project.yaml
# =============================================================================
#
# This file declares the boards used in your project, their roles, and how
# they communicate. Edit this after cloning the template to match your setup.
#
# See docs/ARCHITECTURE.md for full documentation on the manifest format.
# =============================================================================

project:
  name: my-project                    # Replace with your project name
  description: A microcontroller project built from the template
  version: 0.1.0

# =============================================================================
# Board Definitions
# =============================================================================
#
# Each board entry defines:
#   - id:         Unique identifier for this board instance (lowercase-kebab-case)
#   - board:      Board type matching a directory name in firmware/boards/
#   - language:   Firmware language — "tinygo" or "arduino"
#   - role:       Human-readable description of what this board does
#   - connection: (optional) How this board connects to other boards
#
# Board directory names use lowercase-kebab-case. See the full list in
# docs/ARCHITECTURE.md under "Firmware Directory Naming".
# =============================================================================

boards: []
  # -------------------------------------------------------------------------
  # Example: Single-board project
  # -------------------------------------------------------------------------
  # - id: main
  #   board: xiao-esp32s3
  #   language: tinygo
  #   role: Main controller
  #
  # -------------------------------------------------------------------------
  # Example: Multi-board project with I2C and UART connections
  # -------------------------------------------------------------------------
  # - id: controller
  #   board: xiao-esp32s3
  #   language: tinygo
  #   role: Central controller and WiFi gateway
  #
  # - id: left-arm
  #   board: xiao-rp2040
  #   language: tinygo
  #   role: Left arm servo controller
  #   connection:
  #     protocol: i2c
  #     address: 0x10
  #
  # - id: right-arm
  #   board: xiao-rp2040
  #   language: tinygo
  #   role: Right arm servo controller
  #   connection:
  #     protocol: i2c
  #     address: 0x11
  #
  # - id: sensor-hub
  #   board: arduino-uno
  #   language: arduino
  #   role: Environmental sensor aggregator
  #   connection:
  #     protocol: uart
  #     baud: 115200
  #
  # -------------------------------------------------------------------------
  # Connection protocol options:
  #   - i2c:  requires "address" (hex, e.g., 0x10)
  #   - spi:  requires "cs_pin" (chip select pin)
  #   - uart: requires "baud" (baud rate, e.g., 9600, 115200)
  #   - wifi: requires "port" (TCP/UDP port number)
  # -------------------------------------------------------------------------
